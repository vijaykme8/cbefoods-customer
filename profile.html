inline-flex;flex-direction:column;justify-content:space-between;align-items:flex-start}.restaurant-name{font-size:12px;font-weight:600;line-height:14.4px}.order-id{color:var(--muted);font-size:12px;font-weight:500;line-height:14.4px}.item-list{align-self:stretch;padding:0 12px;display:flex;flex-wrap:wrap;gap:2px 14px}.item-chip{min-height:20px;display:inline-flex;align-items:center;gap:2px;color:#000;font-size:10px;font-weight:500;line-height:12px}.item-chip .count{min-width:20px;height:20px;padding:4px;background:rgba(18,19,15,.06);border-radius:30px;display:inline-flex;justify-content:center;align-items:center;color:#000;font-size:12px;font-weight:500;line-height:12px}.cta-time-info{align-self:stretch;padding:0 12px;display:flex;flex-direction:column;align-items:center}.view-details{color:var(--cta);font-size:14px;font-weight:600;line-height:19.6px}.time-value{align-self:stretch;padding:12px 0;display:inline-flex;justify-content:space-between;align-items:flex-start;gap:10px;color:var(--muted);font-size:10px;font-weight:500;line-height:12px}.time-value .total{text-align:right;white-space:nowrap}.time-value .amount{color:var(--black);font-weight:600}.empty-state{width:100%;padding:16px 14px;border:1px dashed rgba(18,19,15,.16);border-radius:14px;background:rgba(18,19,15,.02);color:var(--muted);font-size:14px;font-weight:500;line-height:19.6px;text-align:center}.menu-popover{position:fixed;inset:0;z-index:50;display:none;align-items:flex-start;justify-content:center;padding-top:78px;background:rgba(18,19,15,.08)}.menu-popover.show{display:flex}.menu-card{width:min(342px,calc(100vw - 48px));background:var(--white);border:1px solid rgba(18,19,15,.10);border-radius:16px;box-shadow:0 12px 32px rgba(0,0,0,.12);overflow:hidden}.menu-action{width:100%;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;font-size:15px;font-weight:500;border-bottom:1px solid rgba(18,19,15,.08)}.menu-action:last-child{border-bottom:0}.menu-action.danger{color:var(--danger)}.sheet-backdrop{position:fixed;inset:0;z-index:60;display:none;align-items:flex-end;justify-content:center;background:rgba(18,19,15,.22)}.sheet-backdrop.show{display:flex}.sheet{width:min(390px,100vw);background:var(--white);border-radius:24px 24px 0 0;padding:18px 24px 20px;box-shadow:0 -12px 32px rgba(0,0,0,.12)}.sheet-handle{width:44px;height:4px;border-radius:99px;background:rgba(18,19,15,.16);margin:0 auto 18px}.sheet-title{font-size:20px;line-height:28px;font-weight:600;margin-bottom:14px}.sheet-input{width:100%;height:54px;border-radius:10px;border:1px solid rgba(18,19,15,.12);padding:0 16px;outline:none;font-size:18px;font-weight:500}.sheet-input:focus{border-color:rgba(8,160,69,.7)}.sheet-actions{display:flex;align-items:center;gap:10px;margin-top:14px}.sheet-btn{flex:1;height:46px;border-radius:12px;display:grid;place-items:center;font-size:15px;font-weight:600}.sheet-btn.cancel{border:1px solid rgba(18,19,15,.12)}.sheet-btn.save{background:var(--cta);color:var(--white)}.toast{position:fixed;left:50%;bottom:22px;transform:translate(-50%,120px);z-index:80;width:max-content;max-width:min(342px,calc(100vw - 48px));padding:11px 14px;background:var(--black);color:var(--white);border-radius:999px;font-size:13px;font-weight:600;line-height:18px;opacity:0;transition:transform .24s ease,opacity .24s ease;pointer-events:none}.toast.show{transform:translate(-50%,0);opacity:1}@media(max-width:360px){.profile-screen{padding-left:18px;padding-right:18px}.edit-button{min-width:46px;font-size:15px}.item-chip{font-size:9.5px}}

<body>
<main class="profile-screen" aria-label="Profile screen">
  <div class="top-car">
    <button class="back-button" type="button" id="backButton" aria-label="Go back"><span class="icon-30" aria-hidden="true"><svg viewBox="0 0 30 30" width="30" height="30" fill="none"><path d="M15 27.5C8.096 27.5 2.5 21.904 2.5 15S8.096 2.5 15 2.5 27.5 8.096 27.5 15 21.904 27.5 15 27.5Z" stroke="#12130F" stroke-width="1.5"/><path d="M16.58 10.59 12.18 15l4.4 4.41" stroke="#12130F" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="back-text">back</span></button>
    <button class="icon-30" type="button" id="dotMenuButton" aria-label="Open profile options"><svg viewBox="0 0 30 30" width="30" height="30" fill="none" aria-hidden="true"><circle cx="6.8" cy="15" r="2.2" fill="#12130F"/><circle cx="15" cy="15" r="2.2" fill="#12130F"/><circle cx="23.2" cy="15" r="2.2" fill="#12130F"/></svg></button>

      <div class="input-field-group"><div class="field-label muted">Name</div><div class="input-field-with-edit"><div class="field-value" id="nameFieldValue">Customer</div><button class="edit-button" type="button" id="editNameButton" aria-label="Edit name"><svg viewBox="0 0 20 20" fill="none" aria-hidden="true"><path d="M3.12 14.92 2.5 17.5l2.58-.62 9.79-9.79-1.96-1.96-9.79 9.79Z" fill="#08A045"/><path d="m13.73 4.3.94-.94a1.57 1.57 0 0 1 2.22 0l.25.25c.61.61.61 1.61 0 2.22l-.94.94-2.47-2.47Z" fill="#08A045"/></svg><span>Edit</span></button></div></div>

<div class="menu-popover" id="menuPopover" aria-hidden="true"><div class="menu-card" role="menu" aria-label="Profile menu"><button class="menu-action" type="button" id="refreshProfileButton">Refresh profile data <span>↻</span></button><button class="menu-action" type="button" id="goOrdersButton">Go to orders <span>›</span></button><button class="menu-action danger" type="button" id="logoutButton">Logout <span>›</span></button></div></div>

<script>
(function(){
'use strict';
const PROFILE_KEYS=['TIFFIN_CUSTOMER_PROFILE','CBE_CUSTOMER_PROFILE','customerProfile','cust_profile','userProfile','profile'];
const SAVED_ADDRESS_LIST_KEYS=['cust_saved_addresses','delivery_saved_addresses','TIFFIN_SAVED_ADDRESSES','tiffin_saved_addresses','CBE_SAVED_ADDRESSES','cbe_saved_addresses','savedAddresses','saved_addresses','savedDeliveryAddresses','delivery_addresses','TIFFIN_CUSTOMER_ADDRESSES'];
const ACTIVE_LOCATION_KEYS=['cust_location_details','delivery_location_details','cust_location','delivery_location','customer_location','user_location','userLocation','deliveryLocation','current_location','currentLocation','geo_location','geoLocation','location','TIFFIN_ACTIVE_DELIVERY_LOCATION','activeDeliveryLocation','selectedDeliveryAddress','currentDeliveryAddress','TIFFIN_SELECTED_ADDRESS','cbe_active_delivery_location','active_delivery_location'];
const TEXT_FALLBACK_KEYS=['cust_address','customer_address','delivery_address','deliveryAddress','cust_full_address','delivery_full_address','selected_address','selectedAddress','user_address','address','cust_location_name','cust_location_address','current_address','currentAddress'];
const ORDER_KEYS=['order_history','current_order','TIFFIN_ORDERS','TIFFIN_CUSTOMER_ORDERS','customerOrders','orders','cbeOrders','pastOrders','TIFFIN_ORDER_HISTORY'];
const $=s=>document.querySelector(s);const els={profileName:$('#profileName'),profilePhone:$('#profilePhone'),nameFieldValue:$('#nameFieldValue'),phoneDigits:$('#phoneDigits'),avatarCircle:$('#avatarCircle'),avatarButton:$('#avatarButton'),avatarInput:$('#avatarInput'),savedAddressList:$('#savedAddressList'),pastOrdersList:$('#pastOrdersList'),nameSheet:$('#nameSheet'),nameInput:$('#nameInput'),toast:$('#toast'),menuPopover:$('#menuPopover')};
let profile=loadProfile();
document.addEventListener('DOMContentLoaded',init);
function init(){renderAll();bindEvents()}
function bindEvents(){
 $('#backButton').addEventListener('click',goBack);$('#editNameButton').addEventListener('click',openNameSheet);$('#cancelNameButton').addEventListener('click',closeNameSheet);$('#saveNameButton').addEventListener('click',saveName);els.nameSheet.addEventListener('click',e=>{if(e.target===els.nameSheet)closeNameSheet()});els.nameInput.addEventListener('keydown',e=>{if(e.key==='Enter')saveName();if(e.key==='Escape')closeNameSheet()});
 els.avatarButton.addEventListener('click',()=>els.avatarInput.click());els.avatarInput.addEventListener('change',saveAvatar);
 $('#addAddressButton').addEventListener('click',()=>{location.href='menu.html?openLocation=1&returnTo=profile&profileAction=addAddress'});
 $('#dotMenuButton').addEventListener('click',toggleMenu);els.menuPopover.addEventListener('click',e=>{if(e.target===els.menuPopover)closeMenu()});$('#refreshProfileButton').addEventListener('click',()=>{closeMenu();refreshFromStorage();showToast('Profile refreshed')});$('#goOrdersButton').addEventListener('click',()=>{location.href='track.html'});$('#logoutButton').addEventListener('click',logout);
 window.addEventListener('pageshow',refreshFromStorage);document.addEventListener('visibilitychange',()=>{if(!document.hidden)refreshFromStorage()});
}
function refreshFromStorage(){profile=loadProfile();renderAll()}window.CBEProfileRefresh=refreshFromStorage;window.renderOrders=renderPastOrders;function renderAll(){renderProfile();renderAddresses();renderPastOrders()}
function renderProfile(){const name=cleanText(profile.name)||'Customer';const phone=normalizePhone(profile.phone||profile.mobile||profile.number||'');const digits=phone.digits||'0000000000';const displayPhone=phone.display||'+91-0000000000';els.profileName.textContent=name;els.nameFieldValue.textContent=name;els.profilePhone.textContent=displayPhone;els.phoneDigits.textContent=digits;if(profile.avatarDataUrl){els.avatarCircle.innerHTML='<img alt="Profile photo" src="'+escapeAttribute(profile.avatarDataUrl)+'" />'}else{els.avatarCircle.innerHTML='<span id="avatarInitial">'+escapeHtml(getInitial(name))+'</span>'}}
function renderAddresses(){const addresses=getSavedAddresses();els.savedAddressList.innerHTML='';if(!addresses.length){els.savedAddressList.innerHTML='<div class="empty-state">No saved address yet. Add one from the map flow.</div>';return}addresses.slice(0,6).forEach((address,index)=>{const row=document.createElement('div');row.className='address-row';row.innerHTML=`<div class="inside-wrap"><div class="address-left-group"><div class="title-with-icon">${getAddressIcon(address.type||address.title||'')}<span class="address-title-text">${escapeHtml(address.title||address.type||'Saved address')}</span></div><div class="address-line">${escapeHtml(address.line||'Address details not available')}</div></div><button class="edit-button" type="button" data-address-index="${index}" aria-label="Edit ${escapeAttribute(address.title||'address')}">${editIconSvg()}<span>Edit</span></button></div>`;row.querySelector('.edit-button').addEventListener('click',()=>{localStorage.setItem('TIFFIN_PROFILE_EDIT_ADDRESS_ID',address.id||'');localStorage.setItem('TIFFIN_PROFILE_EDIT_ADDRESS_INDEX',String(index));location.href='menu.html?openLocation=1&returnTo=profile&profileAction=editAddress&addressIndex='+encodeURIComponent(index)});els.savedAddressList.appendChild(row);if(index<Math.min(addresses.length,6)-1){const div=document.createElement('div');div.className='divider';els.savedAddressList.appendChild(div)}})}
function renderPastOrders(){const orders=getPastOrders();els.pastOrdersList.innerHTML='';if(!orders.length){els.pastOrdersList.innerHTML='<div class="empty-state">No past orders yet. Completed orders will appear here.</div>';return}orders.slice(0,5).forEach(order=>{const card=document.createElement('div');card.className='item-card';card.innerHTML=`<div class="order-header-card"><div class="order-left-content"><div class="item-img">${order.image?'<img alt="Order image" src="'+escapeAttribute(order.image)+'" />':foodIconSvg()}</div><div class="item-title"><div class="restaurant-name">${escapeHtml(order.restaurantName||'Coimbatore Foods')}</div><div class="order-id">Order ID #${escapeHtml(order.id||'----')}</div></div></div></div><div class="item-list">${buildItemsHtml(order.items)}</div><div class="divider" aria-hidden="true"></div><div class="cta-time-info"><button class="view-details" type="button">View details</button><div class="time-value"><div>Order placed: ${escapeHtml(formatOrderDate(order.createdAt||order.date||order.timestamp))}</div><div class="total"><span>Total value: </span><span class="amount">₹${escapeHtml(formatMoney(order.total||order.totalPaid||order.amount||0))}</span></div></div></div>`;card.querySelector('.view-details').addEventListener('click',()=>{if(order.id)localStorage.setItem('TIFFIN_SELECTED_ORDER_ID',String(order.id));location.href='track-fullscreen.html?orderId='+encodeURIComponent(order.id||'')});els.pastOrdersList.appendChild(card)})}
function loadProfile(){let stored=null;for(const key of PROFILE_KEYS){stored=parseJson(localStorage.getItem(key));if(stored&&typeof stored==='object'&&!Array.isArray(stored))break;stored=null}const auth=parseJson(localStorage.getItem('cust_auth'))||parseJson(localStorage.getItem('customerAuth'))||null;const rawPhone=localStorage.getItem('TIFFIN_CUSTOMER_PHONE')||localStorage.getItem('customer_phone')||localStorage.getItem('mobile')||'';const authObj=auth&&typeof auth==='object'?auth:{};return Object.assign({name:authObj.name||authObj.displayName||stored?.name||stored?.displayName||localStorage.getItem('TIFFIN_CUSTOMER_NAME')||localStorage.getItem('customer_name')||'Customer',phone:authObj.phone||authObj.mobile||authObj.phoneNumber||stored?.phone||stored?.mobile||rawPhone,avatarDataUrl:stored?.avatarDataUrl||stored?.avatar||''},stored||{})}
function persistProfile(next){profile=Object.assign({},profile,next);localStorage.setItem('TIFFIN_CUSTOMER_PROFILE',JSON.stringify(profile));if(profile.name)localStorage.setItem('TIFFIN_CUSTOMER_NAME',profile.name)}
function getSavedAddresses(){
 const saved=[];const seen=new Set();
 // 1) Prefer the same saved-address arrays used by the menu drawer.
 for(const key of SAVED_ADDRESS_LIST_KEYS){const raw=localStorage.getItem(key);const parsed=parseJson(raw);const value=parsed===null?raw:parsed;if(!value)continue;const before=saved.length;pushAddressCollection(value,saved,seen,false,key);if(saved.length>before)break}
 // 2) Only if no saved list exists, show the active/current address as one row.
 if(!saved.length){for(const key of ACTIVE_LOCATION_KEYS){const raw=localStorage.getItem(key);const parsed=parseJson(raw);const value=parsed===null?raw:parsed;if(!value)continue;pushAddressCollection(value,saved,seen,true,key);if(saved.length)break}}
 // 3) Only if nothing else exists, use plain text fallback. This prevents one saved address becoming 3 rows.
 if(!saved.length){for(const key of TEXT_FALLBACK_KEYS){const raw=localStorage.getItem(key);if(!raw)continue;pushAddressCollection(raw,saved,seen,true,key);if(saved.length)break}}
 return saved;
}
function pushAddressCollection(value,addresses,seen,activeOnly,sourceKey){if(value==null||value==='')return;let collection;if(Array.isArray(value))collection=value;else if(value&&typeof value==='object')collection=Array.isArray(value.addresses)?value.addresses:Array.isArray(value.savedAddresses)?value.savedAddresses:Array.isArray(value.items)?value.items:[value];else collection=[value];collection.forEach(item=>{const n=normalizeAddress(item,activeOnly,sourceKey);if(!n)return;const sig=addressSignature(n);if(seen.has(sig))return;seen.add(sig);addresses.push(n)})}
function normalizeAddress(item,activeOnly,sourceKey){if(item==null)return null;if(typeof item!=='object'){const text=cleanText(item);if(!text||isAddressPlaceholder(text))return null;return{title:activeOnly?'Current location':'Saved address',type:activeOnly?'Current location':'Saved address',line:text,lat:'',lng:''}}
 const rawTitle=cleanText(item.title||item.label||item.type||item.name||item.saveAs||item.tag||item.addressType||item.placeType||'');const door=cleanText(item.doorNo||item.door||item.house||item.houseNo||item.flat||item.flatNo||item.building||'');const mainAddress=cleanText(item.fullAddress||item.displayAddress||item.addressDetails||item.addressLine||item.address||item.formattedAddress||item.shortAddress||item.detectedAddress||item.resolvedAddress||item.line1||item.text||item.description||item.placeName||'');const lat=item.lat||item.latitude||item?.coords?.lat||item?.location?.lat||'';const lng=item.lng||item.lon||item.long||item.longitude||item?.coords?.lng||item?.location?.lng||'';
 const parts=[];[door,mainAddress,item.landmark||'',item.area||item.locality||'',item.city||item.district||''].map(cleanText).forEach(part=>{if(part&&!parts.some(p=>p.toLowerCase()===part.toLowerCase()))parts.push(part)});let line=cleanText(parts.join(', '));if(!line&&lat&&lng)line=`Lat: ${lat}, Lng: ${lng}`;if(isAddressPlaceholder(line))line='';let title=rawTitle&&rawTitle!==mainAddress?rawTitle:(activeOnly?'Current location':guessAddressTitle(sourceKey));if(!title&&!line)return null;return{id:item.id||'',title:title||'Saved address',type:rawTitle||title||'Saved address',line:line||'Location saved',lat,lng}}
function addressSignature(a){const lat=cleanText(a.lat),lng=cleanText(a.lng);if(lat&&lng)return ('geo|'+Number(lat).toFixed(5)+'|'+Number(lng).toFixed(5));return ('line|'+canonicalAddress(a.line))}
function canonicalAddress(text){return cleanText(text).toLowerCase().replace(/\b(current location|saved address|home|office|gym|other)\b/g,'').replace(/[^a-z0-9]+/g,' ').replace(/\s+/g,' ').trim()}
function guessAddressTitle(sourceKey){const key=cleanText(sourceKey).toLowerCase();if(key.includes('active')||key.includes('current')||key.includes('selected'))return'Current location';return'Saved address'}
function isAddressPlaceholder(value){const t=cleanText(value).toLowerCase();return!t||t==='current location captured'||t==='location captured'||t==='location saved'||t==='set delivery location'||t==='set location'||t==='getting location...'||t==='finding your area...'||t==='finding your address...'}
function getPastOrders(){const result=[];const seen=new Set();ORDER_KEYS.forEach(key=>{const raw=localStorage.getItem(key);const parsed=parseJson(raw);const list=Array.isArray(parsed)?parsed:(parsed&&typeof parsed==='object'?Object.values(parsed):[]);list.forEach(order=>{if(!order||typeof order!=='object')return;const status=cleanText(order.status||order.orderStatus||'').toLowerCase();const isPast=['delivered','completed','cancelled','canceled'].includes(status)||order.deliveredAt||order.completedAt;if(!isPast)return;const id=cleanText(order.id||order.orderId||order.orderNo||order.createdAt||JSON.stringify(order).slice(0,40));if(seen.has(id))return;seen.add(id);result.push(normalizeOrder(order))})});return result.sort((a,b)=>(new Date(b.createdAt||0))-(new Date(a.createdAt||0)))}
function normalizeOrder(order){return{id:order.id||order.orderId||order.orderNo||'',restaurantName:order.restaurantName||order.storeName||'Coimbatore Foods',items:Array.isArray(order.items)?order.items:[],total:order.total||order.totalPaid||order.amount||order.grandTotal||0,createdAt:order.createdAt||order.date||order.timestamp||'',image:order.image||order.restaurantImage||''}}
function buildItemsHtml(items){if(!Array.isArray(items)||!items.length)return'<span class="item-chip">Order items unavailable</span>';return items.slice(0,6).map(item=>`<span class="item-chip"><span>${escapeHtml(item.name||item.title||'Item')}</span><span class="count">${escapeHtml(item.qty||item.quantity||1)}</span></span>`).join('')}
function openNameSheet(){els.nameInput.value=cleanText(profile.name)||'';els.nameSheet.classList.add('show');els.nameSheet.setAttribute('aria-hidden','false');setTimeout(()=>els.nameInput.focus(),80)}function closeNameSheet(){els.nameSheet.classList.remove('show');els.nameSheet.setAttribute('aria-hidden','true')}function saveName(){const name=cleanText(els.nameInput.value);if(!name){showToast('Enter your name');return}persistProfile({name});closeNameSheet();renderProfile();showToast('Name updated')}
function saveAvatar(event){const file=event.target.files&&event.target.files[0];if(!file)return;if(!file.type.startsWith('image/')){showToast('Choose an image file');return}const reader=new FileReader();reader.onload=()=>{persistProfile({avatarDataUrl:String(reader.result||'')});renderProfile();showToast('Profile photo updated')};reader.readAsDataURL(file)}
function toggleMenu(){els.menuPopover.classList.toggle('show');els.menuPopover.setAttribute('aria-hidden',els.menuPopover.classList.contains('show')?'false':'true')}function closeMenu(){els.menuPopover.classList.remove('show');els.menuPopover.setAttribute('aria-hidden','true')}function goBack(){if(document.referrer&&history.length>1){history.back()}else{location.href='menu.html'}}function logout(){['cust_auth','customerAuth','TIFFIN_CUSTOMER_AUTH','TIFFIN_AUTH','authUser'].forEach(k=>localStorage.removeItem(k));location.replace('login.html?logout=1')}
function showToast(message){els.toast.textContent=message;els.toast.classList.add('show');clearTimeout(showToast.timer);showToast.timer=setTimeout(()=>els.toast.classList.remove('show'),1800)}
function normalizePhone(value){const raw=cleanText(value);const digits=(raw.match(/\d/g)||[]).join('').replace(/^91(?=\d{10}$)/,'');const ten=digits.slice(-10);return{digits:ten,display:ten?'+91-'+ten:'+91-0000000000'}}function getInitial(name){return(cleanText(name)[0]||'C').toUpperCase()}function parseJson(value){if(!value)return null;try{return JSON.parse(value)}catch{return null}}function cleanText(v){return v==null?'':String(v).trim()}function formatMoney(v){const n=Number(v)||0;return String(Math.round(n))}function formatOrderDate(value){if(!value)return'--';const d=new Date(value);if(Number.isNaN(d.getTime()))return String(value);return d.toLocaleString('en-IN',{day:'2-digit',month:'short',year:'numeric',hour:'numeric',minute:'2-digit'})}function escapeHtml(v){return cleanText(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')}function escapeAttribute(v){return escapeHtml(v)}
function editIconSvg(){return `<svg viewBox="0 0 20 20" fill="none" aria-hidden="true"><path d="M3.12 14.92 2.5 17.5l2.58-.62 9.79-9.79-1.96-1.96-9.79 9.79Z" fill="#08A045"/><path d="m13.73 4.3.94-.94a1.57 1.57 0 0 1 2.22 0l.25.25c.61.61.61 1.61 0 2.22l-.94.94-2.47-2.47Z" fill="#08A045"/></svg>`}

<script>
(function syncProfilePastOrdersFromFirestore() {
  function clean(value) { return value === null || value === undefined ? "" : String(value).trim(); }
  function parseJSON(value, fallback) { try { return JSON.parse(value); } catch (_) { return fallback; } }
  function phone10(value) {
    const digits = clean(value).replace(/\D/g, "");
    return digits.length > 10 ? digits.slice(-10) : digits;
  }
  function timestampToISO(value) {
    if (!value) return "";
    if (typeof value.toDate === "function") return value.toDate().toISOString();
    if (value.seconds) return new Date(value.seconds * 1000).toISOString();
    if (typeof value === "string") return value;
    return "";
  }
  function normalizeOrder(id, data) {
    if (!data) return null;
    return {
      id,
      ...data,
      createdAt: timestampToISO(data.createdAt) || data.createdAtClient || data.createdAt || "",
      updatedAt: timestampToISO(data.updatedAt) || data.updatedAt || "",
      deliveredAt: timestampToISO(data.deliveredAt) || data.deliveredAt || "",
      items: Array.isArray(data.items) ? data.items : [],
      total: Number(data.totals?.total ?? data.total ?? data.totalPaid ?? data.amount ?? 0),
      restaurantName: data.restaurantName || data.storeName || "Coimbatore Foods"
    };
  }
  function saveAndRefresh(orders) {
    try {
      localStorage.setItem("order_history", JSON.stringify(orders));
      localStorage.setItem("TIFFIN_ORDER_HISTORY", JSON.stringify(orders));
    } catch (_) {}
    if (typeof window.CBEProfileRefresh === "function") window.CBEProfileRefresh();
    else if (typeof window.renderOrders === "function") window.renderOrders();
  }
  function boot() {
    if (!window.firebase || !window.TIFFIN_FIREBASE_CONFIG || !window.TIFFIN_FIREBASE_CONFIG.apiKey) {
      if (typeof window.CBEProfileRefresh === "function") window.CBEProfileRefresh();
      return;
    }
    try {
      if (!firebase.apps.length) firebase.initializeApp(window.TIFFIN_FIREBASE_CONFIG);
      const auth = firebase.auth();
      const db = firebase.firestore();
      auth.onAuthStateChanged(user => {
        const localUid = clean(localStorage.getItem("cust_uid"));
        const customerId = clean(user?.uid || localUid);
        const customerPhone = phone10(user?.phoneNumber || localStorage.getItem("cust_phone") || localStorage.getItem("customer_phone") || "");
        if (!customerId && !customerPhone) {
          if (typeof window.CBEProfileRefresh === "function") window.CBEProfileRefresh();
          return;
        }
        let latestByUid = [];
        let latestByPhone = [];
        function mergeAndRender() {
          const map = new Map();
          [...latestByPhone, ...latestByUid].forEach(order => {
            if (!order || !order.id) return;
            map.set(order.id, order);
          });
          const orders = Array.from(map.values()).sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0));
          saveAndRefresh(orders);
        }
        if (customerId) {
          db.collection("orders")
            .where("customerId", "==", customerId)
            .orderBy("createdAt", "desc")
            .limit(30)
            .onSnapshot(snapshot => {
              latestByUid = snapshot.docs.map(doc => normalizeOrder(doc.id, doc.data())).filter(Boolean);
              mergeAndRender();
            }, error => console.warn("Profile order history UID sync failed", error));
        }
        if (customerPhone) {
          db.collection("orders")
            .where("customerPhone", "==", customerPhone)
            .orderBy("createdAt", "desc")
            .limit(30)
            .onSnapshot(snapshot => {
              latestByPhone = snapshot.docs.map(doc => normalizeOrder(doc.id, doc.data())).filter(Boolean);
              mergeAndRender();
            }, error => console.warn("Profile order history phone sync failed", error));
        }
      });
    } catch (error) {
      console.warn("Profile order history sync failed", error);
      if (typeof window.CBEProfileRefresh === "function") window.CBEProfileRefresh();
    }
  }
  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", boot, { once: true });
  else boot();
})();
</script>
