<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Tiffin CBE" />
<meta name="theme-color" content="#8806CE" />
<title>Profile | Coimbatore Foods</title>
<link rel="manifest" id="pwa-manifest" />
<style>
@font-face {
  font-family: 'General Sans';
  src: url('./fonts/GeneralSans/GeneralSans-Regular.otf') format('opentype');
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: 'General Sans';
  src: url('./fonts/GeneralSans/GeneralSans-Medium.otf') format('opentype');
  font-weight: 500;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: 'General Sans';
  src: url('./fonts/GeneralSans/GeneralSans-Semibold.otf') format('opentype');
  font-weight: 600;
  font-style: normal;
  font-display: swap;
}

:root {
  --white: #FDFDFF;
  --black: #12130F;
  --muted: rgba(18, 19, 15, 0.50);
  --line: rgba(18, 19, 15, 0.12);
  --soft: rgba(18, 19, 15, 0.04);
  --field: rgba(18, 19, 15, 0.02);
  --cta: #08A045;
  --violet: #8806CE;
  --danger: #D62828;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; min-height: 100%; background: var(--white); color: var(--black); }
body { font-family: 'General Sans', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
button, input { font: inherit; }
button { border: 0; background: none; padding: 0; color: inherit; cursor: pointer; }

.profile-screen {
  width: 100%;
  max-width: 390px;
  min-height: 100dvh;
  margin: 0 auto;
  position: relative;
  background: var(--white);
  overflow-x: hidden;
  padding: calc(40px + env(safe-area-inset-top, 0px)) 22px 32px;
}

.top-car {
  width: 100%;
  height: 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.back-button {
  height: 30px;
  border-radius: 14px;
  display: inline-flex;
  justify-content: flex-start;
  align-items: center;
  gap: 4px;
}

.icon-30 {
  width: 30px;
  height: 30px;
  opacity: 0.50;
  display: grid;
  place-items: center;
  flex: 0 0 auto;
}

.back-text {
  color: var(--black);
  font-size: 18px;
  font-weight: 500;
  line-height: 27px;
}

.full-content {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
}

.personal-info-group {
  align-self: stretch;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 14px;
}

.persona-info {
  width: 100%;
  min-height: 80px;
  padding: 12px 16px;
  background: var(--soft);
  border-radius: 14px;
  display: inline-flex;
  justify-content: flex-start;
  align-items: center;
  gap: 16px;
}

.user-profile {
  width: 56px;
  height: 56px;
  position: relative;
  overflow: visible;
  flex: 0 0 auto;
}

.avatar-circle {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: #878887;
  color: var(--white);
  display: grid;
  place-items: center;
  font-size: 22px;
  font-weight: 600;
  line-height: 1;
  overflow: hidden;
}

.avatar-circle img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.avatar-edit-icon {
  width: 16px;
  height: 16px;
  padding: 3px;
  position: absolute;
  right: 0;
  top: 0;
  background: var(--cta);
  border-radius: 20px;
  display: inline-flex;
  justify-content: center;
  align-items: center;
}

.name-number {
  min-width: 0;
  display: inline-flex;
  flex-direction: column;
  justify-content: center;
  align-items: flex-start;
  gap: 4px;
}

.profile-name {
  max-width: 224px;
  color: var(--black);
  font-size: 16px;
  font-weight: 600;
  line-height: 22.4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.profile-phone {
  color: var(--muted);
  font-size: 16px;
  font-weight: 500;
  line-height: 22.4px;
  white-space: nowrap;
}

.input-field-group,
.phone-input-field {
  align-self: stretch;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 6px;
}

.field-label {
  width: 100%;
  color: var(--black);
  font-size: 16px;
  font-weight: 500;
  line-height: 24px;
}
.field-label.muted { opacity: 0.60; }

.input-field-with-edit {
  width: 100%;
  min-height: 54px;
  padding: 14px 20px;
  border: 1px solid rgba(18, 19, 15, 0.08);
  border-radius: 10px;
  display: inline-flex;
  justify-content: flex-start;
  align-items: center;
  gap: 10px;
}

.input-field-with-edit.locked {
  background: var(--field);
  gap: 30px;
}

.field-value {
  min-width: 0;
  flex: 1 1 0;
  color: var(--black);
  font-size: 18px;
  font-weight: 500;
  line-height: 26px;
  letter-spacing: 0.02em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.number-value {
  min-width: 0;
  flex: 1 1 0;
  opacity: 0.40;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--black);
  font-size: 18px;
  font-weight: 500;
  line-height: 26px;
  white-space: nowrap;
}

.number-value .digits { letter-spacing: 0.02em; }

.edit-button {
  min-width: 52px;
  height: 21px;
  display: inline-flex;
  justify-content: flex-start;
  align-items: center;
  gap: 2px;
  color: var(--cta);
  font-size: 16px;
  font-weight: 500;
  line-height: 20.8px;
}

.edit-button svg { width: 20px; height: 20px; flex: 0 0 auto; }

.divider {
  align-self: stretch;
  height: 1px;
  background: var(--line);
}

.saved-address-section {
  align-self: stretch;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 14px;
}

.saved-add-content {
  align-self: stretch;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 10px;
}

.title-info {
  align-self: stretch;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 2px;
}

.section-title {
  align-self: stretch;
  color: var(--black);
  font-size: 20px;
  font-weight: 600;
  line-height: 28px;
}

.section-info {
  color: var(--muted);
  font-size: 14px;
  font-weight: 500;
  line-height: 19.6px;
}

.saved-add-group {
  align-self: stretch;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 8px;
}

.address-row {
  align-self: stretch;
  padding: 6px 0;
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: flex-start;
  gap: 6px;
}

.inside-wrap {
  align-self: stretch;
  min-height: 40px;
  display: inline-flex;
  justify-content: flex-start;
  align-items: center;
  gap: 16px;
}

.address-left-group {
  min-width: 0;
  flex: 1 1 0;
  display: inline-flex;
  flex-direction: column;
  justify-content: flex-start;
  align-items: flex-start;
  gap: 2px;
}

.title-with-icon {
  max-width: 100%;
  display: inline-flex;
  justify-content: flex-start;
  align-items: center;
  gap: 4px;
  color: var(--black);
  font-size: 16px;
  font-weight: 500;
  line-height: 20.8px;
}

.title-with-icon svg {
  width: 20px;
  height: 20px;
  flex: 0 0 auto;
  color: var(--violet);
}

.address-title-text {
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.address-line {
  align-self: stretch;
  color: var(--muted);
  font-size: 14px;
  font-weight: 400;
  line-height: 16.8px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.add-address-button {
  width: 164px;
  min-height: 44px;
  padding: 12px 24px;
  background: var(--white);
  border: 1px solid var(--cta);
  border-radius: 10px;
  display: inline-flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  color: var(--cta);
  font-size: 14px;
  font-weight: 600;
  line-height: 19.6px;
}

.past-order-section {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 10px;
}

.past-orders-title {
  align-self: stretch;
  color: var(--muted);
  font-size: 14px;
  font-weight: 500;
  line-height: 19.6px;
}

.order-cards-group {
  align-self: stretch;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 16px;
}

.item-card {
  align-self: stretch;
  padding: 4px;
  background: var(--white);
  border: 1px solid var(--line);
  box-shadow: 0 2px 6px rgba(0,0,0,0.06);
  border-radius: 14px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}

.order-header-card {
  align-self: stretch;
  min-height: 54px;
  padding: 12px;
  background: var(--soft);
  overflow: hidden;
  border-radius: 10px 10px 0 0;
  display: inline-flex;
  justify-content: flex-start;
  align-items: flex-start;
  gap: 12px;
}

.order-left-content {
  flex: 1 1 0;
  align-self: stretch;
  display: flex;
  justify-content: flex-start;
  align-items: center;
  gap: 8px;
}

.item-img {
  width: 30px;
  height: 30px;
  border-radius: 10px;
  background: rgba(136, 6, 206, 0.10);
  display: grid;
  place-items: center;
  overflow: hidden;
  flex: 0 0 auto;
}

.item-img img { width: 100%; height: 100%; object-fit: cover; display: block; }

.item-title {
  min-width: 0;
  flex: 1 1 0;
  align-self: stretch;
  display: inline-flex;
  flex-direction: column;
  justify-content: space-between;
  align-items: flex-start;
}

.restaurant-name {
  color: var(--black);
  font-size: 12px;
  font-weight: 600;
  line-height: 14.4px;
}

.order-id {
  color: var(--muted);
  font-size: 12px;
  font-weight: 500;
  line-height: 14.4px;
}

.item-list {
  align-self: stretch;
  padding: 0 12px;
  display: flex;
  flex-wrap: wrap;
  justify-content: flex-start;
  align-items: flex-start;
  gap: 2px 14px;
}

.item-chip {
  min-height: 20px;
  display: inline-flex;
  justify-content: flex-start;
  align-items: center;
  gap: 2px;
  color: #000;
  font-size: 10px;
  font-weight: 500;
  line-height: 12px;
}

.item-chip .count {
  min-width: 20px;
  height: 20px;
  padding: 4px;
  background: rgba(18, 19, 15, 0.06);
  border-radius: 30px;
  display: inline-flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: #000;
  font-size: 12px;
  font-weight: 500;
  line-height: 12px;
}

.cta-time-info {
  align-self: stretch;
  padding: 0 12px;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  align-items: center;
}

.view-details {
  color: var(--cta);
  font-size: 14px;
  font-weight: 600;
  line-height: 19.6px;
}

.time-value {
  align-self: stretch;
  padding: 12px 0;
  display: inline-flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
  color: var(--muted);
  font-size: 10px;
  font-weight: 500;
  line-height: 12px;
}

.time-value .total { text-align: right; white-space: nowrap; }
.time-value .amount { color: var(--black); font-weight: 600; }

.empty-state {
  width: 100%;
  padding: 16px 14px;
  border: 1px dashed rgba(18, 19, 15, 0.16);
  border-radius: 14px;
  background: rgba(18, 19, 15, 0.02);
  color: var(--muted);
  font-size: 14px;
  font-weight: 500;
  line-height: 19.6px;
  text-align: center;
}

.menu-popover {
  position: fixed;
  inset: 0;
  z-index: 50;
  display: none;
  align-items: flex-start;
  justify-content: center;
  padding-top: calc(78px + env(safe-area-inset-top, 0px));
  background: rgba(18, 19, 15, 0.08);
}
.menu-popover.show { display: flex; }
.menu-card {
  width: min(342px, calc(100vw - 48px));
  background: var(--white);
  border: 1px solid rgba(18, 19, 15, 0.10);
  border-radius: 16px;
  box-shadow: 0 12px 32px rgba(0,0,0,0.12);
  overflow: hidden;
}
.menu-action {
  width: 100%;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  color: var(--black);
  font-size: 15px;
  font-weight: 500;
  border-bottom: 1px solid rgba(18, 19, 15, 0.08);
}
.menu-action:last-child { border-bottom: 0; }
.menu-action.danger { color: var(--danger); }

.sheet-backdrop {
  position: fixed;
  inset: 0;
  z-index: 60;
  display: none;
  align-items: flex-end;
  justify-content: center;
  background: rgba(18, 19, 15, 0.22);
}
.sheet-backdrop.show { display: flex; }
.sheet {
  width: min(390px, 100vw);
  background: var(--white);
  border-radius: 24px 24px 0 0;
  padding: 18px 24px calc(20px + env(safe-area-inset-bottom, 0px));
  box-shadow: 0 -12px 32px rgba(0,0,0,0.12);
}
.sheet-handle {
  width: 44px;
  height: 4px;
  border-radius: 99px;
  background: rgba(18, 19, 15, 0.16);
  margin: 0 auto 18px;
}
.sheet-title {
  font-size: 20px;
  line-height: 28px;
  font-weight: 600;
  margin-bottom: 14px;
}
.sheet-input {
  width: 100%;
  height: 54px;
  border-radius: 10px;
  border: 1px solid rgba(18, 19, 15, 0.12);
  padding: 0 16px;
  outline: none;
  color: var(--black);
  font-size: 18px;
  font-weight: 500;
}
.sheet-input:focus { border-color: rgba(8, 160, 69, 0.70); }
.sheet-actions {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 14px;
}
.sheet-btn {
  flex: 1;
  height: 46px;
  border-radius: 12px;
  display: grid;
  place-items: center;
  font-size: 15px;
  font-weight: 600;
}
.sheet-btn.cancel { border: 1px solid rgba(18, 19, 15, 0.12); color: var(--black); }
.sheet-btn.save { background: var(--cta); color: var(--white); }
.toast {
  position: fixed;
  left: 50%;
  bottom: calc(22px + env(safe-area-inset-bottom, 0px));
  transform: translate(-50%, 120px);
  z-index: 80;
  width: max-content;
  max-width: min(342px, calc(100vw - 48px));
  padding: 11px 14px;
  background: var(--black);
  color: var(--white);
  border-radius: 999px;
  font-size: 13px;
  font-weight: 600;
  line-height: 18px;
  opacity: 0;
  transition: transform .24s ease, opacity .24s ease;
  pointer-events: none;
}
.toast.show { transform: translate(-50%, 0); opacity: 1; }

@media (max-width: 360px) {
  .profile-screen { padding-left: 18px; padding-right: 18px; }
  .edit-button { min-width: 46px; font-size: 15px; }
  .item-chip { font-size: 9.5px; }
}
</style>
</head>
<body>
<main class="profile-screen" aria-label="Profile screen">
  <div class="top-car">
    <button class="back-button" type="button" id="backButton" aria-label="Go back">
      <span class="icon-30" aria-hidden="true">
        <svg viewBox="0 0 30 30" width="30" height="30" fill="none">
          <path d="M15 27.5C8.096 27.5 2.5 21.904 2.5 15S8.096 2.5 15 2.5 27.5 8.096 27.5 15 21.904 27.5 15 27.5Z" stroke="#12130F" stroke-width="1.5"/>
          <path d="M16.58 10.59 12.18 15l4.4 4.41" stroke="#12130F" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      <span class="back-text">back</span>
    </button>

    <button class="icon-30" type="button" id="dotMenuButton" aria-label="Open profile options">
      <svg viewBox="0 0 30 30" width="30" height="30" fill="none" aria-hidden="true">
        <circle cx="6.8" cy="15" r="2.2" fill="#12130F"/>
        <circle cx="15" cy="15" r="2.2" fill="#12130F"/>
        <circle cx="23.2" cy="15" r="2.2" fill="#12130F"/>
      </svg>
    </button>
  </div>

  <section class="full-content">
    <section class="personal-info-group" aria-label="Personal information">
      <div class="persona-info">
        <button class="user-profile" type="button" id="avatarButton" aria-label="Edit profile photo">
          <span class="avatar-circle" id="avatarCircle"><span id="avatarInitial">C</span></span>
          <span class="avatar-edit-icon" aria-hidden="true">
            <svg viewBox="0 0 20 20" width="12" height="12" fill="none">
              <path d="M4.2 13.93 3.75 16.25l2.32-.45 8.94-8.94-1.87-1.87-8.94 8.94Z" fill="#FDFDFF"/>
              <path d="M14.1 4.04 15 3.14a1.25 1.25 0 0 1 1.77 0l.09.09c.49.49.49 1.28 0 1.77l-.9.9-1.86-1.86Z" fill="#FDFDFF"/>
            </svg>
          </span>
        </button>
        <input type="file" id="avatarInput" accept="image/*" hidden />
        <div class="name-number">
          <div class="profile-name" id="profileName">Customer</div>
          <div class="profile-phone" id="profilePhone">+91-0000000000</div>
        </div>
      </div>

      <div class="input-field-group">
        <div class="field-label muted">Name</div>
        <div class="input-field-with-edit">
          <div class="field-value" id="nameFieldValue">Customer</div>
          <button class="edit-button" type="button" id="editNameButton" aria-label="Edit name">
            <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
              <path d="M3.12 14.92 2.5 17.5l2.58-.62 9.79-9.79-1.96-1.96-9.79 9.79Z" fill="#08A045"/>
              <path d="m13.73 4.3.94-.94a1.57 1.57 0 0 1 2.22 0l.25.25c.61.61.61 1.61 0 2.22l-.94.94-2.47-2.47Z" fill="#08A045"/>
            </svg>
            <span>Edit</span>
          </button>
        </div>
      </div>

      <div class="phone-input-field">
        <div class="field-label">Phone Number</div>
        <div class="input-field-with-edit locked" aria-label="Phone number cannot be edited here">
          <div class="number-value">
            <span>+91</span>
            <span class="digits" id="phoneDigits">0000000000</span>
          </div>
        </div>
      </div>
    </section>

    <div class="divider" aria-hidden="true"></div>

    <section class="saved-address-section" aria-label="Saved addresses">
      <div class="saved-add-content">
        <div class="title-info">
          <div class="section-title">Saved Address</div>
          <div class="section-info">Manage your default delivery address</div>
        </div>
        <div class="saved-add-group" id="savedAddressList"></div>
      </div>
      <button class="add-address-button" type="button" id="addAddressButton">+ Add address</button>
    </section>

    <div class="divider" aria-hidden="true"></div>

    <section class="past-order-section" aria-label="Past orders">
      <div class="past-orders-title">Past orders</div>
      <div class="order-cards-group" id="pastOrdersList"></div>
    </section>
  </section>
</main>

<div class="menu-popover" id="menuPopover" aria-hidden="true">
  <div class="menu-card" role="menu" aria-label="Profile menu">
    <button class="menu-action" type="button" id="refreshProfileButton">Refresh profile data <span>↻</span></button>
    <button class="menu-action" type="button" id="goOrdersButton">Go to orders <span>›</span></button>
    <button class="menu-action danger" type="button" id="logoutButton">Logout <span>›</span></button>
  </div>
</div>

<div class="sheet-backdrop" id="nameSheet" aria-hidden="true">
  <div class="sheet" role="dialog" aria-modal="true" aria-labelledby="nameSheetTitle">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="nameSheetTitle">Edit name</div>
    <input class="sheet-input" id="nameInput" type="text" maxlength="40" autocomplete="name" placeholder="Enter your name" />
    <div class="sheet-actions">
      <button class="sheet-btn cancel" type="button" id="cancelNameButton">Cancel</button>
      <button class="sheet-btn save" type="button" id="saveNameButton">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
(function () {
  'use strict';

  const PROFILE_KEYS = [
    'TIFFIN_CUSTOMER_PROFILE',
    'CBE_CUSTOMER_PROFILE',
    'customerProfile',
    'cust_profile',
    'userProfile',
    'profile'
  ];

  const ADDRESS_KEYS = [
    'TIFFIN_SAVED_ADDRESSES',
    'tiffin_saved_addresses',
    'CBE_SAVED_ADDRESSES',
    'cbe_saved_addresses',
    'savedAddresses',
    'saved_addresses',
    'delivery_addresses',
    'TIFFIN_CUSTOMER_ADDRESSES'
  ];

  const ACTIVE_LOCATION_KEYS = [
    'TIFFIN_ACTIVE_DELIVERY_LOCATION',
    'tiffin_active_delivery_location',
    'activeDeliveryLocation',
    'selectedDeliveryAddress',
    'currentDeliveryAddress',
    'TIFFIN_SELECTED_ADDRESS'
  ];

  const ORDER_KEYS = [
    'TIFFIN_ORDERS',
    'TIFFIN_CUSTOMER_ORDERS',
    'customerOrders',
    'orders',
    'cbeOrders',
    'pastOrders',
    'TIFFIN_ORDER_HISTORY'
  ];

  const $ = (selector) => document.querySelector(selector);
  const els = {
    profileName: $('#profileName'),
    profilePhone: $('#profilePhone'),
    nameFieldValue: $('#nameFieldValue'),
    phoneDigits: $('#phoneDigits'),
    avatarCircle: $('#avatarCircle'),
    avatarInitial: $('#avatarInitial'),
    avatarButton: $('#avatarButton'),
    avatarInput: $('#avatarInput'),
    savedAddressList: $('#savedAddressList'),
    pastOrdersList: $('#pastOrdersList'),
    nameSheet: $('#nameSheet'),
    nameInput: $('#nameInput'),
    toast: $('#toast'),
    menuPopover: $('#menuPopover')
  };

  let profile = loadProfile();

  document.addEventListener('DOMContentLoaded', init);

  function init() {
    renderAll();
    bindEvents();
  }

  function bindEvents() {
    $('#backButton').addEventListener('click', goBack);
    $('#editNameButton').addEventListener('click', openNameSheet);
    $('#cancelNameButton').addEventListener('click', closeNameSheet);
    $('#saveNameButton').addEventListener('click', saveName);
    els.nameSheet.addEventListener('click', function (event) {
      if (event.target === els.nameSheet) closeNameSheet();
    });
    els.nameInput.addEventListener('keydown', function (event) {
      if (event.key === 'Enter') saveName();
      if (event.key === 'Escape') closeNameSheet();
    });

    els.avatarButton.addEventListener('click', function () { els.avatarInput.click(); });
    els.avatarInput.addEventListener('change', saveAvatar);

    $('#addAddressButton').addEventListener('click', function () {
      location.href = 'menu.html?openLocation=1&returnTo=profile&profileAction=addAddress';
    });

    $('#dotMenuButton').addEventListener('click', toggleMenu);
    els.menuPopover.addEventListener('click', function (event) {
      if (event.target === els.menuPopover) closeMenu();
    });
    $('#refreshProfileButton').addEventListener('click', function () {
      closeMenu();
      profile = loadProfile();
      renderAll();
      showToast('Profile refreshed');
    });
    $('#goOrdersButton').addEventListener('click', function () {
      location.href = 'track.html';
    });
    $('#logoutButton').addEventListener('click', logout);
  }

  function renderAll() {
    renderProfile();
    renderAddresses();
    renderPastOrders();
  }

  function renderProfile() {
    const name = cleanText(profile.name) || 'Customer';
    const phone = normalizePhone(profile.phone || profile.mobile || profile.number || '');
    const digits = phone.digits || '0000000000';
    const displayPhone = phone.display || '+91-0000000000';

    els.profileName.textContent = name;
    els.nameFieldValue.textContent = name;
    els.profilePhone.textContent = displayPhone;
    els.phoneDigits.textContent = digits;

    if (profile.avatarDataUrl) {
      els.avatarCircle.innerHTML = '<img alt="Profile photo" src="' + escapeAttribute(profile.avatarDataUrl) + '" />';
    } else {
      els.avatarCircle.innerHTML = '<span id="avatarInitial">' + escapeHtml(getInitial(name)) + '</span>';
      els.avatarInitial = $('#avatarInitial');
    }
  }

  function renderAddresses() {
    const addresses = getSavedAddresses();
    els.savedAddressList.innerHTML = '';

    if (!addresses.length) {
      els.savedAddressList.innerHTML = '<div class="empty-state">No saved address yet. Add one from the map flow.</div>';
      return;
    }

    const capped = addresses.slice(0, 6);
    capped.forEach(function (address, index) {
      const row = document.createElement('div');
      row.className = 'address-row';
      row.innerHTML = `
        <div class="inside-wrap">
          <div class="address-left-group">
            <div class="title-with-icon">
              ${getAddressIcon(address.type || address.title || '')}
              <span class="address-title-text">${escapeHtml(address.title || address.type || 'Saved address')}</span>
            </div>
            <div class="address-line">${escapeHtml(address.line || 'Address details not available')}</div>
          </div>
          <button class="edit-button" type="button" data-address-index="${index}" aria-label="Edit ${escapeAttribute(address.title || 'address')}">
            ${editIconSvg()}
            <span>Edit</span>
          </button>
        </div>
      `;
      row.querySelector('.edit-button').addEventListener('click', function () {
        localStorage.setItem('TIFFIN_PROFILE_EDIT_ADDRESS_INDEX', String(index));
        location.href = 'menu.html?openLocation=1&returnTo=profile&profileAction=editAddress&addressIndex=' + encodeURIComponent(index);
      });
      els.savedAddressList.appendChild(row);
      if (index < capped.length - 1) {
        const divider = document.createElement('div');
        divider.className = 'divider';
        els.savedAddressList.appendChild(divider);
      }
    });
  }

  function renderPastOrders() {
    const orders = getPastOrders();
    els.pastOrdersList.innerHTML = '';

    if (!orders.length) {
      els.pastOrdersList.innerHTML = '<div class="empty-state">No past orders yet. Completed orders will appear here.</div>';
      return;
    }

    orders.slice(0, 5).forEach(function (order) {
      const card = document.createElement('div');
      card.className = 'item-card';
      const itemsHtml = buildItemsHtml(order.items);
      card.innerHTML = `
        <div class="order-header-card">
          <div class="order-left-content">
            <div class="item-img">${order.image ? '<img alt="Order image" src="' + escapeAttribute(order.image) + '" />' : foodIconSvg()}</div>
            <div class="item-title">
              <div class="restaurant-name">${escapeHtml(order.restaurantName || 'Coimbatore Foods')}</div>
              <div class="order-id">Order ID #${escapeHtml(order.id || '----')}</div>
            </div>
          </div>
        </div>
        <div class="item-list">${itemsHtml}</div>
        <div class="divider" aria-hidden="true"></div>
        <div class="cta-time-info">
          <button class="view-details" type="button">View details</button>
          <div class="time-value">
            <div>Order placed: ${escapeHtml(formatOrderDate(order.createdAt || order.date || order.timestamp))}</div>
            <div class="total"><span>Total value: </span><span class="amount">₹${escapeHtml(formatMoney(order.total || order.totalPaid || order.amount || 0))}</span></div>
          </div>
        </div>
      `;
      card.querySelector('.view-details').addEventListener('click', function () {
        if (order.id) localStorage.setItem('TIFFIN_SELECTED_ORDER_ID', String(order.id));
        location.href = 'track-fullscreen.html?orderId=' + encodeURIComponent(order.id || '');
      });
      els.pastOrdersList.appendChild(card);
    });
  }

  function loadProfile() {
    let stored = null;
    for (const key of PROFILE_KEYS) {
      stored = parseJson(localStorage.getItem(key));
      if (stored && typeof stored === 'object' && !Array.isArray(stored)) break;
      stored = null;
    }

    const auth = parseJson(localStorage.getItem('cust_auth')) || parseJson(localStorage.getItem('customerAuth')) || null;
    const rawPhone = localStorage.getItem('TIFFIN_CUSTOMER_PHONE') || localStorage.getItem('customer_phone') || localStorage.getItem('mobile') || '';
    const authObj = auth && typeof auth === 'object' ? auth : {};

    return Object.assign({
      name: authObj.name || authObj.displayName || stored?.name || stored?.displayName || localStorage.getItem('TIFFIN_CUSTOMER_NAME') || 'Customer',
      phone: authObj.phone || authObj.mobile || authObj.phoneNumber || stored?.phone || stored?.mobile || rawPhone,
      avatarDataUrl: stored?.avatarDataUrl || stored?.avatar || ''
    }, stored || {});
  }

  function persistProfile(nextProfile) {
    profile = Object.assign({}, profile, nextProfile);
    localStorage.setItem('TIFFIN_CUSTOMER_PROFILE', JSON.stringify(profile));
    if (profile.name) localStorage.setItem('TIFFIN_CUSTOMER_NAME', profile.name);
  }

  function getSavedAddresses() {
    const seen = new Set();
    const addresses = [];

    ADDRESS_KEYS.forEach(function (key) {
      const parsed = parseJson(localStorage.getItem(key));
      pushAddressCollection(parsed, addresses, seen);
    });

    ACTIVE_LOCATION_KEYS.forEach(function (key) {
      const parsed = parseJson(localStorage.getItem(key));
      pushAddressCollection(parsed, addresses, seen, true);
    });

    return addresses;
  }

  function pushAddressCollection(value, addresses, seen, activeOnly) {
    if (!value) return;
    const collection = Array.isArray(value) ? value : (Array.isArray(value.addresses) ? value.addresses : [value]);
    collection.forEach(function (item) {
      const normalized = normalizeAddress(item, activeOnly);
      if (!normalized) return;
      const signature = (normalized.title + '|' + normalized.line + '|' + normalized.lat + '|' + normalized.lng).toLowerCase();
      if (seen.has(signature)) return;
      seen.add(signature);
      addresses.push(normalized);
    });
  }

  function normalizeAddress(item, activeOnly) {
    if (!item || typeof item !== 'object') return null;
    const title = cleanText(item.title || item.label || item.type || item.name || (activeOnly ? 'Current location' : 'Saved address'));
    const parts = [
      item.doorNo || item.door || item.house || item.houseNo || item.flat || '',
      item.addressDetails || item.addressLine || item.address || item.formattedAddress || item.line1 || item.text || '',
      item.landmark || '',
      item.area || '',
      item.city || ''
    ].map(cleanText).filter(Boolean);
    const line = cleanText(parts.join(', '));
    if (!title && !line) return null;
    return {
      title: title || 'Saved address',
      type: cleanText(item.type || item.label || title),
      line: line || 'Location saved',
      lat: item.lat || item.latitude || item?.coords?.lat || item?.location?.lat || '',
      lng: item.lng || item.longitude || item?.coords?.lng || item?.location?.lng || ''
    };
  }

  function getPastOrders() {
    const result = [];
    const seen = new Set();

    ORDER_KEYS.forEach(function (key) {
      pushOrderCollection(parseJson(localStorage.getItem(key)), result, seen);
    });

    // Safe fallback: scan localStorage for project order arrays without assuming one fixed key.
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i) || '';
      if (!/order/i.test(key)) continue;
      pushOrderCollection(parseJson(localStorage.getItem(key)), result, seen);
    }

    return result
      .filter(function (order) { return isPastOrder(order); })
      .sort(function (a, b) { return getTime(b.createdAt || b.date || b.timestamp) - getTime(a.createdAt || a.date || a.timestamp); });
  }

  function pushOrderCollection(value, result, seen) {
    if (!value) return;
    const collection = Array.isArray(value) ? value : (Array.isArray(value.orders) ? value.orders : [value]);
    collection.forEach(function (item) {
      const normalized = normalizeOrder(item);
      if (!normalized) return;
      const id = String(normalized.id || normalized.createdAt || normalized.total || JSON.stringify(normalized.items)).slice(0, 140);
      if (seen.has(id)) return;
      seen.add(id);
      result.push(normalized);
    });
  }

  function normalizeOrder(item) {
    if (!item || typeof item !== 'object') return null;
    const rawItems = Array.isArray(item.items) ? item.items : Array.isArray(item.cartItems) ? item.cartItems : Array.isArray(item.orderItems) ? item.orderItems : [];
    const items = rawItems.map(function (entry) {
      return {
        name: cleanText(entry.name || entry.title || entry.itemName || 'Item'),
        qty: Number(entry.qty || entry.quantity || entry.count || 1) || 1
      };
    }).filter(function (entry) { return entry.name; });

    if (!items.length && !item.id && !item.orderId) return null;

    return {
      id: item.orderId || item.id || item.orderNo || item.orderNumber || '',
      status: cleanText(item.status || item.orderStatus || ''),
      restaurantName: cleanText(item.restaurantName || item.storeName || 'Coimbatore Foods'),
      items: items.length ? items : [{ name: 'Order items', qty: 1 }],
      total: item.total || item.totalPaid || item.grandTotal || item.amount || item.payableAmount || 0,
      createdAt: item.createdAt || item.orderPlacedAt || item.date || item.timestamp || '',
      image: item.image || item.restaurantImage || item.itemImage || ''
    };
  }

  function isPastOrder(order) {
    const status = String(order.status || '').toLowerCase();
    if (!status) return true;
    return ['delivered', 'completed', 'complete', 'cancelled', 'canceled', 'rejected'].some(function (word) {
      return status.includes(word);
    });
  }

  function buildItemsHtml(items) {
    return (items || []).slice(0, 6).map(function (item, index, arr) {
      const comma = index < arr.length - 1 ? '<span>,</span>' : '';
      return `<div class="item-chip"><span>${escapeHtml(item.name)}</span><span class="count">${escapeHtml(String(item.qty || 1))}</span>${comma}</div>`;
    }).join('');
  }

  function openNameSheet() {
    els.nameInput.value = cleanText(profile.name) || '';
    els.nameSheet.classList.add('show');
    els.nameSheet.setAttribute('aria-hidden', 'false');
    setTimeout(function () { els.nameInput.focus(); els.nameInput.select(); }, 60);
  }

  function closeNameSheet() {
    els.nameSheet.classList.remove('show');
    els.nameSheet.setAttribute('aria-hidden', 'true');
  }

  function saveName() {
    const name = cleanText(els.nameInput.value);
    if (name.length < 2) {
      showToast('Enter a valid name');
      return;
    }
    persistProfile({ name: name });
    renderProfile();
    closeNameSheet();
    showToast('Name updated');
  }

  function saveAvatar(event) {
    const file = event.target.files && event.target.files[0];
    if (!file) return;
    if (!/^image\//.test(file.type)) {
      showToast('Choose an image file');
      return;
    }
    const reader = new FileReader();
    reader.onload = function () {
      persistProfile({ avatarDataUrl: String(reader.result || '') });
      renderProfile();
      showToast('Profile photo updated');
    };
    reader.onerror = function () { showToast('Could not read image'); };
    reader.readAsDataURL(file);
    event.target.value = '';
  }

  function goBack() {
    const params = new URLSearchParams(location.search);
    const from = params.get('from');
    if (from === 'menu') return location.href = 'menu.html';
    if (from === 'cart') return location.href = 'cart.html';
    if (from === 'orders') return location.href = 'track.html';
    if (document.referrer && !document.referrer.includes(location.pathname)) return history.back();
    location.href = 'menu.html';
  }

  function toggleMenu() {
    els.menuPopover.classList.toggle('show');
    els.menuPopover.setAttribute('aria-hidden', els.menuPopover.classList.contains('show') ? 'false' : 'true');
  }

  function closeMenu() {
    els.menuPopover.classList.remove('show');
    els.menuPopover.setAttribute('aria-hidden', 'true');
  }

  function logout() {
    closeMenu();
    [
      'cust_auth',
      'customerAuth',
      'TIFFIN_CUSTOMER_AUTH',
      'TIFFIN_AUTH_USER'
    ].forEach(function (key) { localStorage.removeItem(key); });
    showToast('Logged out');
    setTimeout(function () { location.replace('login.html?logout=1'); }, 250);
  }

  function getAddressIcon(value) {
    const lower = String(value || '').toLowerCase();
    if (lower.includes('home')) return homeIconSvg();
    if (lower.includes('office') || lower.includes('work')) return suitcaseIconSvg();
    if (lower.includes('gym') || lower.includes('fitness')) return dumbbellIconSvg();
    return '';
  }

  function editIconSvg() {
    return '<svg viewBox="0 0 20 20" fill="none" aria-hidden="true"><path d="M3.12 14.92 2.5 17.5l2.58-.62 9.79-9.79-1.96-1.96-9.79 9.79Z" fill="#08A045"/><path d="m13.73 4.3.94-.94a1.57 1.57 0 0 1 2.22 0l.25.25c.61.61.61 1.61 0 2.22l-.94.94-2.47-2.47Z" fill="#08A045"/></svg>';
  }

  function homeIconSvg() {
    return '<svg viewBox="0 0 20 20" fill="none" aria-hidden="true"><path d="M2.15 9.45 9.32 3.1a1.03 1.03 0 0 1 1.36 0l7.17 6.35a.75.75 0 0 1-.5 1.31h-.92v5.66c0 .74-.6 1.34-1.34 1.34h-3.2v-4.68H8.11v4.68h-3.2c-.74 0-1.34-.6-1.34-1.34v-5.66h-.92a.75.75 0 0 1-.5-1.31Z" fill="currentColor"/></svg>';
  }

  function suitcaseIconSvg() {
    return '<svg viewBox="0 0 20 20" fill="none" aria-hidden="true"><path d="M7.1 4.1c0-.9.73-1.62 1.62-1.62h2.56c.9 0 1.62.73 1.62 1.62v1.02h2.68c.9 0 1.62.73 1.62 1.62v8.67c0 .9-.73 1.62-1.62 1.62H4.42c-.9 0-1.62-.73-1.62-1.62V6.74c0-.9.73-1.62 1.62-1.62H7.1V4.1Zm1.35 1.02h3.1V4.1a.27.27 0 0 0-.27-.27H8.72a.27.27 0 0 0-.27.27v1.02Zm-4.3 4.1v1.13c1.72.78 3.65 1.18 5.85 1.18s4.13-.4 5.85-1.18V9.22H4.15Z" fill="currentColor"/></svg>';
  }

  function dumbbellIconSvg() {
    return '<svg viewBox="0 0 20 20" fill="none" aria-hidden="true"><path d="M4.2 7.15h1.35v5.7H4.2v1.15c0 .48-.38.86-.86.86H2.6a.86.86 0 0 1-.86-.86V6a.86.86 0 0 1 .86-.86h.74c.48 0 .86.38.86.86v1.15Zm2.7 1.9h6.2v1.9H6.9v-1.9Zm8.9-1.9V6c0-.48.38-.86.86-.86h.74c.48 0 .86.38.86.86v8c0 .48-.38.86-.86.86h-.74a.86.86 0 0 1-.86-.86v-1.15h-1.35v-5.7h1.35Z" fill="currentColor"/></svg>';
  }

  function foodIconSvg() {
    return '<svg viewBox="0 0 30 30" width="22" height="22" fill="none" aria-hidden="true"><path d="M15 4.5c5.8 0 10.5 4.7 10.5 10.5S20.8 25.5 15 25.5 4.5 20.8 4.5 15 9.2 4.5 15 4.5Z" fill="#8806CE" opacity=".16"/><path d="M8.2 15.4h13.6c-.3 3.5-3.24 6.25-6.8 6.25s-6.5-2.75-6.8-6.25Zm1.1-2.9c.9-2.65 3.1-4.15 5.7-4.15s4.8 1.5 5.7 4.15H9.3Z" fill="#8806CE"/></svg>';
  }

  function parseJson(value) {
    if (!value) return null;
    if (typeof value !== 'string') return value;
    const trimmed = value.trim();
    if (!trimmed) return null;
    try { return JSON.parse(trimmed); } catch (e) { return trimmed; }
  }

  function cleanText(value) {
    return String(value == null ? '' : value).replace(/\s+/g, ' ').trim();
  }

  function normalizePhone(value) {
    const raw = cleanText(value);
    const digitsOnly = raw.replace(/\D/g, '');
    let digits = digitsOnly;
    if (digits.length > 10 && digits.startsWith('91')) digits = digits.slice(-10);
    if (digits.length > 10) digits = digits.slice(-10);
    return {
      digits: digits,
      display: digits ? '+91-' + digits : ''
    };
  }

  function getInitial(name) {
    const text = cleanText(name) || 'Customer';
    return text.charAt(0).toUpperCase();
  }

  function formatOrderDate(value) {
    const time = getTime(value);
    if (!time) return 'Recently';
    const date = new Date(time);
    return date.toLocaleString('en-IN', {
      day: '2-digit', month: 'short', year: 'numeric',
      hour: 'numeric', minute: '2-digit', hour12: true
    }).replace(',', '');
  }

  function getTime(value) {
    if (!value) return 0;
    if (typeof value === 'number') return value;
    const parsed = Date.parse(value);
    return Number.isFinite(parsed) ? parsed : 0;
  }

  function formatMoney(value) {
    const amount = Number(value) || 0;
    return Math.round(amount).toLocaleString('en-IN');
  }

  function escapeHtml(value) {
    return String(value == null ? '' : value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function escapeAttribute(value) {
    return escapeHtml(value).replace(/`/g, '&#096;');
  }

  let toastTimer = null;
  function showToast(message) {
    clearTimeout(toastTimer);
    els.toast.textContent = message;
    els.toast.classList.add('show');
    toastTimer = setTimeout(function () { els.toast.classList.remove('show'); }, 1800);
  }
})();
</script>
</body>
</html>
