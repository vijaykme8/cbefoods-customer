<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tiffin CBE">
<meta name="theme-color" content="#8806CE">
<title>Track Order - Coimbatore Foods</title>
<link rel="manifest" id="pwa-manifest">
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.9.0/dist/maplibre-gl.css">
<script>
  if (!localStorage.getItem("cust_auth")) {
    window.location.replace("login.html");
  }
</script>
<style>
@font-face{font-family:'General Sans';src:url('./fonts/GeneralSans/GeneralSans-Regular.otf') format('opentype');font-weight:400;font-style:normal;font-display:swap}
@font-face{font-family:'General Sans';src:url('./fonts/GeneralSans/GeneralSans-Medium.otf') format('opentype');font-weight:500;font-style:normal;font-display:swap}
@font-face{font-family:'General Sans';src:url('./fonts/GeneralSans/GeneralSans-Semibold.otf') format('opentype');font-weight:600;font-style:normal;font-display:swap}
@font-face{font-family:'General Sans';src:url('./fonts/GeneralSans/GeneralSans-Bold.otf') format('opentype');font-weight:700;font-style:normal;font-display:swap}
:root{
  --white:#FDFDFF;--page:#F4F4F6;--ink:#12130F;--muted:rgba(18,19,15,.50);--soft:rgba(18,19,15,.08);
  --brand:#8806CE;--green:#08A045;--red:#E23009;--shadow:0 4px 18px rgba(0,0,0,.08)
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;min-height:100%;margin:0;background:var(--page);color:var(--ink);font-family:'General Sans',system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow-x:hidden}
button,a{font:inherit;color:inherit}button{border:0;background:transparent;padding:0;cursor:pointer}img{display:block;max-width:100%}
.track-shell{width:100%;max-width:390px;min-height:100dvh;margin:0 auto;background:linear-gradient(0deg,rgba(18,19,15,.02),rgba(18,19,15,.02)),var(--white);overflow-x:hidden}
.track-content{width:390px;min-height:100dvh;padding:40px 24px 30px;display:flex;flex-direction:column;gap:20px}
.map-wrap{width:342px;display:flex;flex-direction:column;gap:10px}
.top-bar{height:70px;width:342px;display:flex;align-items:flex-start;gap:30px;padding:10px 16px 10px 12px;border-radius:14px}
.back-btn{width:75px;height:30px;border-radius:14px;display:flex;align-items:center;gap:4px}
.back-icon{width:30px;height:30px;border-radius:99px;border:1px solid rgba(18,19,15,.20);position:relative;opacity:.75}
.back-icon:before{content:"";position:absolute;left:11px;top:9px;width:8px;height:8px;border-left:1.8px solid #12130F;border-bottom:1.8px solid #12130F;transform:rotate(45deg)}
.back-text{font-size:18px;font-weight:500;line-height:27px}
.deliver-to{flex:1;height:50px;display:flex;flex-direction:column;align-items:flex-end;justify-content:center;gap:4px}
.deliver-label{font-size:12px;font-weight:500;line-height:14.4px;color:var(--muted)}
.deliver-address{width:209px;height:32px;text-align:right;font-size:12px;font-weight:500;line-height:15.6px;color:var(--ink);display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;text-overflow:ellipsis;white-space:normal}
.map-section{width:342px;height:296px;position:relative;overflow:hidden;border-radius:14px;background:radial-gradient(circle at 22% 36%,rgba(8,160,69,.16),transparent 18%),radial-gradient(circle at 72% 25%,rgba(136,6,206,.16),transparent 20%),linear-gradient(135deg,#E8EBEF 0%,#FDFDFF 55%,#E9F7EF 100%)}
#trackOlaMapCanvas{position:absolute;inset:0;z-index:0;border-radius:14px;overflow:hidden;background:transparent;touch-action:none;overscroll-behavior:contain}
#trackOlaMapCanvas canvas{border-radius:14px;touch-action:none}
#trackOlaMapCanvas .maplibregl-control-container{display:none}
.map-message{position:absolute;left:16px;right:16px;top:16px;z-index:4;display:none;align-items:center;justify-content:center;min-height:34px;padding:8px 12px;border-radius:12px;background:rgba(253,253,255,.92);box-shadow:0 4px 12px rgba(0,0,0,.10);font-size:12px;font-weight:600;color:rgba(18,19,15,.70);text-align:center}
.fullscreen-btn{position:absolute;right:16px;bottom:20px;width:48px;height:48px;border-radius:50px;background:var(--white);box-shadow:2px 3px 14px rgba(0,0,0,.16),0 4px 8px rgba(0,0,0,.10);z-index:5;display:flex;align-items:center;justify-content:center}
.fullscreen-btn:before,.fullscreen-btn:after{content:"";position:absolute;width:13px;height:13px;border-color:#12130F;opacity:.7}
.fullscreen-btn:before{right:14px;top:13px;border-top:1.8px solid;border-right:1.8px solid}
.fullscreen-btn:after{left:14px;bottom:13px;border-left:1.8px solid;border-bottom:1.8px solid}
.map-controls{position:absolute;left:14px;bottom:14px;width:38px;display:flex;flex-direction:column;gap:6px;z-index:5;pointer-events:auto}
.map-control-btn{width:38px;height:38px;border-radius:999px;background:var(--white);box-shadow:0 4px 8px rgba(0,0,0,.14),1px 2px 10px rgba(0,0,0,.10);font-size:24px;font-weight:500;line-height:38px;display:flex;align-items:center;justify-content:center}
.map-control-btn:active,.back-btn:active,.fullscreen-btn:active,.green-button:active,.call-chip:active{transform:scale(.96)}
.track-marker{width:26px;height:26px;display:flex;align-items:center;justify-content:center;pointer-events:none}
.track-pin{width:22px;height:22px;border-radius:999px;border:3px solid var(--white);box-shadow:0 2px 8px rgba(0,0,0,.20)}
.track-pin.customer{background:var(--brand)}
.track-pin.restaurant{background:var(--green)}
.track-pin.rider{background:#111}
.track-pin.rider:before{content:"";display:block;width:8px;height:8px;background:var(--green);border-radius:99px;margin:4px auto}
.card{width:342px;background:var(--white);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
.status-card{border-radius:14px}
.status-head{height:36px;background:var(--brand);color:var(--white);display:flex;align-items:center;padding:0 18px;font-size:16px;font-weight:600;line-height:20px}
.status-body{padding:16px 18px 18px;display:flex;flex-direction:column;gap:14px}
.status-copy{font-size:14px;font-weight:600;line-height:18px}
.step-row{height:38px;display:grid;grid-template-columns:38px 1fr 38px 1fr 38px 1fr 38px;align-items:center}
.step-dot{width:38px;height:38px;border-radius:99px;background:rgba(18,19,15,.05);display:flex;align-items:center;justify-content:center;color:#888987;font-size:16px;font-weight:700}
.step-dot.active{background:var(--green);color:var(--white)}
.step-line{height:3px;background:#12130F;border-radius:20px;opacity:.85}
.step-line.active{background:var(--green);opacity:1}
.store-row{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.store-title{font-size:16px;font-weight:700;line-height:20px}
.eta-pill{margin-top:8px;display:inline-flex;align-items:center;justify-content:center;min-width:76px;height:30px;background:#12130F;border-radius:6px;color:var(--white);font-size:12px;font-weight:700}
.assigning{display:flex;align-items:center;gap:5px;color:var(--muted);font-size:12px;font-weight:500;white-space:nowrap;margin-top:18px}
.clock{width:14px;height:14px;border-radius:99px;border:1.5px solid rgba(18,19,15,.35);position:relative}
.clock:before{content:"";position:absolute;left:6px;top:3px;width:1px;height:5px;background:rgba(18,19,15,.35)}.clock:after{content:"";position:absolute;left:6px;top:7px;width:4px;height:1px;background:rgba(18,19,15,.35)}
.section-title{font-size:12px;font-weight:500;line-height:14.4px;margin-bottom:10px}
.rider-card{padding:16px 0 0;border-top:1px solid rgba(18,19,15,.08);box-shadow:none;border-radius:0;width:342px;background:transparent}
.rider-row{display:flex;align-items:center;justify-content:space-between;padding-bottom:14px;border-bottom:1px solid rgba(18,19,15,.12)}
.rider-left{display:flex;align-items:center;gap:8px}
.rider-avatar{width:36px;height:36px;border-radius:50%;overflow:hidden;background:linear-gradient(135deg,#EEE,#CCC);display:flex;align-items:center;justify-content:center;font-weight:700;color:#666}
.rider-name{font-size:14px;font-weight:500;line-height:19.6px}
.rider-actions{display:flex;align-items:center;gap:16px}
.call-chip{display:flex;align-items:center;gap:6px;font-size:14px;font-weight:500;text-decoration:none}
.call-circle{width:38px;height:38px;border-radius:99px;background:var(--brand);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px}
.text-circle{background:#12130F}
.summary-card{padding:16px;display:flex;flex-direction:column;gap:12px}
.summary-title{font-size:12px;font-weight:500;line-height:14.4px}
.summary-lines{padding:12px;background:var(--white);border-radius:10px;border:1px solid rgba(18,19,15,.12);display:flex;flex-direction:column;gap:9px}
.bill-line{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;font-size:12px;font-weight:400;line-height:14.4px}
.bill-line strong{font-weight:600}
.bill-price{font-size:14px;line-height:16.8px;text-align:right;white-space:nowrap}
.divider{height:1px;background:rgba(18,19,15,.12);margin:2px 0}
.green-button{width:342px;height:55px;border-radius:10px;background:var(--green);color:var(--white);font-size:18px;font-weight:600;display:flex;align-items:center;justify-content:center;text-decoration:none}
.toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);width:min(342px,calc(100vw - 32px));display:none;padding:12px 14px;border-radius:12px;background:#12130F;color:#fff;font-size:13px;font-weight:600;text-align:center;z-index:99}
@media(max-width:389px){.track-content,.track-shell{width:100%;max-width:390px}.map-wrap,.top-bar,.map-section,.card,.green-button{width:calc(100vw - 48px)}}
</style>
</head>
<body>
<main class="track-shell">
  <div class="track-content">
    <section class="map-wrap">
      <div class="top-bar">
        <button class="back-btn" id="backBtn" type="button" aria-label="Back to orders">
          <span class="back-icon" aria-hidden="true"></span>
          <span class="back-text">back</span>
        </button>
        <div class="deliver-to">
          <div class="deliver-label">Deliver to:</div>
          <div class="deliver-address" id="trackFullDeliveryAddress">Delivery address</div>
        </div>
      </div>

      <div class="map-section">
        <div id="trackOlaMapCanvas" aria-label="Delivery tracking map"></div>
        <div class="map-message" id="trackMapMessage">Loading map...</div>
        <button class="fullscreen-btn" id="trackFullscreenBtn" type="button" aria-label="Focus map"></button>
        <div class="map-controls" aria-label="Map controls">
          <button class="map-control-btn" id="trackMapZoomIn" type="button" aria-label="Zoom in">+</button>
          <button class="map-control-btn" id="trackMapZoomOut" type="button" aria-label="Zoom out">−</button>
        </div>
      </div>
    </section>

    <section class="card status-card">
      <div class="status-head" id="trackStatusHead">Order received</div>
      <div class="status-body">
        <div class="status-copy" id="trackStatusCopy">We have received your order.</div>
        <div class="step-row" aria-label="Order progress">
          <div class="step-dot" id="step0">▣</div><div class="step-line" id="line0"></div>
          <div class="step-dot" id="step1">▤</div><div class="step-line" id="line1"></div>
          <div class="step-dot" id="step2">✓</div><div class="step-line" id="line2"></div>
          <div class="step-dot" id="step3">⌂</div>
        </div>
        <div class="store-row">
          <div>
            <div class="store-title">Coimbatore Foods</div>
            <div class="eta-pill" id="trackFullEta">15 - 25 mins</div>
          </div>
          <div class="assigning"><span class="clock"></span><span id="trackRiderStatusText">Assigning Rider</span></div>
        </div>
      </div>
    </section>

    <section class="rider-card">
      <div class="section-title">Rider</div>
      <div class="rider-row">
        <div class="rider-left">
          <div class="rider-avatar" id="riderAvatar">A</div>
          <div class="rider-name" id="trackFullRiderName">Assigning rider</div>
        </div>
        <div class="rider-actions">
          <a class="call-chip" id="callRiderLink" href="#" aria-label="Call rider">
            <span class="call-circle">☎</span><span>Call</span>
          </a>
          <a class="call-chip" id="textRiderLink" href="#" aria-label="Text rider">
            <span class="call-circle text-circle">✉</span><span>Text</span>
          </a>
        </div>
      </div>
    </section>

    <section class="card summary-card">
      <div class="summary-title">Order summary</div>
      <div class="summary-lines" id="trackOrderSummary"></div>
    </section>

    <a class="green-button" href="track.html" id="backToOrdersBtn">Back to orders</a>
  </div>
</main>

<div class="toast" id="toast"></div>

<script src="firebase-config.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.12.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.12.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore-compat.js"></script>
<script src="https://unpkg.com/maplibre-gl@5.9.0/dist/maplibre-gl.js"></script>

<script>
(function trackFullscreenLagFix() {
  "use strict";

  const TRACK_DEBUG = false;
  const DEFAULT_RESTAURANT_LOCATION = {
    lat: 11.051992,
    lng: 77.0427325,
    name: "Coimbatore Foods",
    address: "Real Estates Covai, 9/102, Periyar Nagar, Coimbatore"
  };

  const state = {
    db: null,
    orderUnsub: null,
    currentOrder: null,
    renderScheduled: false,
    lastRenderSignature: "",
    map: null,
    mapReady: false,
    mapInitPromise: null,
    markers: { restaurant: null, customer: null, rider: null },
    lastMapSignature: "",
    lastFitSignature: "",
    lastStorageRefreshAt: 0
  };

  const $ = id => document.getElementById(id);

  function debug(...args) {
    if (TRACK_DEBUG) console.log("[Track live]", ...args);
  }

  function toast(message) {
    const el = $("toast");
    if (!el || !message) return;
    el.textContent = message;
    el.style.display = "block";
    clearTimeout(el.__timer);
    el.__timer = setTimeout(() => { el.style.display = "none"; }, 2200);
  }

  function readJSON(key) {
    try {
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : null;
    } catch (_) {
      return null;
    }
  }

  function writeJSON(key, value) {
    try {
      localStorage.setItem(key, JSON.stringify(value));
    } catch (_) {}
  }

  function clean(value) {
    return value === null || value === undefined ? "" : String(value).trim();
  }

  function escapeHTML(value) {
    return clean(value)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function money(value) {
    return `₹${Math.round(Number(value || 0)).toLocaleString("en-IN")}`;
  }

  function numberOrNull(value) {
    const num = Number(value);
    return Number.isFinite(num) ? num : null;
  }

  function normalizeLocation(value) {
    if (!value || typeof value !== "object") return null;

    const lat = numberOrNull(
      value.lat ?? value.latitude ?? value.coords?.lat ?? value.coords?.latitude ??
      value.location?.lat ?? value.location?.latitude
    );
    const lng = numberOrNull(
      value.lng ?? value.lon ?? value.long ?? value.longitude ?? value.coords?.lng ??
      value.coords?.lon ?? value.coords?.longitude ?? value.location?.lng ??
      value.location?.lon ?? value.location?.longitude
    );

    if (lat === null || lng === null) return null;

    return {
      lat,
      lng,
      address: clean(value.address || value.fullAddress || value.displayAddress || value.formattedAddress || value.name || "")
    };
  }

  function getOrderId(order) {
    return clean(order?.id || order?.orderId || order?.order_id || order?.receipt || order?.razorpayOrderId || order?.razorpay_order_id);
  }

  function normalizeOrders(value) {
    if (!value) return [];
    if (Array.isArray(value)) return value.filter(Boolean);
    if (typeof value === "object") return Object.values(value).filter(Boolean);
    return [];
  }

  function statusOf(order) {
    return clean(order?.adminStatus || order?.orderStatus || order?.deliveryStatus || order?.riderStatus || order?.status || "confirmed")
      .toLowerCase()
      .replace(/[\s-]+/g, "_");
  }

  function isOutForDelivery(order) {
    return ["picked_up", "pickup_done", "out_for_delivery", "outfordelivery", "on_the_way", "on_way"].includes(statusOf(order));
  }

  function isFinalStatus(order) {
    return ["delivered", "cancelled", "payment_failed"].includes(statusOf(order));
  }

  function activeIndexForStatus(status) {
    if (status === "preparing") return 1;
    if (["out_for_delivery", "picked_up", "pickup_done", "on_the_way", "on_way"].includes(status)) return 2;
    if (status === "delivered") return 3;
    if (["cancelled", "payment_failed"].includes(status)) return -1;
    return 0;
  }

  function statusCopy(order) {
    const status = statusOf(order);
    const rider = getRiderName(order);
    const map = {
      confirmed: { head: "Order received", body: "We have received your order.", rider: rider ? rider : "Assigning Rider" },
      preparing: { head: "Preparing", body: "Your food is being prepared.", rider: rider ? rider : "Assigning Rider" },
      out_for_delivery: { head: "Out for delivery", body: "Your order is on the way.", rider: rider ? "Rider assigned" : "Waiting for rider GPS" },
      picked_up: { head: "Out for delivery", body: "Your order is on the way.", rider: rider ? "Rider assigned" : "Waiting for rider GPS" },
      pickup_done: { head: "Out for delivery", body: "Your order is on the way.", rider: rider ? "Rider assigned" : "Waiting for rider GPS" },
      on_the_way: { head: "Out for delivery", body: "Your order is on the way.", rider: rider ? "Rider assigned" : "Waiting for rider GPS" },
      delivered: { head: "Delivered", body: "Your order was delivered.", rider: rider ? "Delivered by rider" : "Delivered" },
      cancelled: { head: "Cancelled", body: "This order was cancelled.", rider: "Cancelled" },
      payment_failed: { head: "Payment failed", body: "Payment was not completed.", rider: "Payment failed" }
    };
    return map[status] || map.confirmed;
  }

  function getRestaurantLocation(order) {
    return normalizeLocation(order?.restaurantLocation) ||
      normalizeLocation(order?.storeLocation) ||
      normalizeLocation(order?.adminLocation) ||
      normalizeLocation(readJSON("restaurant_location")) ||
      normalizeLocation(readJSON("admin_restaurant_location")) ||
      normalizeLocation(readJSON("default_restaurant_location")) ||
      DEFAULT_RESTAURANT_LOCATION;
  }

  function getCustomerLocation(order) {
    return normalizeLocation(order?.deliveryLocation) ||
      normalizeLocation(order?.customerLocation) ||
      normalizeLocation(order?.addressLocation) ||
      normalizeLocation(order?.location) ||
      normalizeLocation(readJSON("active_delivery_location")) ||
      normalizeLocation(readJSON("selectedDeliveryLocation")) ||
      normalizeLocation(readJSON("cust_location_details")) ||
      normalizeLocation(readJSON("delivery_location_details")) ||
      normalizeLocation({ lat: localStorage.getItem("cust_lat"), lng: localStorage.getItem("cust_lng") });
  }

  function getRiderLocation(order) {
    const point = normalizeLocation(order?.riderLocation) ||
      normalizeLocation(order?.liveRiderLocation) ||
      normalizeLocation(order?.deliveryPartnerLocation) ||
      normalizeLocation(order?.rider?.location) ||
      normalizeLocation({ lat: order?.riderLat, lng: order?.riderLng }) ||
      normalizeLocation({ lat: order?.assignedRiderLat, lng: order?.assignedRiderLng }) ||
      normalizeLocation(readJSON(`rider_location_${getOrderId(order)}`)) ||
      normalizeLocation(readJSON(`delivery_partner_location_${getOrderId(order)}`)) ||
      normalizeLocation(readJSON("rider_live_location")) ||
      normalizeLocation(readJSON("delivery_partner_location")) ||
      normalizeLocation(readJSON("active_rider_location"));

    return point ? { ...point, live: true } : null;
  }

  function getAddress(order) {
    const fromOrder = clean(order?.deliveryAddress || order?.address || order?.delivery_address || order?.addressText);
    if (fromOrder) return fromOrder;

    const customerLocation = getCustomerLocation(order);
    if (customerLocation?.address) return customerLocation.address;

    const saved = readJSON("active_delivery_location") || readJSON("selectedDeliveryLocation") || {};
    return clean(saved.fullAddress || saved.displayAddress || saved.address || saved.full || saved.display) || "Delivery address";
  }

  function getEta(order) {
    return clean(order?.eta || order?.estimatedDeliveryTime || order?.deliveryEta || order?.deliveryTime || order?.timing) || "15 - 25 mins";
  }

  function getRiderName(order) {
    return clean(order?.assignedRiderName || order?.riderName || order?.deliveryPartnerName || order?.partnerName || order?.rider?.name);
  }

  function getRiderPhone(order) {
    return clean(order?.assignedRiderPhone || order?.riderPhone || order?.deliveryPartnerPhone || order?.partnerPhone || order?.rider?.phone);
  }

  function getItems(order) {
    const raw = order?.items || order?.cartItems || order?.orderItems || order?.summaryItems || [];
    return normalizeOrders(raw);
  }

  function itemName(item) {
    return clean(item?.name || item?.title || item?.itemName || item?.productName) || "Item";
  }

  function itemQty(item) {
    return Number(item?.qty ?? item?.quantity ?? item?.count ?? 1) || 1;
  }

  function itemPrice(item) {
    return Number(item?.price ?? item?.unitPrice ?? item?.amount ?? item?.total ?? 0) || 0;
  }

  function getTotals(order) {
    const items = getItems(order);
    const itemTotal = items.reduce((sum, item) => sum + itemQty(item) * itemPrice(item), 0);
    const totals = order?.totals || order?.bill || {};
    const subtotal = Number(totals.subtotal ?? totals.itemsTotal ?? order?.subtotal ?? itemTotal) || itemTotal;
    const tax = Number(totals.tax ?? totals.taxes ?? order?.tax ?? order?.taxes ?? 0) || 0;
    const deliveryFee = Number(totals.deliveryFee ?? totals.delivery ?? order?.deliveryFee ?? 0) || 0;
    const total = Number(totals.total ?? totals.toPay ?? order?.total ?? order?.amount ?? (subtotal + tax + deliveryFee)) || (subtotal + tax + deliveryFee);
    return { subtotal, tax, deliveryFee, total };
  }

  function getSelectedOrderFromStorage() {
    const params = new URLSearchParams(window.location.search);
    const queryId = params.get("orderId") || params.get("id") || "";

    const candidates = [
      readJSON("cbe_track_selected_order"),
      readJSON("current_order"),
      readJSON("active_order"),
      readJSON("pending_order"),
      readJSON("last_order"),
      readJSON("checkout_order_snapshot")
    ].filter(Boolean);

    const historyKeys = ["order_history", "orders", "customer_orders", "cbe_orders"];
    for (const key of historyKeys) {
      normalizeOrders(readJSON(key)).forEach(order => candidates.push(order));
    }

    if (queryId) {
      const match = candidates.find(order => getOrderId(order) === queryId);
      if (match) return match;
    }

    const active = candidates.find(order => !isFinalStatus(order));
    return active || candidates[0] || null;
  }

  function selectedOrderId() {
    const params = new URLSearchParams(window.location.search);
    const queryId = params.get("orderId") || params.get("id") || "";
    if (queryId) return queryId;
    return getOrderId(getSelectedOrderFromStorage());
  }

  function initFirebase() {
    if (!window.firebase || !window.TIFFIN_FIREBASE_CONFIG) return false;
    try {
      if (!firebase.apps.length) firebase.initializeApp(window.TIFFIN_FIREBASE_CONFIG);
      state.db = firebase.firestore();
      return true;
    } catch (error) {
      debug("firebase init skipped", error);
      return false;
    }
  }

  function subscribeOrder() {
    const orderId = selectedOrderId();
    if (!orderId || !state.db) return;

    if (state.orderUnsub) {
      try { state.orderUnsub(); } catch (_) {}
      state.orderUnsub = null;
    }

    state.orderUnsub = state.db.collection("orders").doc(orderId).onSnapshot(snapshot => {
      if (!snapshot.exists) {
        scheduleRender(getSelectedOrderFromStorage());
        return;
      }
      const order = { id: snapshot.id, ...snapshot.data() };
      state.currentOrder = order;
      writeJSON("cbe_track_selected_order", order);
      scheduleRender(order);
    }, () => {
      scheduleRender(getSelectedOrderFromStorage());
    });
  }

  function setText(id, value) {
    const el = $(id);
    if (el) el.textContent = value;
  }

  function renderProgress(status) {
    const activeIndex = activeIndexForStatus(status);
    for (let i = 0; i <= 3; i++) {
      const step = $(`step${i}`);
      if (step) step.classList.toggle("active", activeIndex >= i);
    }
    for (let i = 0; i <= 2; i++) {
      const line = $(`line${i}`);
      if (line) line.classList.toggle("active", activeIndex > i);
    }
  }

  function renderRiderActions(order) {
    const riderName = getRiderName(order) || "Assigning rider";
    const phone = getRiderPhone(order);
    setText("trackFullRiderName", riderName);
    const avatar = $("riderAvatar");
    if (avatar) avatar.textContent = riderName.slice(0, 1).toUpperCase() || "R";

    const call = $("callRiderLink");
    const text = $("textRiderLink");
    if (call) {
      call.href = phone ? `tel:${phone}` : "#";
      call.style.opacity = phone ? "1" : ".45";
      call.onclick = phone ? null : event => { event.preventDefault(); toast("Rider phone will appear after assignment."); };
    }
    if (text) {
      text.href = phone ? `sms:${phone}` : "#";
      text.style.opacity = phone ? "1" : ".45";
      text.onclick = phone ? null : event => { event.preventDefault(); toast("Rider phone will appear after assignment."); };
    }
  }

  function renderSummary(order) {
    const el = $("trackOrderSummary");
    if (!el) return;

    const items = getItems(order);
    const totals = getTotals(order);
    const rows = [];

    if (items.length) {
      items.forEach(item => {
        rows.push(`
          <div class="bill-line">
            <div>${itemQty(item)}x&nbsp; ${escapeHTML(itemName(item))}</div>
            <div class="bill-price">${money(itemQty(item) * itemPrice(item))}</div>
          </div>
        `);
      });
    } else {
      rows.push(`
        <div class="bill-line">
          <div>Order details</div>
          <div class="bill-price">—</div>
        </div>
      `);
    }

    rows.push(`
      <div class="divider"></div>
      <div class="bill-line"><div>Tax & charges</div><div class="bill-price">${totals.tax ? money(totals.tax) : "—"}</div></div>
      <div class="bill-line"><div>Delivery fee</div><div class="bill-price">${totals.deliveryFee ? money(totals.deliveryFee) : "—"}</div></div>
      <div class="divider"></div>
      <div class="bill-line"><strong>To pay</strong><strong class="bill-price">${totals.total ? money(totals.total) : "—"}</strong></div>
    `);

    el.innerHTML = rows.join("");
  }

  function render(orderInput) {
    const order = orderInput || state.currentOrder || getSelectedOrderFromStorage() || {};
    state.currentOrder = order;

    const status = statusOf(order);
    const copy = statusCopy(order);
    const signature = JSON.stringify({
      id: getOrderId(order),
      status,
      rider: getRiderName(order),
      phone: getRiderPhone(order),
      address: getAddress(order),
      eta: getEta(order),
      riderLoc: getRiderLocation(order),
      customerLoc: getCustomerLocation(order),
      total: getTotals(order).total,
      items: getItems(order).map(item => [itemName(item), itemQty(item), itemPrice(item)])
    });

    if (signature === state.lastRenderSignature) return;
    state.lastRenderSignature = signature;

    setText("trackFullDeliveryAddress", getAddress(order));
    setText("trackStatusHead", copy.head);
    setText("trackStatusCopy", copy.body);
    setText("trackFullEta", getEta(order));
    setText("trackRiderStatusText", copy.rider);

    renderProgress(status);
    renderRiderActions(order);
    renderSummary(order);
    updateMap(order);
  }

  function scheduleRender(order) {
    if (order) state.currentOrder = order;
    if (state.renderScheduled) return;
    state.renderScheduled = true;
    requestAnimationFrame(() => {
      state.renderScheduled = false;
      render(state.currentOrder);
    });
  }

  function showMapMessage(message, visible = true) {
    const el = $("trackMapMessage");
    if (!el) return;
    el.textContent = message || "";
    el.style.display = visible && message ? "flex" : "none";
  }

  function appendOlaApiKey(url, apiKey) {
    if (!apiKey || !url || !/^https?:\/\//i.test(url)) return url;
    try {
      const parsed = new URL(url);
      if (parsed.hostname.includes("olamaps.io") && !parsed.searchParams.get("api_key")) {
        parsed.searchParams.set("api_key", apiKey);
        return parsed.toString();
      }
    } catch (_) {}
    return url;
  }

  async function getOlaApiKey() {
    const saved = clean(localStorage.getItem("TIFFIN_OLA_MAPS_API_KEY") || localStorage.getItem("OLA_MAPS_API_KEY"));
    if (saved) return saved;

    const response = await fetch("/ola-maps?type=config", { cache: "no-store" });
    if (!response.ok) throw new Error("Ola map config failed");
    const data = await response.json();
    return clean(data.apiKey || data.key || "");
  }

  function makeMarkerElement(type) {
    const el = document.createElement("div");
    el.className = `track-marker track-marker-${type}`;
    const pin = document.createElement("div");
    pin.className = `track-pin ${type}`;
    el.appendChild(pin);
    return el;
  }

  function makeCurve(from, to) {
    if (!from || !to) return [];
    const points = [];
    const dx = to.lng - from.lng;
    const dy = to.lat - from.lat;
    const cx = (from.lng + to.lng) / 2 - dy * 0.32;
    const cy = (from.lat + to.lat) / 2 + dx * 0.32;
    for (let i = 0; i <= 42; i++) {
      const t = i / 42;
      const o = 1 - t;
      points.push([
        o * o * from.lng + 2 * o * t * cx + t * t * to.lng,
        o * o * from.lat + 2 * o * t * cy + t * t * to.lat
      ]);
    }
    return points;
  }

  function ensureRouteLayer() {
    const map = state.map;
    if (!map || !state.mapReady || !map.isStyleLoaded()) return false;

    if (!map.getSource("track-route-source")) {
      map.addSource("track-route-source", {
        type: "geojson",
        data: { type: "FeatureCollection", features: [] }
      });
    }

    if (!map.getLayer("track-route-line")) {
      map.addLayer({
        id: "track-route-line",
        type: "line",
        source: "track-route-source",
        layout: { "line-cap": "round", "line-join": "round" },
        paint: {
          "line-color": "#12130F",
          "line-width": 2.2,
          "line-dasharray": [1.5, 3],
          "line-opacity": 0.9
        }
      });
    }

    return true;
  }

  function upsertMarker(type, location, visible = true) {
    if (!state.map || !window.maplibregl || !location) return;
    if (!state.markers[type]) {
      state.markers[type] = new maplibregl.Marker({
        element: makeMarkerElement(type),
        anchor: "center"
      }).setLngLat([location.lng, location.lat]).addTo(state.map);
    } else {
      state.markers[type].setLngLat([location.lng, location.lat]);
    }
    state.markers[type].getElement().style.display = visible ? "flex" : "none";
  }

  async function initMap() {
    if (state.mapInitPromise) return state.mapInitPromise;

    state.mapInitPromise = (async () => {
      const container = $("trackOlaMapCanvas");
      if (!container || !window.maplibregl) return;

      try {
        showMapMessage("Loading map...", true);
        const apiKey = await getOlaApiKey();
        if (!apiKey) throw new Error("Ola API key missing");

        state.map = new maplibregl.Map({
          container,
          style: `https://api.olamaps.io/tiles/vector/v1/styles/default-light-standard/style.json?api_key=${encodeURIComponent(apiKey)}`,
          center: [DEFAULT_RESTAURANT_LOCATION.lng, DEFAULT_RESTAURANT_LOCATION.lat],
          zoom: 14,
          attributionControl: false,
          transformRequest: (url) => ({ url: appendOlaApiKey(url, apiKey) })
        });

        state.map.on("load", () => {
          state.mapReady = true;
          showMapMessage("", false);
          updateMap(state.currentOrder || getSelectedOrderFromStorage() || {});
        });

        state.map.on("error", () => {
          showMapMessage("Map tiles could not load. Check Ola key/domain.", true);
        });
      } catch (_) {
        showMapMessage("Map preview is unavailable now.", true);
      }
    })();

    return state.mapInitPromise;
  }

  function updateMap(order) {
    const customer = getCustomerLocation(order);
    const restaurant = getRestaurantLocation(order);
    const rider = getRiderLocation(order);
    const liveRider = isOutForDelivery(order) && rider;
    const start = liveRider ? rider : restaurant;
    const startType = liveRider ? "rider" : "restaurant";

    if (!customer || !start) {
      showMapMessage("Confirm delivery location to show map.", true);
      return;
    }

    const mapSignature = JSON.stringify({
      status: statusOf(order),
      startType,
      startLat: start.lat.toFixed(6),
      startLng: start.lng.toFixed(6),
      customerLat: customer.lat.toFixed(6),
      customerLng: customer.lng.toFixed(6)
    });

    if (!state.map) {
      initMap();
      return;
    }

    if (!state.mapReady || !state.map.isStyleLoaded()) return;
    if (mapSignature === state.lastMapSignature) return;
    state.lastMapSignature = mapSignature;

    upsertMarker("customer", customer, true);
    upsertMarker("restaurant", restaurant, !liveRider);
    upsertMarker("rider", rider || restaurant, !!liveRider);

    if (ensureRouteLayer()) {
      const source = state.map.getSource("track-route-source");
      const coordinates = makeCurve(start, customer);
      source.setData({
        type: "FeatureCollection",
        features: coordinates.length ? [{
          type: "Feature",
          geometry: { type: "LineString", coordinates },
          properties: {}
        }] : []
      });
    }

    const fitSignature = `${start.lat.toFixed(4)},${start.lng.toFixed(4)}-${customer.lat.toFixed(4)},${customer.lng.toFixed(4)}`;
    if (state.lastFitSignature !== fitSignature) {
      state.lastFitSignature = fitSignature;
      const bounds = new maplibregl.LngLatBounds();
      bounds.extend([start.lng, start.lat]);
      bounds.extend([customer.lng, customer.lat]);
      state.map.fitBounds(bounds, { padding: 56, maxZoom: 15.4, duration: 0 });
    }

    showMapMessage("", false);
  }

  function setupControls() {
    $("backBtn")?.addEventListener("click", () => { window.location.href = "track.html"; });
    $("backToOrdersBtn")?.addEventListener("click", event => {
      event.preventDefault();
      window.location.href = "track.html";
    });

    $("trackMapZoomIn")?.addEventListener("click", () => state.map?.zoomIn({ duration: 180 }));
    $("trackMapZoomOut")?.addEventListener("click", () => state.map?.zoomOut({ duration: 180 }));
    $("trackFullscreenBtn")?.addEventListener("click", () => {
      if (!state.map) return;
      const order = state.currentOrder || getSelectedOrderFromStorage() || {};
      state.lastFitSignature = "";
      updateMap(order);
      state.map.resize();
    });

    window.addEventListener("storage", event => {
      const keys = [
        "current_order", "active_order", "pending_order", "last_order",
        "order_history", "orders", "cbe_track_selected_order",
        "rider_live_location", "delivery_partner_location", "active_rider_location",
        "active_delivery_location", "selectedDeliveryLocation", "restaurant_location",
        "admin_restaurant_location"
      ];
      if (!keys.includes(event.key)) return;

      const now = Date.now();
      if (now - state.lastStorageRefreshAt < 700) return;
      state.lastStorageRefreshAt = now;
      scheduleRender(getSelectedOrderFromStorage());
    });

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") {
        state.map?.resize();
        scheduleRender(getSelectedOrderFromStorage());
      }
    });

    window.addEventListener("pagehide", () => {
      if (state.orderUnsub) {
        try { state.orderUnsub(); } catch (_) {}
        state.orderUnsub = null;
      }
      if (state.map) {
        try { state.map.remove(); } catch (_) {}
        state.map = null;
      }
    });
  }

  function boot() {
    setupControls();
    state.currentOrder = getSelectedOrderFromStorage() || {};
    render(state.currentOrder);
    initFirebase();
    subscribeOrder();
    initMap();

    /*
      No fast setInterval here.
      Firestore onSnapshot updates the order instantly.
      Storage event updates local changes.
      This one light fallback only refreshes local cache every 30 seconds.
    */
    window.setInterval(() => {
      if (document.visibilityState !== "visible") return;
      scheduleRender(getSelectedOrderFromStorage());
    }, 30000);
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", boot, { once: true });
  } else {
    boot();
  }
})();
</script>
</body>
</html>
