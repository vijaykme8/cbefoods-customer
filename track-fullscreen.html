  max-width: 100vw !important;

function closestRouteIndex(coords,location){

}

function animateMarkerAlongCoords(marker,coords,duration=2600){
  if(!marker||!Array.isArray(coords)||coords.length<2)return;

  if(riderMarkerAnimationFrame)cancelAnimationFrame(riderMarkerAnimationFrame);

  const segments=[];
  let total=0;

  for(let i=0;i<coords.length-1;i++){
    const a=coords[i];
    const b=coords[i+1];

    const length=haversineMeters(
      {lat:a[1],lng:a[0]},
      {lat:b[1],lng:b[0]}
    );

    if(length>0){
      segments.push({a,b,length});
      total+=length;
    }
  }

  if(!segments.length){
    marker.setLngLat(coords[coords.length-1]);
    return;
  }

  const start=performance.now();

  function step(now){
    const t=Math.min(1,(now-start)/duration);
    const eased=1-Math.pow(1-t,3);
    const targetDistance=total*eased;

    let travelled=0;
    let active=segments[segments.length-1];

    for(const seg of segments){
      if(travelled+seg.length>=targetDistance){
        active=seg;
        break;
      }
      travelled+=seg.length;
    }

    const localT=Math.max(0,Math.min(1,(targetDistance-travelled)/active.length));
    const lng=active.a[0]+(active.b[0]-active.a[0])*localT;
    const lat=active.a[1]+(active.b[1]-active.a[1])*localT;

    marker.setLngLat([lng,lat]);

    if(t<1){
      riderMarkerAnimationFrame=requestAnimationFrame(step);
    }
  }

  riderMarkerAnimationFrame=requestAnimationFrame(step);
}

  return `<div data-layer="rider-content" class="cf-rider-content"><div data-layer="rider-info-group" class="cf-rider-info-group"><img alt="" src="./assets/track orders/track-screen/${icon}?v=statuscards2"><div id="trackFullAssigningRider" data-layer="${stateText}" class="cf-rider-state-text ${stateClass}">${stateText}</div></div>${details}</div>`;
}
function buildOrderStatusCard(o){
  const cfg=statusCardConfig(getStatusVariant(o));const etaText=htmlSafe(eta(o));
  return `<div data-layer="${cfg.layer}" class="cf-order-status-card ${cfg.cls}"><div data-layer="Highlight-info" class="cf-highlight-info"><div data-layer="${cfg.title}" class="cf-highlight-title">${cfg.title}</div></div><div data-layer="status-progress-bar-v${cfg.active>1?2:1}" class="cf-status-progress"><div data-layer="${cfg.copy}" class="cf-status-copy">${cfg.copy}</div><div data-layer="status-icons-set" class="cf-status-icons-set">${stepHtml(1,'status-order-received','status-order-received-icon.svg',cfg)}${connectorHtml(1,cfg)}${stepHtml(2,'status-preparing','status-preparing-icon.svg',cfg)}${connectorHtml(2,cfg)}${stepHtml(3,'status-outfordelivery','status-outfordelivery-icon.svg',cfg)}${connectorHtml(3,cfg)}${stepHtml(4,'status-delivered','status-delivered-icon.svg',cfg)}</div></div><div data-layer="eta&partner-content" class="cf-eta-partner-content"><div data-layer="eta-content" class="cf-eta-content"><div data-layer="Coimbatore Foods" class="cf-restaurant-name">Coimbatore Foods</div><div data-layer="eta-time" class="cf-eta-time"><span data-layer="25 - 35mins" id="trackFullEta">${etaText}</span></div></div>${riderCardHtml(o)}</div></div>`;
}
function renderStatusCard(o){const host=document.getElementById('trackOrderStatusCard');if(host)host.innerHTML=buildOrderStatusCard(o)}
function hydrate(){const o=getSelectedOrder();renderStatusCard(o);setText('trackFullDeliveryAddress',address(o));setText('trackFullEta',eta(o));const rider=riderName(o);setText('trackFullAssigningRider',hasAssignedRider(o)?'Rider Assigned':'Assigning Rider.');setText('trackFullRiderName',rider||'Assigning Rider');updateFrame77Rider(o);renderSummary(o)}
let pendingRiderRouteKey='';
let latestRequestedRiderKey='';

function riderKey(location){
  if(!location)return '';
  return `${Number(location.lat).toFixed(6)},${Number(location.lng).toFixed(6)}`;
}

async function updateRouteThenMoveRider(start,customer){
  if(!start||!customer)return;

  const nextKey=riderKey(start);
  latestRequestedRiderKey=nextKey;

  if(!riderMarker){
    riderMarker=upsert(riderMarker,'rider',start);
    await fetchRoadRoute(start,customer);
    return;
  }

  const current=riderMarker.getLngLat&&riderMarker.getLngLat();
  const currentLoc=current?{lat:current.lat,lng:current.lng}:null;
  const moved=currentLoc?haversineMeters(currentLoc,start):Infinity;

  if(moved<8){
    await fetchRoadRoute(start,customer);
    return;
  }

  if(pendingRiderRouteKey===nextKey)return;
  pendingRiderRouteKey=nextKey;

  const previousRoadRouteCoords=Array.isArray(currentRoadRouteCoords)?currentRoadRouteCoords.slice():[];
  const routeFollowPath=buildRouteFollowPath(currentLoc,start,previousRoadRouteCoords);

  // Fast visual route preview:
  // draw the remaining old road route from new rider GPS to customer immediately,
  // then replace it with fresh Ola route when the API response arrives.
  const instantRoutePreviewPath=buildRouteFollowPath(start,customer,previousRoadRouteCoords);
  if(instantRoutePreviewPath&&instantRoutePreviewPath.length>=3){
    drawRoadRoute(instantRoutePreviewPath);
  }

  const routeReady=await fetchRoadRoute(start,customer);

  if(latestRequestedRiderKey===nextKey){
    // Option B: route first, then marker follows road-route segment smoothly.
    if(routeFollowPath&&routeFollowPath.length>=2){
      animateMarkerAlongCoords(riderMarker,routeFollowPath);
    }else{
      riderMarker=upsert(riderMarker,'rider',start);
    }
  }

  pendingRiderRouteKey='';

  if(!routeReady){
    console.warn('Route was not refreshed; rider marker moved after keeping old route.');
  }
}

function renderMap(){
  if(!map||!map.isStyleLoaded())return;

  const o=getSelectedOrder();
  const r=restLoc(o),c=custLoc(o),rd=riderLoc(o);

  if(!c)return;

  if(outForDelivery(o)){
    if(restaurantMarker){
      restaurantMarker.remove();
      restaurantMarker=null;
    }

    const start=rd||r;

    customerMarker=upsert(customerMarker,'customer',c);
    updateRouteThenMoveRider(start,c);
    fit([start,c]);
    return;
  }

  if(riderMarker){
    riderMarker.remove();
    riderMarker=null;
  }

  restaurantMarker=upsert(restaurantMarker,'restaurant',r);
  customerMarker=upsert(customerMarker,'customer',c);
  setDottedCurve(r,c);
  fit([r,c]);
}

function bindTrackMapControls(){if(!map)return;const zoomIn=document.getElementById('trackMapZoomIn');const zoomOut=document.getElementById('trackMapZoomOut');if(zoomIn&&zoomIn.dataset.bound!=='1'){zoomIn.dataset.bound='1';zoomIn.addEventListener('click',event=>{event.preventDefault();event.stopPropagation();map.zoomIn({duration:180})})}if(zoomOut&&zoomOut.dataset.bound!=='1'){zoomOut.dataset.bound='1';zoomOut.addEventListener('click',event=>{event.preventDefault();event.stopPropagation();map.zoomOut({duration:180})})}}
function initMap(){const canvas=document.getElementById('trackOlaMapCanvas');if(!canvas||map||initializing)return;if(!window.CBEOlaMapV4||typeof window.CBEOlaMapV4.createMap!=='function')return;initializing=true;const o=getSelectedOrder();const center=custLoc(o)||restLoc(o);window.CBEOlaMapV4.createMap({container:canvas,center:[center.lng,center.lat],zoom:13.4,controls:false}).then(({map:created,maplibregl})=>{map=created;window.trackOlaMapInstance=map;maplibre=maplibregl||window.maplibregl;try{map.dragPan?.enable();map.touchZoomRotate?.enable();map.scrollZoom?.enable();map.keyboard?.enable();map.doubleClickZoom?.enable()}catch(_){}bindTrackMapControls();map.on('load',renderMap);if(map.loaded())renderMap()}).catch(e=>console.warn('Track Ola map failed to load',e)).finally(()=>{initializing=false})}
function boot(){bindFrame77RiderActions();hydrate();initMap();renderMap()}
function startLiveOrderListener(){const order=getSelectedOrder();const orderId=getOrderId(order);if(!orderId||liveUnsubscribe||!window.firebase||!window.TIFFIN_FIREBASE_CONFIG)return;try{if(!firebase.apps.length)firebase.initializeApp(window.TIFFIN_FIREBASE_CONFIG);liveUnsubscribe=firebase.firestore().collection('orders').doc(orderId).onSnapshot(snap=>{if(!snap.exists)return;const cloud=mergeOrder(order,{id:snap.id,...snap.data()});writeJSON('current_order',cloud);writeJSON('cbe_track_selected_order',cloud);boot()},err=>console.warn('Track live order sync failed',err))}catch(err){console.warn('Track live order listener failed',err)}}
document.addEventListener('click',e=>{if(e.target.closest('[data-layer="back-button"], [data-layer="back to orders-button"]'))window.location.href='track.html'},true);
window.renderTrackMapPreview=boot;window.renderRestaurantCustomerCurve=boot;window.addEventListener('storage',e=>{if(['current_order','order_history','pending_order','cbe_track_selected_order','restaurant_location','admin_restaurant_location','default_restaurant_location','active_delivery_location','rider_live_location'].includes(e.key))boot()});document.addEventListener('visibilitychange',()=>{if(!document.hidden)boot()});window.addEventListener('pagehide',()=>{try{if(liveUnsubscribe)liveUnsubscribe()}catch{}});boot();setTimeout(()=>{boot();startLiveOrderListener()},700);
})();
</script>
<script>
(function setupTrackMapFullscreenMode() {
  function resizeOlaMapAfterLayout() {
    window.dispatchEvent(new Event('resize'));

    if (window.trackOlaMapInstance && typeof window.trackOlaMapInstance.resize === 'function') {
      window.trackOlaMapInstance.resize();
    }

    if (typeof window.renderTrackMapPreview === 'function') {
      window.renderTrackMapPreview();
    }
  }

  function openFullscreenMap() {
    document.body.classList.add('track-map-fullscreen-open');
    window.setTimeout(resizeOlaMapAfterLayout, 80);
    window.setTimeout(resizeOlaMapAfterLayout, 320);
  }

  function closeFullscreenMap() {
    document.body.classList.remove('track-map-fullscreen-open');
    window.setTimeout(resizeOlaMapAfterLayout, 80);
    window.setTimeout(resizeOlaMapAfterLayout, 320);
  }

  document.addEventListener('click', function(event) {
    const fullscreenButton = event.target.closest('[data-layer="full screen-button"]');
    if (fullscreenButton) {
      event.preventDefault();
      event.stopPropagation();
      openFullscreenMap();
      return;
    }

    const fullscreenBack = event.target.closest('#trackMapFullscreenBack');
    if (fullscreenBack) {
      event.preventDefault();
      event.stopPropagation();
      closeFullscreenMap();
    }
  }, true);

  document.addEventListener('keydown', function(event) {
    if (event.key === 'Escape' && document.body.classList.contains('track-map-fullscreen-open')) {
      closeFullscreenMap();
    }
  });
})();
</script>
