<script>
const mf = { name: "Tiffin CBE", short_name: "Tiffin", start_url: "./", display: "standalone", background_color: "#FDFDFF", theme_color: "#8806CE" };
const blob = new Blob([JSON.stringify(mf)], { type: "application/json" });
document.getElementById("pwa-manifest").href = URL.createObjectURL(blob);
</script>
<script src="ola-map-v2.js"></script>
<script>

function loadCart() {
  try {
    const saved = JSON.parse(localStorage.getItem("cart")) || [];
    return Array.isArray(saved) ? saved : Object.values(saved);
  } catch (error) {
    return [];
  }
}
function loadOrder() {
  try {
    return JSON.parse(localStorage.getItem("current_order"));
  } catch (error) {
    return null;
  }
}
function formatRupee(value) {
  return `₹${Number(value || 0).toLocaleString("en-IN")}`;
}

function parseLocalJSON(value) {
  if (!value) return null;
  const trimmed = String(value).trim();
  if (!trimmed) return null;
  if (trimmed.startsWith("{") || trimmed.startsWith("[")) {
    try { return JSON.parse(trimmed); } catch (error) { return trimmed; }
  }
  return trimmed;
}
function cleanText(value) {
  if (value === null || value === undefined) return "";
  return String(value).trim();
}
function getReadableDeliveryAddress(order = null) {
  const orderAddress = cleanText(order?.address || order?.deliveryLocation?.address || order?.deliveryLocation?.fullAddress || order?.deliveryLocation?.full);
  if (orderAddress) return orderAddress;

  const keys = ["delivery_full_address", "cust_full_address", "delivery_address", "cust_address", "selected_address", "customer_address"];
  for (const key of keys) {
    const value = cleanText(localStorage.getItem(key));
    if (value) return value;
  }

  const saved = parseLocalJSON(localStorage.getItem("cust_location")) || parseLocalJSON(localStorage.getItem("delivery_location")) || {};
  const savedAddress = cleanText(saved.fullAddress || saved.full || saved.displayAddress || saved.address || saved.display);
  return savedAddress || "Delivery address";
}
function renderHeaderAddress(order = null) {
  const addressEl = document.getElementById("delivery-address");
  if (!addressEl) return;
  const address = getReadableDeliveryAddress(order);
  addressEl.textContent = address.length > 26 ? `${address.slice(0, 26)}..` : address;
  addressEl.title = address;
}
function updateCartBadge() {
  const badge = document.getElementById("cart-badge");
  const totalQty = loadCart().reduce((sum, item) => sum + (Number(item.qty) || 0), 0);
  badge.textContent = totalQty;
  badge.style.display = totalQty > 0 ? "flex" : "none";
}

let trackOlaMap = null;
let riderMarker = null;
let customerMarker = null;
let kitchenMarker = null;
let mapLibreLoadingPromise = null;
let liveTrackingTimer = null;
const OLA_PROXY_URL = "/.netlify/functions/ola-maps";

function getOlaMapsApiKey() {
  return "netlify_proxy";
}

function getOlaStyleUrl() {
  return `${OLA_PROXY_URL}?type=style&style=default-light-standard`;
}

function appendOlaApiKey(url) {
  return url;
}

function loadMapLibre() {
  if (window.maplibregl) return Promise.resolve(window.maplibregl);
  if (mapLibreLoadingPromise) return mapLibreLoadingPromise;

  mapLibreLoadingPromise = new Promise((resolve, reject) => {
    const script = document.createElement("script");
    script.src = "https://unpkg.com/maplibre-gl@5.9.0/dist/maplibre-gl.js";
    script.async = true;
    script.defer = true;
    script.onload = () => resolve(window.maplibregl);
    script.onerror = () => reject(new Error("MapLibre failed to load"));
    document.head.appendChild(script);
  });

  return mapLibreLoadingPromise;
}

function toNumber(value) {
  const num = Number(value);
  return Number.isFinite(num) ? num : null;
}

function normalizeLatLng(source) {
  if (!source || typeof source !== "object") return null;
  const lat = toNumber(source.lat ?? source.latitude);
  const lng = toNumber(source.lng ?? source.lon ?? source.longitude);
  if (lat === null || lng === null) return null;
  return { lat, lng };
}

function getDeliveryCoordinates(order) {
  const candidates = [
    order?.deliveryLocation,
    order?.location,
    parseLocalJSON(localStorage.getItem("cust_location_details")),
    parseLocalJSON(localStorage.getItem("delivery_location_details")),
    parseLocalJSON(localStorage.getItem("cust_location")),
    parseLocalJSON(localStorage.getItem("delivery_location")),
    { lat: localStorage.getItem("cust_lat"), lng: localStorage.getItem("cust_lng") }
  ];

  for (const candidate of candidates) {
    const point = normalizeLatLng(candidate);
    if (point) return point;
  }

  return null;
}

function getKitchenCoordinates() {
  const saved = normalizeLatLng(parseLocalJSON(localStorage.getItem("kitchen_location")) || {});
  return saved || { lat: 11.0168, lng: 76.9558 };
}

function getRiderLocation(order) {
  const directOrderPoint = normalizeLatLng(order?.riderLocation || { lat: order?.riderLat, lng: order?.riderLng });
  if (directOrderPoint) return { ...directOrderPoint, live: true };

  const orderId = cleanText(order?.id);
  const keys = [
    orderId ? `delivery_partner_location_${orderId}` : "",
    orderId ? `rider_location_${orderId}` : "",
    "delivery_partner_location",
    "rider_location",
    "active_rider_location",
    "partner_location"
  ].filter(Boolean);

  for (const key of keys) {
    const point = normalizeLatLng(parseLocalJSON(localStorage.getItem(key)) || {});
    if (point) return { ...point, live: true };
  }

  return { ...getKitchenCoordinates(), live: false };
}

function setTrackMapMessage(message, show = true) {
  const el = document.getElementById("trackMapMessage");
  if (!el) return;
  el.textContent = message;
  el.style.display = show ? "flex" : "none";
}

function updateTrackingStrip(riderPoint) {
  const title = document.getElementById("trackingTitle");
  const subtitle = document.getElementById("trackingSubtitle");
  const pill = document.getElementById("livePill");

  if (!title || !subtitle || !pill) return;

  if (riderPoint?.live) {
    title.textContent = "Delivery partner is live";
    subtitle.textContent = "Location updates while the rider keeps delivery PWA open.";
    pill.textContent = "LIVE";
    pill.style.background = "rgba(8, 160, 69, 0.10)";
    pill.style.color = "#08A045";
  } else {
    title.textContent = "Waiting for rider live location";
    subtitle.textContent = "Showing kitchen to your address until rider starts delivery.";
    pill.textContent = "WAITING";
    pill.style.background = "rgba(136, 6, 206, 0.10)";
    pill.style.color = "#8806CE";
  }
}

function updateRouteMetrics(route) {
  const etaEl = document.getElementById("routeEtaValue");
  const distanceEl = document.getElementById("routeDistanceValue");
  if (etaEl) etaEl.textContent = route?.durationText || "—";
  if (distanceEl) distanceEl.textContent = route?.distanceText || "—";
}

function updateLiveTrackingMap(order) {
  const customerPoint = getDeliveryCoordinates(order);
  const riderPoint = getRiderLocation(order);
  updateTrackingStrip(riderPoint);

  if (!customerPoint || !window.CBEMapV2) return;

  window.CBEMapV2.renderRouteMap({
    container: "trackLiveMap",
    messageEl: "trackMapMessage",
    customer: customerPoint,
    rider: riderPoint,
    riderColor: riderPoint?.live ? "#08A045" : "#E23009",
    customerColor: "#8806CE",
    routeColor: "#08A045",
    autoFollow: riderPoint?.live && order?.status === "out_for_delivery",
    fit: !(riderPoint?.live && order?.status === "out_for_delivery"),
    onRoute: updateRouteMetrics
  }).catch((error) => {
    console.log("Ola live map V2 error:", error);
    setTrackMapMessage("Ola Maps could not load. Check Netlify function and OLA_MAPS_API_KEY.");
  });
}

function initLiveTrackingMap(order) {
  const customerPoint = getDeliveryCoordinates(order);
  const riderPoint = getRiderLocation(order);
  updateTrackingStrip(riderPoint);

  if (!document.getElementById("trackLiveMap")) return;

  if (!customerPoint) {
    setTrackMapMessage("Confirm delivery location from menu to show the live map.");
    return;
  }

  updateLiveTrackingMap(order);
  clearInterval(liveTrackingTimer);
  liveTrackingTimer = setInterval(() => updateLiveTrackingMap(order), 5000);
}

function statusCopy(status) {
  const map = {
    confirmed: { chip: "✅ Confirmed", title: "Your lunch order is confirmed", sub: "Kitchen will start preparing your meal shortly.", activeIndex: 0 },
    preparing: { chip: "👨‍🍳 Preparing", title: "Your food is being prepared", sub: "The kitchen is packing your lunch fresh and warm.", activeIndex: 1 },
    out_for_delivery: { chip: "🛵 On the way", title: "Your lunch is moving towards you", sub: "Delivery partner is heading to your location.", activeIndex: 2 },
    delivered: { chip: "✅ Delivered", title: "Food delivered", sub: "Enjoy your fresh homemade meal.", activeIndex: 3 },
    payment_failed: { chip: "⚠️ Payment failed", title: "Payment was not completed", sub: "Your order was not confirmed. Please try payment again from cart.", activeIndex: -1 }
  };
  return map[status] || map.confirmed;
}
function paymentText(order) {
  if (order.paymentStatus === "paid") return { label: "Paid", className: "", chip: "💳 Paid" };
  if (order.paymentStatus === "failed") return { label: "Failed", className: "failed", chip: "⚠️ Failed" };
  return { label: "Pending", className: "failed", chip: "⏳ Pending" };
}
function renderNoOrder() {
  renderHeaderAddress();
  document.getElementById("hero-status-line").textContent = "No active order yet.";
  document.getElementById("hero-payment-line").textContent = "Add items and pay from cart to start tracking.";
  document.getElementById("order-chip").textContent = "📍 No order";
  document.getElementById("payment-chip").textContent = "💳 Not paid";
  document.getElementById("track-content").innerHTML = `
    <section class="empty-card">
      <div class="empty-icon">📍</div>
      <div class="empty-title">No active order</div>
      <div class="empty-copy">Once you complete payment, your order status and delivery updates will appear here.</div>
      <a class="primary-link" href="menu.html">Order lunch</a>
    </section>`;
}
function renderOrder(order) {
  renderHeaderAddress(order);
  const deliveryAddress = getReadableDeliveryAddress(order);
  const copy = statusCopy(order.status);
  const payment = paymentText(order);
  const items = order.items || [];
  const total = order.totals?.total ?? items.reduce((sum, item) => sum + ((Number(item.price) || 0) * (Number(item.qty) || 0)), 0);
  const createdDate = order.createdAt ? new Date(order.createdAt) : new Date();
  const timeText = createdDate.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  const orderId = String(order.id || "");
  const paymentId = order.paymentId ? String(order.paymentId) : "Pending";

  document.getElementById("hero-status-line").textContent = copy.sub;
  document.getElementById("hero-payment-line").textContent = `${payment.label} · ${order.eta || "15 - 25 mins"}`;
  document.getElementById("order-chip").textContent = copy.chip;
  document.getElementById("payment-chip").textContent = payment.chip;

  const steps = [
    { key: "confirmed", name: "Order confirmed", time: "Payment received and order placed." },
    { key: "preparing", name: "Preparing food", time: "Kitchen is packing your lunch." },
    { key: "out_for_delivery", name: "Out for delivery", time: "Delivery partner is heading to your location." },
    { key: "delivered", name: "Delivered", time: "Food delivered warm and fresh." }
  ];
  const activeIndex = copy.activeIndex;
  const stepHtml = steps.map((step, index) => {
    const state = activeIndex < 0 ? "" : index < activeIndex ? "done" : index === activeIndex ? "active" : "";
    const marker = activeIndex >= 0 && index < activeIndex ? "✓" : index + 1;
    return `<article class="step-card ${state}"><div class="step-dot">${marker}</div><div><div class="step-name">${step.name}</div><div class="step-time">${step.time}</div></div></article>`;
  }).join("");
  const itemHtml = items.map(item => `<div class="order-item"><span>${item.qty} × ${item.name}</span><strong>${formatRupee(item.price * item.qty)}</strong></div>`).join("");

  document.getElementById("track-content").innerHTML = `
    <section class="section">
      <div class="status-grid">
        <div class="info-card"><div class="info-label">ETA</div><div class="info-value green">${order.eta || "15 - 25 mins"}</div></div>
        <div class="info-card"><div class="info-label">Order ID</div><div class="info-value">#${orderId.slice(-6)}</div></div>
      </div>
    </section>

    <section class="section">
      <div class="section-header">
        <div class="section-title green">Delivery route</div>
        <div class="section-subtitle">Kitchen to your location.</div>
      </div>
      <div class="route-card">
        <div class="route-map">
          <div id="trackLiveMap" class="track-live-map" aria-label="Ola Maps live delivery tracking map"></div>
          <div id="trackMapMessage" class="map-message">Loading Ola Maps...</div>
        </div>
        <div class="tracking-status-strip">
          <div class="tracking-status-copy">
            <div class="tracking-title" id="trackingTitle">Preparing tracking</div>
            <div class="tracking-subtitle" id="trackingSubtitle">Live location appears when delivery starts.</div>
          </div>
          <div class="live-pill" id="livePill">WAITING</div>
        </div>
        <div class="route-metrics">
          <div class="route-metric"><span>ETA</span><strong id="routeEtaValue">—</strong></div>
          <div class="route-metric"><span>Distance</span><strong id="routeDistanceValue">—</strong></div>
        </div>
        <div class="route-label"><span>Delivery partner</span><span>${deliveryAddress || "Your address"}</span></div>
      </div>
    </section>

    <section class="section">
      <div class="section-header">
        <div class="section-title">Order timeline</div>
        <div class="section-subtitle">Current progress of your food.</div>
      </div>
      <div class="timeline-card"><div class="step-list">${stepHtml}</div></div>
    </section>

    <section class="section">
      <div class="section-header">
        <div class="section-title red">Payment details</div>
        <div class="section-subtitle">Razorpay payment reference.</div>
      </div>
      <div class="payment-card">
        <div class="payment-status ${payment.className}">${payment.label}</div>
        <div class="row"><span>Payment ID</span><strong>${paymentId}</strong></div>
        <div class="row"><span>Provider</span><strong>${order.paymentProvider || "Razorpay"}</strong></div>
        <div class="row"><span>Paid amount</span><strong>${formatRupee(total)}</strong></div>
      </div>
    </section>

    <section class="section">
      <div class="section-header">
        <div class="section-title green">Order summary</div>
        <div class="section-subtitle">Placed at ${timeText}</div>
      </div>
      <div class="order-card">
        <div class="row"><span>Delivery partner</span><strong id="deliveryPartnerName">Assigning soon</strong></div>
        <div class="order-items">${itemHtml}</div>
        <div class="order-total"><span>Total</span><strong>${formatRupee(total)}</strong></div>
      </div>
    </section>`;

  setTimeout(() => initLiveTrackingMap(order), 0);
}
function renderTrack() {
  const order = loadOrder();
  if (!order || !order.items || order.items.length === 0) {
    renderNoOrder();
    return;
  }
  renderOrder(order);
}
updateCartBadge();
renderTrack();
window.addEventListener("storage", () => { updateCartBadge(); renderTrack(); });
</script>
