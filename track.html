<script>
function loadCart() {
  try {
    const saved = JSON.parse(localStorage.getItem("cart")) || [];
    return Array.isArray(saved) ? saved : Object.values(saved);
  } catch (error) {
    return [];
  }
}

function loadOrder() {
  try {
    return JSON.parse(localStorage.getItem("current_order"));
  } catch (error) {
    return null;
  }
}

function parseLocalJSON(value) {
  if (!value) return null;
  const trimmed = String(value).trim();
  if (!trimmed) return null;
  if (trimmed.startsWith("{") || trimmed.startsWith("[")) {
    try { return JSON.parse(trimmed); } catch (error) { return null; }
  }
  return null;
}

function cleanText(value) {
  if (value === null || value === undefined) return "";
  return String(value).trim();
}

function escapeHTML(value) {
  return cleanText(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function formatRupee(value) {
  return `₹${Number(value || 0).toLocaleString("en-IN")}`;
}

function formatDistance(meters) {
  const value = Number(meters || 0);
  if (!value) return "—";
  if (value < 1000) return `${Math.round(value)} m`;
  return `${(value / 1000).toFixed(value < 10000 ? 1 : 0)} km`;
}

function formatDuration(seconds) {
  const value = Number(seconds || 0);
  if (!value) return "—";
  const mins = Math.max(1, Math.round(value / 60));
  if (mins < 60) return `${mins} min`;
  const hours = Math.floor(mins / 60);
  const rem = mins % 60;
  return rem ? `${hours}h ${rem}m` : `${hours}h`;
}

function updateCartBadge() {
  const badge = document.getElementById("cart-badge");
  if (!badge) return;
  const totalQty = loadCart().reduce((sum, item) => sum + (Number(item.qty) || 0), 0);
  badge.textContent = totalQty;
  badge.style.display = totalQty > 0 ? "flex" : "none";
}

function getReadableDeliveryAddress(order = null) {
  const orderAddress = cleanText(
    order?.address ||
    order?.deliveryLocation?.fullAddress ||
    order?.deliveryLocation?.displayAddress ||
    order?.deliveryLocation?.address ||
    order?.deliveryLocation?.full
  );
  if (orderAddress) return orderAddress;

  const keys = ["delivery_full_address", "cust_full_address", "delivery_address", "cust_address", "selected_address", "customer_address"];
  for (const key of keys) {
    const value = cleanText(localStorage.getItem(key));
    if (value) return value;
  }

  const saved =
    parseLocalJSON(localStorage.getItem("cust_location_details")) ||
    parseLocalJSON(localStorage.getItem("delivery_location_details")) ||
    parseLocalJSON(localStorage.getItem("cust_location")) ||
    parseLocalJSON(localStorage.getItem("delivery_location")) ||
    {};

  return cleanText(saved.fullAddress || saved.full || saved.displayAddress || saved.address || saved.display) || "Delivery address";
}

function renderHeaderAddress(order = null) {
  const addressEl = document.getElementById("delivery-address");
  if (!addressEl) return;
  const address = getReadableDeliveryAddress(order);
  addressEl.textContent = address.length > 26 ? `${address.slice(0, 26)}..` : address;
  addressEl.title = address;
}

function toNumber(value) {
  const num = Number(value);
  return Number.isFinite(num) ? num : null;
}

function normalizeLatLng(source) {
  if (!source || typeof source !== "object") return null;
  const lat = toNumber(source.lat ?? source.latitude);
  const lng = toNumber(source.lng ?? source.lon ?? source.longitude);
  if (lat === null || lng === null) return null;
  return { lat, lng };
}

function getDeliveryCoordinates(order) {
  const candidates = [
    order?.deliveryLocation,
    order?.location,
    parseLocalJSON(localStorage.getItem("cust_location_details")),
    parseLocalJSON(localStorage.getItem("delivery_location_details")),
    parseLocalJSON(localStorage.getItem("cust_location")),
    parseLocalJSON(localStorage.getItem("delivery_location")),
    { lat: localStorage.getItem("cust_lat"), lng: localStorage.getItem("cust_lng") }
  ];

  for (const candidate of candidates) {
    const point = normalizeLatLng(candidate);
    if (point) return point;
  }

  return null;
}

function getKitchenCoordinates() {
  const saved = normalizeLatLng(parseLocalJSON(localStorage.getItem("kitchen_location")) || {});
  return saved || { lat: 11.0168, lng: 76.9558 };
}

function getRiderLocation(order) {
  const candidates = [
    order?.riderLocation,
    order?.deliveryPartnerLocation,
    { lat: order?.riderLat, lng: order?.riderLng },
    { lat: order?.assignedRiderLat, lng: order?.assignedRiderLng }
  ];

  for (const candidate of candidates) {
    const point = normalizeLatLng(candidate);
    if (point) return { ...point, live: true };
  }

  return { ...getKitchenCoordinates(), live: false };
}

function riderPhone(order) {
  return cleanText(order?.assignedRiderPhone || order?.riderPhone || order?.deliveryPartnerPhone || order?.rider?.phone);
}

function riderName(order) {
  return cleanText(order?.assignedRiderName || order?.riderName || order?.deliveryPartnerName || order?.rider?.name || "Delivery partner");
}

function statusCopy(status) {
  const map = {
    confirmed: { chip: "✅ Confirmed", title: "Your order is confirmed", sub: "Restaurant will start preparing your meal shortly.", activeIndex: 0, mapTitle: "Preparing your food", mapSub: "Rider location appears after pickup." },
    preparing: { chip: "👨‍🍳 Preparing", title: "Your food is being prepared", sub: "Fresh food is being packed for delivery.", activeIndex: 1, mapTitle: "Food is being prepared", mapSub: "We’ll show rider live location once delivery starts." },
    out_for_delivery: { chip: "🛵 On the way", title: "Your food is on the way", sub: "Track the rider moving towards your pinned location.", activeIndex: 2, mapTitle: "Rider is on the way", mapSub: "Live location updates while the rider app is open." },
    delivered: { chip: "✅ Delivered", title: "Food delivered", sub: "Enjoy your fresh homemade meal.", activeIndex: 3, mapTitle: "Delivered", mapSub: "Order completed successfully." },
    cancelled: { chip: "❌ Cancelled", title: "Order cancelled", sub: "This order was cancelled.", activeIndex: -1, mapTitle: "Order cancelled", mapSub: "No live delivery tracking available." },
    payment_failed: { chip: "⚠️ Payment failed", title: "Payment was not completed", sub: "Your order was not confirmed. Please try again from cart.", activeIndex: -1, mapTitle: "Payment failed", mapSub: "No live delivery tracking available." }
  };
  return map[status] || map.confirmed;
}

function paymentText(order) {
  if (order.paymentStatus === "paid") return { label: "Paid", className: "", chip: "💳 Paid" };
  if (order.paymentStatus === "failed") return { label: "Failed", className: "failed", chip: "⚠️ Failed" };
  return { label: "Pending", className: "failed", chip: "⏳ Pending" };
}

const trackMapState = {
  map: null,
  maplibregl: null,
  customerMarker: null,
  riderMarker: null,
  kitchenMarker: null,
  routeSourceReady: false,
  orderId: ""
};

function resetTrackMap() {
  if (trackMapState.map) {
    try { trackMapState.map.remove(); } catch (_) {}
  }
  trackMapState.map = null;
  trackMapState.maplibregl = null;
  trackMapState.customerMarker = null;
  trackMapState.riderMarker = null;
  trackMapState.kitchenMarker = null;
  trackMapState.routeSourceReady = false;
  trackMapState.orderId = "";
}

function makeMarker(className, label) {
  const el = document.createElement("div");
  el.className = `cbe-map-marker ${className}`;
  el.textContent = label;
  return el;
}

function setMapMessage(message, show = true) {
  const el = document.getElementById("trackMapMessage");
  if (!el) return;
  el.textContent = message;
  el.style.display = show ? "flex" : "none";
}

function setMetric(id, value) {
  const el = document.getElementById(id);
  if (el) el.textContent = value || "—";
}

function decodePolyline(str) {
  if (!str || typeof str !== "string") return [];
  let index = 0, lat = 0, lng = 0, coordinates = [];
  while (index < str.length) {
    let b, shift = 0, result = 0;
    do { b = str.charCodeAt(index++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20 && index < str.length);
    const dlat = ((result & 1) ? ~(result >> 1) : (result >> 1));
    lat += dlat;
    shift = 0; result = 0;
    do { b = str.charCodeAt(index++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20 && index < str.length);
    const dlng = ((result & 1) ? ~(result >> 1) : (result >> 1));
    lng += dlng;
    coordinates.push([lng / 1e5, lat / 1e5]);
  }
  return coordinates;
}

function findCoordinateArray(value) {
  if (!value) return null;
  if (Array.isArray(value)) {
    if (value.length >= 2 && typeof value[0] === "number" && typeof value[1] === "number") return null;
    const maybeCoordinates = value.filter(item => Array.isArray(item) && item.length >= 2 && typeof item[0] === "number" && typeof item[1] === "number");
    if (maybeCoordinates.length >= 2) return maybeCoordinates;
    for (const item of value) {
      const found = findCoordinateArray(item);
      if (found) return found;
    }
  }
  if (typeof value === "object") {
    if (value.type === "LineString" && Array.isArray(value.coordinates)) return value.coordinates;
    for (const item of Object.values(value)) {
      const found = findCoordinateArray(item);
      if (found) return found;
    }
  }
  return null;
}

function extractRouteInfo(data) {
  const route = data?.routes?.[0] || data?.route || data?.data?.routes?.[0] || data?.result?.routes?.[0] || null;
  const leg = route?.legs?.[0] || route?.leg || null;

  let coordinates =
    findCoordinateArray(route?.geometry) ||
    findCoordinateArray(route?.overview_geometry) ||
    findCoordinateArray(route?.polyline) ||
    findCoordinateArray(data?.geometry) ||
    null;

  const encoded =
    route?.overview_polyline?.points ||
    route?.overview_polyline ||
    route?.polyline ||
    route?.geometry;

  if (!coordinates && typeof encoded === "string") {
    coordinates = decodePolyline(encoded);
  }

  const distanceMeters =
    Number(leg?.distance?.value || leg?.distance || route?.distance || route?.distanceMeters || data?.distance || 0);
  const durationSeconds =
    Number(leg?.duration?.value || leg?.duration || route?.duration || route?.durationSeconds || data?.duration || 0);

  return {
    coordinates: Array.isArray(coordinates) && coordinates.length >= 2 ? coordinates : [],
    distanceText: leg?.distance?.text || route?.distanceText || formatDistance(distanceMeters),
    durationText: leg?.duration?.text || route?.durationText || formatDuration(durationSeconds),
    distanceMeters,
    durationSeconds
  };
}

function ensureRouteLayer(map) {
  if (!map || !map.loaded()) return false;

  if (!map.getSource("delivery-route")) {
    map.addSource("delivery-route", {
      type: "geojson",
      data: { type: "Feature", geometry: { type: "LineString", coordinates: [] }, properties: {} }
    });
  }

  if (!map.getLayer("delivery-route-shadow")) {
    map.addLayer({
      id: "delivery-route-shadow",
      type: "line",
      source: "delivery-route",
      layout: { "line-cap": "round", "line-join": "round" },
      paint: { "line-color": "rgba(18,19,15,0.18)", "line-width": 8, "line-opacity": 0.55 }
    });
  }

  if (!map.getLayer("delivery-route-line")) {
    map.addLayer({
      id: "delivery-route-line",
      type: "line",
      source: "delivery-route",
      layout: { "line-cap": "round", "line-join": "round" },
      paint: { "line-color": "#08A045", "line-width": 5, "line-opacity": 0.94 }
    });
  }

  return true;
}

function setRouteLine(coordinates) {
  const map = trackMapState.map;
  if (!map || !ensureRouteLayer(map)) return;
  const source = map.getSource("delivery-route");
  if (!source) return;
  source.setData({
    type: "Feature",
    geometry: { type: "LineString", coordinates: coordinates || [] },
    properties: {}
  });
}

function fitTrackBounds(points) {
  const map = trackMapState.map;
  const maplibregl = trackMapState.maplibregl;
  if (!map || !maplibregl) return;
  const valid = points.filter(point => point && Number.isFinite(point.lat) && Number.isFinite(point.lng));
  if (!valid.length) return;
  const bounds = new maplibregl.LngLatBounds([valid[0].lng, valid[0].lat], [valid[0].lng, valid[0].lat]);
  valid.forEach(point => bounds.extend([point.lng, point.lat]));
  map.fitBounds(bounds, { padding: { top: 68, right: 42, bottom: 152, left: 42 }, duration: 520, maxZoom: 16 });
}

async function renderTrackMap(order) {
  const customerPoint = getDeliveryCoordinates(order);
  const riderPoint = getRiderLocation(order);
  const startPoint = riderPoint?.live ? riderPoint : getKitchenCoordinates();
  const copy = statusCopy(order.status);

  if (!customerPoint) {
    setMapMessage("Confirm your delivery location from menu to show live tracking.");
    return;
  }

  if (!window.CBEOlaMapV4) {
    setMapMessage("Map helper is loading. Please refresh once.");
    return;
  }

  try {
    if (!trackMapState.map) {
      const created = await window.CBEOlaMapV4.createMap({
        container: "trackLiveMap",
        center: [customerPoint.lng, customerPoint.lat],
        zoom: 15.5,
        controls: true
      });
      trackMapState.map = created.map;
      trackMapState.maplibregl = created.maplibregl;
      trackMapState.map.on("load", () => renderTrackMap(order));
      trackMapState.map.on("error", (event) => console.log("Track map error:", event?.error || event));
    }

    const map = trackMapState.map;
    const maplibregl = trackMapState.maplibregl;

    if (!trackMapState.customerMarker) {
      trackMapState.customerMarker = new maplibregl.Marker({ element: makeMarker("customer", "⌂"), anchor: "center" }).addTo(map);
    }
    trackMapState.customerMarker.setLngLat([customerPoint.lng, customerPoint.lat]);

    if (!trackMapState.riderMarker) {
      trackMapState.riderMarker = new maplibregl.Marker({ element: makeMarker(riderPoint?.live ? "rider" : "kitchen", riderPoint?.live ? "↗" : "K"), anchor: "center" }).addTo(map);
    }
    trackMapState.riderMarker.getElement().className = `cbe-map-marker ${riderPoint?.live ? "rider" : "kitchen"}`;
    trackMapState.riderMarker.getElement().textContent = riderPoint?.live ? "↗" : "K";
    trackMapState.riderMarker.setLngLat([startPoint.lng, startPoint.lat]);

    setMapMessage("", false);
    document.getElementById("trackMapTopPill").textContent = riderPoint?.live ? "🟢 Live rider location" : "🟣 Route preview";
    document.getElementById("trackMapTitle").textContent = riderPoint?.live ? copy.mapTitle : "Waiting for rider pickup";
    document.getElementById("trackMapSubtitle").textContent = riderPoint?.live ? copy.mapSub : "Showing restaurant-to-address route until rider starts delivery.";
    const liveChip = document.getElementById("trackLiveChip");
    liveChip.textContent = riderPoint?.live ? "LIVE" : "WAITING";
    liveChip.classList.toggle("is-live", !!riderPoint?.live);

    try {
      const directions = await window.CBEOlaMapV4.directions(startPoint, customerPoint);
      const route = extractRouteInfo(directions);
      const routeCoords = route.coordinates.length ? route.coordinates : [[startPoint.lng, startPoint.lat], [customerPoint.lng, customerPoint.lat]];
      setRouteLine(routeCoords);
      setMetric("routeEtaValue", route.durationText);
      setMetric("routeDistanceValue", route.distanceText);
    } catch (routeError) {
      console.log("Directions fallback:", routeError);
      setRouteLine([[startPoint.lng, startPoint.lat], [customerPoint.lng, customerPoint.lat]]);
      setMetric("routeEtaValue", order.eta || "15 - 25 mins");
      setMetric("routeDistanceValue", "—");
    }

    if (riderPoint?.live && order.status === "out_for_delivery") {
      map.easeTo({ center: [riderPoint.lng, riderPoint.lat], zoom: Math.max(map.getZoom(), 15.5), duration: 650 });
    } else {
      fitTrackBounds([startPoint, customerPoint]);
    }
  } catch (error) {
    console.log("Track Map V4 error:", error);
    setMapMessage("Map could not load. Check Ola Maps key and Cloudflare /ola-maps function.");
  }
}

function renderNoOrder() {
  resetTrackMap();
  renderHeaderAddress();
  document.getElementById("hero-status-line").textContent = "No active order yet.";
  document.getElementById("hero-payment-line").textContent = "Add items and pay from cart to start tracking.";
  document.getElementById("order-chip").textContent = "📍 No order";
  document.getElementById("payment-chip").textContent = "💳 Not paid";
  document.getElementById("track-content").innerHTML = `
    <section class="empty-card">
      <div class="empty-icon">📍</div>
      <div class="empty-title">No active order</div>
      <div class="empty-copy">Once you complete payment, your order status and delivery updates will appear here.</div>
      <a class="primary-link" href="menu.html">Order lunch</a>
    </section>`;
}

function renderOrder(order) {
  resetTrackMap();
  renderHeaderAddress(order);

  const copy = statusCopy(order.status);
  const payment = paymentText(order);
  const items = order.items || [];
  const total = order.totals?.total ?? items.reduce((sum, item) => sum + ((Number(item.price) || 0) * (Number(item.qty) || 0)), 0);
  const createdDate = order.createdAt ? new Date(order.createdAt) : new Date();
  const timeText = createdDate.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  const orderId = String(order.id || "");
  const paymentId = order.paymentId ? String(order.paymentId) : "Pending";
  const phone = riderPhone(order);
  const destination = getReadableDeliveryAddress(order);

  document.getElementById("hero-status-line").textContent = copy.sub;
  document.getElementById("hero-payment-line").textContent = `${payment.label} · ${order.eta || "15 - 25 mins"}`;
  document.getElementById("order-chip").textContent = copy.chip;
  document.getElementById("payment-chip").textContent = payment.chip;

  const steps = [
    { key: "confirmed", name: "Order confirmed", time: "Payment received and order placed." },
    { key: "preparing", name: "Preparing food", time: "Restaurant is packing your food." },
    { key: "out_for_delivery", name: "Out for delivery", time: "Delivery partner is heading to your location." },
    { key: "delivered", name: "Delivered", time: "Food delivered warm and fresh." }
  ];

  const activeIndex = copy.activeIndex;
  const stepHtml = steps.map((step, index) => {
    const state = activeIndex < 0 ? "" : index < activeIndex ? "done" : index === activeIndex ? "active" : "";
    const marker = activeIndex >= 0 && index < activeIndex ? "✓" : index + 1;
    return `<article class="step-card ${state}"><div class="step-dot">${marker}</div><div><div class="step-name">${step.name}</div><div class="step-time">${step.time}</div></div></article>`;
  }).join("");

  const itemHtml = items.map(item => `<div class="order-item"><span>${escapeHTML(item.qty)} × ${escapeHTML(item.name)}</span><strong>${formatRupee(item.price * item.qty)}</strong></div>`).join("");

  document.getElementById("track-content").innerHTML = `
    <section class="section">
      <div class="track-v4-card">
        <div class="track-v4-map-wrap">
          <div id="trackLiveMap" class="track-v4-map" aria-label="Live delivery tracking map"></div>
          <div id="trackMapMessage" class="track-v4-map-message">Loading live map...</div>
          <div id="trackMapTopPill" class="track-v4-top-pill">Preparing map</div>
        </div>
        <div class="track-v4-bottom-sheet">
          <div class="track-v4-head">
            <div>
              <div class="track-v4-kicker">Delivery tracking</div>
              <div class="track-v4-title" id="trackMapTitle">${escapeHTML(copy.mapTitle)}</div>
              <div class="track-v4-subtitle" id="trackMapSubtitle">${escapeHTML(copy.mapSub)}</div>
            </div>
            <div class="track-v4-live-chip" id="trackLiveChip">WAITING</div>
          </div>
          <div class="track-v4-metrics">
            <div class="track-v4-metric"><span>ETA</span><strong id="routeEtaValue">${escapeHTML(order.eta || "15 - 25 mins")}</strong></div>
            <div class="track-v4-metric"><span>Distance</span><strong id="routeDistanceValue">—</strong></div>
          </div>
          <div class="track-v4-actions">
            ${phone ? `<a class="track-v4-action primary" href="tel:${escapeHTML(phone)}">Call rider</a>` : `<span class="track-v4-action">Rider assigning</span>`}
            <a class="track-v4-action" target="_blank" rel="noopener" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(destination)}">Open map</a>
          </div>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="section-header">
        <div class="section-title">Order timeline</div>
        <div class="section-subtitle">Current progress of your food.</div>
      </div>
      <div class="timeline-card"><div class="step-list">${stepHtml}</div></div>
    </section>

    <section class="section">
      <div class="section-header">
        <div class="section-title red">Payment details</div>
        <div class="section-subtitle">Razorpay payment reference.</div>
      </div>
      <div class="payment-card">
        <div class="payment-status ${payment.className}">${escapeHTML(payment.label)}</div>
        <div class="row"><span>Payment ID</span><strong>${escapeHTML(paymentId)}</strong></div>
        <div class="row"><span>Provider</span><strong>${escapeHTML(order.paymentProvider || "Razorpay")}</strong></div>
        <div class="row"><span>Paid amount</span><strong>${formatRupee(total)}</strong></div>
      </div>
    </section>

    <section class="section">
      <div class="section-header">
        <div class="section-title green">Order summary</div>
        <div class="section-subtitle">Placed at ${escapeHTML(timeText)}</div>
      </div>
      <div class="order-card">
        <div class="row"><span>Delivery partner</span><strong>${escapeHTML(riderName(order))}${phone ? `<br>${escapeHTML(phone)}` : ""}</strong></div>
        <div class="row"><span>Deliver to</span><strong>${escapeHTML(destination)}</strong></div>
        <div class="order-items">${itemHtml}</div>
        <div class="order-total"><span>Total</span><strong>${formatRupee(total)}</strong></div>
      </div>
    </section>`;

  setTimeout(() => renderTrackMap(order), 0);
}

function renderTrack() {
  const order = loadOrder();
  if (!order || !order.items || order.items.length === 0) {
    renderNoOrder();
    return;
  }
  renderOrder(order);
}

window.renderTrack = renderTrack;
updateCartBadge();
renderTrack();
window.addEventListener("storage", () => { updateCartBadge(); renderTrack(); });
</script>
