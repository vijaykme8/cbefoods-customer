<style>
@font-face {
  font-family: 'General Sans';
  src: url('./fonts/GeneralSans/GeneralSans-Regular.otf') format('opentype');
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: 'General Sans';
  src: url('./fonts/GeneralSans/GeneralSans-Medium.otf') format('opentype');
  font-weight: 500;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: 'General Sans';

  font-weight: 600;
  font-style: normal;

}
:root {
  --black: #12130F;
  --black-50: rgba(18, 19, 15, 0.50);
  --line: rgba(18, 19, 15, 0.12);
  --soft: rgba(18, 19, 15, 0.04);
  --soft-6: rgba(18, 19, 15, 0.06);
  --white: #FDFDFF;
  --pure-white: #FFFFFF;
  --green: #08A045;
  --violet: #8806CE;
  --muted: #888987;
  --red: #E23009;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  width: 100%;
  min-height: 100%;
  margin: 0;
  background: #F4F4F6;
  color: var(--black);
  font-family: 'General Sans', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
button, a { font: inherit; }
button { border: 0; background: transparent; padding: 0; cursor: pointer; }
a { color: inherit; text-decoration: none; }
.track-shell {
  width: 100%;
  max-width: 390px;
  min-height: 100dvh;
  margin: 0 auto;
  background: linear-gradient(0deg, rgba(18,19,15,.02), rgba(18,19,15,.02)), var(--white);
  overflow-x: hidden;
  padding-bottom: calc(96px + env(safe-area-inset-bottom));
}
.track-top-bar {
  position: sticky;
  top: 0;
  z-index: 20;
  width: 100%;
  height: 84px;
  padding: 40px 24px 20px;
  background: #fff;
  display: flex;
  align-items: center;
}
.track-title-row {
  width: 342px;
  height: 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.track-title-group { display: flex; align-items: center; gap: 6px; min-width: 0; }
.track-title-icon, .track-search-icon { width: 24px; height: 24px; color: var(--muted); flex: 0 0 auto; }
.track-title-text { font-size: 20px; font-weight: 600; line-height: 120%; color: var(--black); }
.track-content {
  width: 342px;
  max-width: calc(100vw - 48px);
  margin: 20px auto 0;
  display: flex;
  flex-direction: column;
  align-items: stretch;
}
.track-section-label {
  width: 100%;

}
.active-orders-list {

}
.track-empty-body {

}
.track-img {

.previous-orders-section {

  <header class="track-top-bar">

        <svg class="track-title-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M13 14.75H2C1.59 14.75 1.25 14.41 1.25 14V6C1.25 3.38 3.38 1.25 6 1.25H15C15.41 1.25 15.75 1.59 15.75 2V12C15.75 13.52 14.52 14.75 13 14.75Z" fill="currentColor"/><path d="M19 20.75H18C17.59 20.75 17.25 20.41 17.25 20C17.25 19.31 16.69 18.75 16 18.75C15.31 18.75 14.75 19.31 14.75 20C14.75 20.41 14.41 20.75 14 20.75H10C9.59 20.75 9.25 20.41 9.25 20C9.25 19.31 8.69 18.75 8 18.75C7.31 18.75 6.75 19.31 6.75 20C6.75 20.41 6.41 20.75 6 20.75H5C2.93 20.75 1.25 19.07 1.25 17V14C1.25 13.59 1.59 13.25 2 13.25H13C13.69 13.25 14.25 12.69 14.25 12V5C14.25 4.59 14.59 4.25 15 4.25H16.84C17.83 4.25 18.74 4.78 19.23 5.64L20.94 8.63C21.07 8.86 21.07 9.15 20.94 9.38C20.81 9.61 20.56 9.75 20.29 9.75H19C18.86 9.75 18.75 9.86 18.75 10V13C18.75 13.14 18.86 13.25 19 13.25H22C22.41 13.25 22.75 13.59 22.75 14V17C22.75 19.07 21.07 20.75 19 20.75Z" fill="currentColor"/></svg>

  <main class="track-content">

<script>
(function () {
  const activeCards = document.getElementById('activeOrderCards');
  const previousCards = document.getElementById('previousOrderCards');
  const emptyStateBlock = document.getElementById('emptyStateBlock');

  const ACTIVE_EXCLUDED = new Set(['delivered', 'completed', 'cancelled', 'canceled', 'payment_failed']);
  const PAST_STATUSES = new Set(['delivered', 'completed', 'cancelled', 'canceled', 'payment_failed']);

  function readJSON(key) {
    try {
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : null;
    } catch (_) {
      return null;
    }
  }

  function normalizeList(value) {
    if (!value) return [];
    if (Array.isArray(value)) return value.filter(Boolean);
    if (typeof value === 'object') return Object.values(value).filter(Boolean);
    return [];
  }

  function getAllOrderCandidates() {
    const keys = [
      'current_order',
      'order_history',
      'previous_orders',
      'orders',
      'customer_orders',
      'TIFFIN_ORDERS',
      'TIFFIN_CUSTOMER_ORDERS',
      'customerOrders',
      'pastOrders',
      'TIFFIN_ORDER_HISTORY',
      'pending_order'
    ];

    const orders = [];
    keys.forEach(key => {
      const value = readJSON(key);
      if (!value) return;
      if (Array.isArray(value)) {
        value.forEach(order => orders.push(order));
      } else if (typeof value === 'object') {
        if (value.items || value.id || value.orderId || value.status) orders.push(value);
        else normalizeList(value).forEach(order => orders.push(order));
      }
    });
    return orders.filter(order => order && typeof order === 'object');
  }

  function clean(value) { return value === null || value === undefined ? '' : String(value).trim(); }
  function escapeHtml(value) {
    return clean(value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function getOrderId(order) {
    const direct = order?.id || order?.orderId || order?.order_id || order?.receipt || order?.razorpayOrderId || order?.paymentId || order?.payment?.id || '';
    if (direct) return String(direct);
    const seed = JSON.stringify({
      createdAt: getDateSource(order),
      total: getTotal(order),
      phone: order?.customerPhone || order?.customer?.phone || '',
      items: getItems(order).map(item => [getItemName(item), getItemQty(item)])
    });
    let hash = 0;
    for (let i = 0; i < seed.length; i++) {
      hash = ((hash << 5) - hash) + seed.charCodeAt(i);
      hash |= 0;
    }
    return `LOCAL-${Math.abs(hash).toString(36).toUpperCase()}`;
  }

  function getStatus(order) {
    return clean(order?.adminStatus || order?.orderStatus || order?.deliveryStatus || order?.riderStatus || order?.status || 'confirmed')
      .toLowerCase()
      .replace(/[\s-]+/g, '_');
  }

  function isPastOrder(order) {
    const status = getStatus(order);
    return PAST_STATUSES.has(status) || Boolean(order?.deliveredAt || order?.completedAt || order?.cancelledAt || order?.canceledAt);
  }

  function getActiveOrders() {
    const seen = new Set();
    return getAllOrderCandidates()
      .filter(order => !ACTIVE_EXCLUDED.has(getStatus(order)))
      .filter(order => {
        const id = getOrderId(order);
        if (seen.has(id)) return false;
        seen.add(id);
        return true;
      })
      .sort((a, b) => (toDate(getDateSource(b)) || 0) - (toDate(getDateSource(a)) || 0));
  }

  function getPastOrders() {
    const activeIds = new Set(getActiveOrders().map(getOrderId));
    const seen = new Set();
    return getAllOrderCandidates()
      .filter(isPastOrder)
      .filter(order => !activeIds.has(getOrderId(order)))
      .filter(order => {
        const id = getOrderId(order);
        if (seen.has(id)) return false;
        seen.add(id);
        return true;
      })
      .sort((a, b) => (toDate(getDateSource(b)) || 0) - (toDate(getDateSource(a)) || 0));
  }

  function getItems(order) {
    const items = order?.items || order?.cartItems || order?.orderItems || [];
    if (Array.isArray(items)) return items.filter(Boolean);
    if (items && typeof items === 'object') return Object.values(items).filter(Boolean);
    return [];
  }

  function getItemName(item) { return item?.name || item?.title || item?.itemName || item?.productName || 'Item'; }
  function getItemQty(item) { return Number(item?.qty ?? item?.quantity ?? item?.count ?? 1) || 1; }
  function getItemPrice(item) {
    const qty = getItemQty(item);
    const lineTotal = Number(item?.lineTotal ?? item?.total ?? item?.totalPrice ?? item?.amount ?? 0) || 0;
    if (lineTotal && qty > 1 && !item?.price && !item?.unitPrice) return lineTotal / qty;
    return Number(item?.price ?? item?.unitPrice ?? item?.rate ?? item?.sellingPrice ?? lineTotal ?? 0) || 0;
  }

  function getTotal(order) {
    return Number(
      order?.total ?? order?.grandTotal ?? order?.totalAmount ?? order?.amount ??
      order?.paidAmount ?? order?.amountPaid ?? order?.totalPaid ?? order?.payableAmount ??
      order?.totals?.total ?? order?.totals?.grandTotal ?? order?.totals?.finalTotal ??
      order?.payment?.total ?? order?.payment?.amount ?? 0
    ) || 0;
  }

  function computedTotal(order) {
    const saved = getTotal(order);
    if (saved) return saved;
    return getItems(order).reduce((sum, item) => sum + (getItemPrice(item) * getItemQty(item)), 0);
  }

  function getDateSource(order) {
    return order?.placedAt || order?.paidAt || order?.createdAt || order?.createdAtClient || order?.created_at ||
      order?.orderDate || order?.orderedAt || order?.orderTime || order?.dateTime || order?.date ||
      order?.timestamp || order?.updatedAt || order?.payment?.createdAt || order?.payment?.paidAt || '';
  }

  function toDate(value) {
    if (!value) return null;
    if (value instanceof Date && !Number.isNaN(value.getTime())) return value;
    if (typeof value === 'number') {
      const date = new Date(value < 10000000000 ? value * 1000 : value);
      return Number.isNaN(date.getTime()) ? null : date;
    }
    if (typeof value === 'string') {
      const input = value.trim();
      if (!input) return null;
      if (/^\d+$/.test(input)) {
        const numeric = Number(input);
        const date = new Date(numeric < 10000000000 ? numeric * 1000 : numeric);
        return Number.isNaN(date.getTime()) ? null : date;
      }
      const date = new Date(input);
      return Number.isNaN(date.getTime()) ? null : date;
    }
    if (typeof value === 'object') {
      if (typeof value.toDate === 'function') return value.toDate();
      const seconds = value.seconds ?? value._seconds;
      if (typeof seconds === 'number') return new Date(seconds * 1000);
    }
    return null;
  }

  function formatDateTime(order) {
    const date = toDate(getDateSource(order));
    if (!date) return 'Just now';
    const day = String(date.getDate()).padStart(2, '0');
    const month = date.toLocaleString('en-IN', { month: 'short' });
    const year = date.getFullYear();
    let hours = date.getHours();
    const minutes = String(date.getMinutes()).padStart(2, '0');
    const suffix = hours >= 12 ? 'pm' : 'am';
    hours = hours % 12 || 12;
    return `${day} ${month} ${year}, ${hours}:${minutes}${suffix}`;
  }

  function money(value) { return `₹${Math.round(Number(value || 0))}`; }

  function statusCopy(order) {
    const status = getStatus(order);
    if (['received', 'confirmed', 'checkout_ready', 'placed', 'order_placed', 'accepted', 'paid', 'payment_success', 'new'].includes(status)) return ['Order received', 'received'];
    if (['preparing', 'food_preparing', 'being_prepared', 'cooking', 'rider_assigned', 'assigned'].includes(status)) return ['Preparing', 'preparing'];
    if (['picked_up', 'pickup_done', 'out_for_delivery', 'outfordelivery', 'on_the_way', 'on_way', 'dispatched'].includes(status)) return ['Out for delivery', 'out_for_delivery'];
    if (['reached_location', 'reached', 'arrived', 'arrived_location', 'at_location', 'nearby'].includes(status)) return ['Reached your location', 'reached'];
    if (['delivered', 'completed'].includes(status)) return ['Delivered', 'delivered'];
    if (['cancelled', 'canceled'].includes(status)) return ['Cancelled', 'cancelled'];
    return ['Order received', 'received'];
  }

  function shopIcon() {
    return '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M3.2 4.2h17.6l-1.4 7.3H4.6L3.2 4.2Z" fill="#8806CE"/><path d="M5.2 11.3h13.6v10.2H5.2V11.3Z" fill="#08A045"/><path d="M9.2 16.2h5.6v5.3H9.2v-5.3Z" fill="#12130F"/></svg>';
  }

  function dishIcon() {
    return '<svg viewBox="0 0 18 18" fill="none" aria-hidden="true"><path d="M2.25 9.2a6.75 6.75 0 0 1 13.5 0H2.25Z" fill="currentColor"/><path d="M1.7 10.1h14.6v1.5H1.7v-1.5Z" fill="currentColor"/><path d="M4.2 13.1h9.6v1.6H4.2v-1.6Z" fill="currentColor"/></svg>';
  }

  function activeIcon(order) {
    const status = getStatus(order);
    if (['preparing', 'food_preparing', 'being_prepared', 'cooking', 'rider_assigned', 'assigned'].includes(status)) return dishIcon();
    if (['picked_up', 'pickup_done', 'out_for_delivery', 'outfordelivery', 'on_the_way', 'on_way', 'dispatched', 'reached_location', 'reached', 'arrived'].includes(status)) {
      return '<svg viewBox="0 0 18 18" fill="none" aria-hidden="true"><path d="M9 1.2c-3 0-5.4 2.4-5.4 5.4 0 4.05 5.4 10.2 5.4 10.2s5.4-6.15 5.4-10.2c0-3-2.4-5.4-5.4-5.4Z" fill="currentColor"/><path d="M7.2 6.6l1.2 1.2 2.6-2.6 1 1-3.6 3.6-2.2-2.2 1-1Z" fill="#FDFDFF"/></svg>';
    }
    return shopIcon();
  }

  function renderItems(order) {
    const list = getItems(order);
    if (!list.length) return '<div class="order-item-chip"><span class="order-item-name">Order item</span><span class="order-item-count">1</span></div>';
    return list.slice(0, 6).map((item, index) => `
      <div class="order-item-chip">
        <span class="order-item-name">${escapeHtml(getItemName(item))}</span>
        <span class="order-item-count">${escapeHtml(getItemQty(item))}</span>
        ${index < Math.min(list.length, 6) - 1 ? '<span>,</span>' : ''}
      </div>
    `).join('');
  }

  function renderOrderCard(order, type) {
    const id = getOrderId(order);
    const shortId = String(id || '----').replace(/^CBE-/, '').slice(-8);
    const [label] = statusCopy(order);
    const isPast = type === 'past';
    const buttonHtml = isPast
      ? `<button class="profile-view-details-button" type="button" data-view-past-order="${escapeHtml(id)}">View details</button>`
      : `<button class="track-order-button" type="button" data-track-order="${escapeHtml(id)}">Track order</button>`;

    return `
      <article class="order-card" data-order-id="${escapeHtml(id)}">
        <div class="order-card-header">
          <div class="order-left-content">
            <div class="order-shop-img" aria-hidden="true">${shopIcon()}</div>
            <div class="order-title-mini">
              <div class="restaurant-name">${escapeHtml(order?.restaurantName || order?.storeName || 'Coimbatore Foods')}</div>
              <div class="order-id-mini">Order ID #${escapeHtml(shortId)}</div>
            </div>
          </div>
          <div class="order-status-mini">
            <div class="order-status-text">${escapeHtml(isPast ? label : label)}</div>
            <div class="order-status-icon" aria-hidden="true">${isPast ? '<svg viewBox="0 0 18 18" fill="none"><path d="M9 1.4a7.6 7.6 0 1 0 0 15.2A7.6 7.6 0 0 0 9 1.4Zm-1 10.5L4.9 8.8l1.05-1.05L8 9.8l4.05-4.05L13.1 6.8 8 11.9Z" fill="currentColor"/></svg>' : activeIcon(order)}</div>
          </div>
        </div>
        <div class="order-items-list">${renderItems(order)}</div>
        <div class="order-divider"></div>
        <div class="order-cta-time">
          ${buttonHtml}
          <div class="order-time-value">
            <div class="order-time-text">Order placed: ${escapeHtml(formatDateTime(order))}</div>
            <div class="order-total-text"><span>Total value: </span><strong>${escapeHtml(money(computedTotal(order)))}</strong></div>
          </div>
        </div>
      </article>
    `;
  }

  function openOrder(order) {
    if (!order) return;
    localStorage.setItem('cbe_track_selected_order', JSON.stringify(order));
    window.location.href = `track-fullscreen.html?orderId=${encodeURIComponent(getOrderId(order))}`;
  }

  function render() {
    const activeOrders = getActiveOrders();
    const pastOrders = getPastOrders();

    emptyStateBlock.hidden = activeOrders.length > 0;
    activeCards.innerHTML = activeOrders.length ? activeOrders.map(order => renderOrderCard(order, 'active')).join('') : '';

    if (!pastOrders.length) {
      previousCards.innerHTML = '<div class="previous-empty">No past orders yet. Completed orders will appear here.</div>';
    } else {
      previousCards.innerHTML = pastOrders.slice(0, 5).map(order => renderOrderCard(order, 'past')).join('');
    }
  }

  document.addEventListener('click', function(event) {
    const activeButton = event.target.closest('[data-track-order]');
    if (activeButton) {
      const id = activeButton.getAttribute('data-track-order');
      openOrder(getActiveOrders().find(order => getOrderId(order) === id));
      return;
    }

    const pastButton = event.target.closest('[data-view-past-order]');
    if (pastButton) {
      const id = pastButton.getAttribute('data-view-past-order');
      openOrder(getPastOrders().find(order => getOrderId(order) === id));
      return;
    }
  }, true);

  window.addEventListener('storage', function(event) {
    if ([
      'current_order',
      'order_history',
      'previous_orders',
      'orders',
      'customer_orders',
      'TIFFIN_ORDERS',
      'TIFFIN_CUSTOMER_ORDERS',
      'pending_order'
    ].includes(event.key)) render();
  });

  window.renderTrack = render;
  window.renderOrders = render;
  render();

  let lastSnapshot = '';
  setInterval(function() {
    const snapshot = [
      localStorage.getItem('current_order') || '',
      localStorage.getItem('order_history') || '',
      localStorage.getItem('previous_orders') || '',
      localStorage.getItem('orders') || '',
      localStorage.getItem('customer_orders') || '',
      localStorage.getItem('TIFFIN_ORDERS') || '',
      localStorage.getItem('TIFFIN_CUSTOMER_ORDERS') || '',
      localStorage.getItem('pending_order') || ''
    ].join('|');
    if (snapshot !== lastSnapshot) {
      lastSnapshot = snapshot;
      render();
    }
  }, 1500);
})();
</script>
