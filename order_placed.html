<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tiffin CBE">
<meta name="theme-color" content="#8806CE">
<title>Order Placed - Coimbatore Foods</title>
<link rel="manifest" id="pwa-manifest">
<style>
@font-face { font-family: 'General Sans'; src: url('./fonts/GeneralSans/GeneralSans-Regular.otf') format('opentype'); font-weight: 400; font-style: normal; }
@font-face { font-family: 'General Sans'; src: url('./fonts/GeneralSans/GeneralSans-Medium.otf') format('opentype'); font-weight: 500; font-style: normal; }
@font-face { font-family: 'General Sans'; src: url('./fonts/GeneralSans/GeneralSans-Semibold.otf') format('opentype'); font-weight: 600; font-style: normal; }
@font-face { font-family: 'General Sans'; src: url('./fonts/GeneralSans/GeneralSans-Bold.otf') format('opentype'); font-weight: 700; font-style: normal; }
@font-face { font-family: 'Chillax'; src: url('./fonts/Chillax/Chillax-Semibold.otf') format('opentype'); font-weight: 600; font-style: normal; }
@font-face { font-family: 'Chillax'; src: url('./fonts/Chillax/Chillax-Bold.otf') format('opentype'); font-weight: 700; font-style: normal; }

:root {
  --white: #FDFDFF;
  --surface: #FFFFFF;
  --page: #F5F5F7;
  --ink: #12130F;
  --muted: rgba(18, 19, 15, 0.50);
  --body: rgba(18, 19, 15, 0.78);
  --soft: rgba(18, 19, 15, 0.06);
  --brand: #8806CE;
  --green: #08A045;
  --red: #E23009;
  --yellow: #FFCC00;
  --shadow: 2px 4px 24px rgba(0, 0, 0, 0.08);
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; scrollbar-width: none; -ms-overflow-style: none; }
*::-webkit-scrollbar { display: none; width: 0; height: 0; }
html, body { width: 100%; min-height: 100%; }
body { background: var(--page); font-family: 'General Sans', system-ui, -apple-system, BlinkMacSystemFont, sans-serif; color: var(--ink); display: flex; justify-content: center; }
a { color: inherit; text-decoration: none; }
button { font-family: inherit; border: none; background: none; cursor: pointer; }

.app {
  width: 390px;
  min-height: 100dvh;
  background: var(--surface);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
}
.success-wrap {
  width: 100%;
  min-height: 100dvh;
  padding: calc(54px + env(safe-area-inset-top)) 24px calc(32px + env(safe-area-inset-bottom));
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 18px;
  background:
    radial-gradient(circle at 50% 18%, rgba(8, 160, 69, 0.12), transparent 30%),
    linear-gradient(180deg, #FDFDFF 0%, #F7F7F9 100%);
}
.success-card {
  width: 342px;
  min-height: 430px;
  padding: 28px 20px 22px;
  background: var(--surface);
  box-shadow: var(--shadow);
  border-radius: 56px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  gap: 18px;
}
.check-shell {
  width: 112px;
  height: 112px;
  border-radius: 1998px;
  background: rgba(8, 160, 69, 0.10);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  margin-top: 4px;
}
.check-shell::before {
  content: "";
  position: absolute;
  inset: 8px;
  border-radius: 1998px;
  border: 2px solid rgba(8, 160, 69, 0.24);
  animation: pulseRing 1.5s ease-out infinite;
}
.check-icon {
  width: 74px;
  height: 74px;
  border-radius: 1998px;
  background: var(--green);
  color: var(--white);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
  font-weight: 800;
  box-shadow: 0 18px 32px rgba(8, 160, 69, 0.25);
  position: relative;
  z-index: 1;
}
.success-kicker {
  color: var(--green);
  font-size: 13px;
  font-weight: 800;
  line-height: 14px;
}
.success-title {
  color: var(--ink);
  font-family: 'Chillax', 'General Sans', sans-serif;
  font-size: 30px;
  font-weight: 700;
  line-height: 34px;
  letter-spacing: -0.6px;
}
.success-copy {
  color: var(--muted);
  font-size: 13px;
  font-weight: 500;
  line-height: 18px;
  max-width: 270px;
}
.order-mini {
  width: 100%;
  padding: 14px;
  border-radius: 36px;
  background: #F7F7F9;
  border: 1px solid rgba(18, 19, 15, 0.06);
  display: flex;
  flex-direction: column;
  gap: 10px;
  text-align: left;
}
.order-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  color: var(--muted);
  font-size: 12px;
  font-weight: 600;
  line-height: 16px;
}
.order-row strong {
  color: var(--ink);
  font-size: 13px;
  font-weight: 800;
  text-align: right;
  word-break: break-word;
}
.redirect-line {
  color: var(--body);
  font-size: 13px;
  font-weight: 600;
  line-height: 18px;
}
.redirect-line strong { color: var(--brand); font-weight: 800; }
.track-now {
  width: 100%;
  min-height: 48px;
  border-radius: 28px;
  background: var(--green);
  color: var(--white);
  font-size: 15px;
  font-weight: 800;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 14px 28px rgba(8, 160, 69, 0.20);
}
.track-now:active { transform: scale(0.98); }
.secondary-link {
  color: var(--muted);
  font-size: 12px;
  font-weight: 700;
  text-align: center;
}
@keyframes pulseRing {
  0% { transform: scale(0.92); opacity: 1; }
  100% { transform: scale(1.18); opacity: 0; }
}
@media (max-width: 389px) {
  .app { width: 100vw; }
  .success-wrap { padding-left: 20px; padding-right: 20px; }
  .success-card { width: calc(100vw - 40px); }
}


/* =========================
   FIGMA-LIKE 100% CORNER SMOOTHING
   Fallback: normal border-radius on unsupported browsers.
========================= */
@supports (corner-shape: squircle) {
  * {
    corner-shape: squircle;
  }
}

</style>
<script>
(function () {
  document.documentElement.style.display = 'none';
  const auth = localStorage.getItem('cust_auth');
  if (!auth || auth !== '1') {
    window.location.replace('login.html');
    return;
  }
  window.addEventListener('DOMContentLoaded', () => {
    document.documentElement.style.display = 'block';
  });
})();
</script>
</head>
<body>
<div class="app">
  <main class="success-wrap">
    <section class="success-card">
      <div class="check-shell">
        <div class="check-icon">✓</div>
      </div>

      <div>
        <div class="success-kicker">Payment successful</div>
        <h1 class="success-title">Your order has been placed</h1>
      </div>

      <p class="success-copy">
        We’ve received your lunch order. You can now track the delivery status live.
      </p>

      <div class="order-mini" id="orderMini">
        <div class="order-row">
          <span>Order ID</span>
          <strong id="orderId">Preparing...</strong>
        </div>
        <div class="order-row">
          <span>Total paid</span>
          <strong id="orderTotal">₹0</strong>
        </div>
        <div class="order-row">
          <span>ETA</span>
          <strong id="orderEta">15 - 25 mins</strong>
        </div>
      </div>

      <div class="redirect-line">
        Tap below whenever you want to view live delivery status.
      </div>

      <a class="track-now" href="track.html">Track order now</a>
      <a class="secondary-link" href="menu.html">Back to menu</a>
    </section>
  </main>
</div>

<script>
const mf = {
  name: "Tiffin CBE",
  short_name: "Tiffin",
  start_url: "./",
  display: "standalone",
  background_color: "#FDFDFF",
  theme_color: "#8806CE"
};
const blob = new Blob([JSON.stringify(mf)], { type: "application/json" });
document.getElementById("pwa-manifest").href = URL.createObjectURL(blob);

function formatRupee(value) {
  return `₹${Number(value || 0).toLocaleString("en-IN")}`;
}

function readCurrentOrder() {
  try {
    return JSON.parse(localStorage.getItem("current_order")) || null;
  } catch (error) {
    return null;
  }
}

function saveOrderToHistory(order) {
  if (!order) return;

  let history = [];
  try {
    const saved = JSON.parse(localStorage.getItem("order_history")) || [];
    history = Array.isArray(saved) ? saved : Object.values(saved);
  } catch (error) {
    history = [];
  }

  const orderKey = String(order.id || order.paymentId || order.receipt || order.createdAt || "");
  history = history.filter(savedOrder => {
    const savedKey = String(savedOrder?.id || savedOrder?.paymentId || savedOrder?.receipt || savedOrder?.createdAt || "");
    return savedKey !== orderKey;
  });

  history.unshift(order);
  localStorage.setItem("order_history", JSON.stringify(history.slice(0, 20)));
}

const order = readCurrentOrder();
saveOrderToHistory(order);

if (order) {
  document.getElementById("orderId").textContent = order.id || "Order confirmed";
  document.getElementById("orderTotal").textContent = formatRupee(order?.totals?.total || 0);
  document.getElementById("orderEta").textContent = order.eta || "15 - 25 mins";
} else {
  document.querySelector(".success-kicker").textContent = "No active order found";
  document.querySelector(".success-title").textContent = "Order details unavailable";
  document.querySelector(".success-copy").textContent = "We could not find a recent order on this device. You can return to the menu or track page.";
  document.getElementById("orderId").textContent = "Not found";
  document.getElementById("orderTotal").textContent = "—";
  document.getElementById("orderEta").textContent = "—";
}

</script>
<script src="firebase-config.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.12.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.12.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore-compat.js"></script>
<script src="firebase-mvp.js"></script>
</body>
</html>
