<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tiffin CBE">
<meta name="theme-color" content="#8806CE">
<title>Coimbatore Foods - Cart</title>
<link rel="manifest" id="pwa-manifest">
<style>
@font-face {
  font-family: 'General Sans';
  src: url('./fonts/GeneralSans/GeneralSans-Regular.otf') format('opentype');
  font-weight: 400;
  font-style: normal;
}
@font-face {
  font-family: 'General Sans';
  src: url('./fonts/GeneralSans/GeneralSans-Medium.otf') format('opentype');
  font-weight: 500;
  font-style: normal;
}
@font-face {
  font-family: 'General Sans';
  src: url('./fonts/GeneralSans/GeneralSans-Semibold.otf') format('opentype');
  font-weight: 600;
  font-style: normal;
}
@font-face {
  font-family: 'General Sans';
  src: url('./fonts/GeneralSans/GeneralSans-Bold.otf') format('opentype');
  font-weight: 700;
  font-style: normal;
}

:root {
  --white: #FDFDFF;
  --surface: #FFFFFF;
  --ink: #12130F;
  --muted: rgba(18, 19, 15, 0.50);
  --soft: rgba(18, 19, 15, 0.04);
  --soft-2: rgba(18, 19, 15, 0.02);
  --line: rgba(18, 19, 15, 0.08);
  --brand: #8806CE;
  --green: #08A045;
  --grey-icon: #B8B8B7;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
*::-webkit-scrollbar { display: none; width: 0; height: 0; }
html, body { width: 100%; min-height: 100%; }
body {
  background: #F5F5F7;
  font-family: 'General Sans', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  color: var(--ink);
  display: flex;
  justify-content: center;
  padding: 0;
}
a { color: inherit; text-decoration: none; }
button { border: 0; background: transparent; font-family: inherit; cursor: pointer; }
img { max-width: 100%; display: block; }

.app {
  width: 390px;
  min-height: 100dvh;
  position: relative;
  background: linear-gradient(0deg, rgba(18, 19, 15, 0.02) 0%, rgba(18, 19, 15, 0.02) 100%), #FDFDFF;
  overflow-x: hidden;
  padding-top: 105px;
  padding-bottom: calc(94px + env(safe-area-inset-bottom));
}

/* =========================
   TOP BAR
========================= */
.top-bar {
  width: 390px;
  min-height: 105px;
  padding: 40px 24px 20px;
  background: #FFFFFF;
  display: inline-flex;
  justify-content: flex-start;
  align-items: center;
  gap: 20px;
  position: fixed;
  left: 50%;
  top: 0;
  transform: translateX(-50%);
  z-index: 80;
  box-shadow: 0 1px 0 rgba(18, 19, 15, 0.04);
}
.left-group {
  flex: 1 1 0;
  min-width: 0;
  width: 127px;
  display: inline-flex;
  flex-direction: column;
  justify-content: flex-start;
  align-items: flex-start;
  gap: 4px;
}
.title-group {
  display: inline-flex;
  justify-content: flex-start;
  align-items: center;
  gap: 6px;
}
.title-icon {
  width: 24px;
  height: 24px;
  opacity: 0.5;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.page-title {
  color: #12130F;
  font-size: 20px;
  font-weight: 600;
  line-height: 24px;
}
.items-count {
  color: rgba(18, 19, 15, 0.50);
  font-size: 14px;
  font-weight: 500;
  line-height: 16.8px;
  white-space: nowrap;
}
.topbar-right-group {
  align-self: stretch;
  width: 195px;
  margin-left: auto;
  display: inline-flex;
  flex-direction: column;
  justify-content: space-between;
  align-items: flex-end;
  gap: 4px;
  flex-shrink: 0;
  text-align: right;
}
.deliverto-info {
  width: 195px;
  display: inline-flex;
  justify-content: flex-end;
  align-items: flex-start;
  gap: 4px;
  min-width: 0;
}
.deliverto-label {
  color: rgba(18, 19, 15, 0.50);
  font-size: 12px;
  font-weight: 500;
  line-height: 14.4px;
  white-space: nowrap;
  flex-shrink: 0;
}
.deliverto-value {
  color: #12130F;
  font-size: 12px;
  font-weight: 500;
  line-height: 14.4px;
  width: 135px;
  text-align: right;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.topbar-change-button {
  padding: 2px 0;
  border-radius: 10px;
  display: inline-flex;
  justify-content: flex-start;
  align-items: center;
  gap: 2px;
  color: #08A045;
}
.topbar-change-button svg {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
}
.topbar-change-button span {
  color: #08A045;
  font-size: 14px;
  font-weight: 500;
  line-height: 16.8px;
}
/* =========================
   EMPTY CART
========================= */
.empty-cart-content {
  width: 342px;
  margin: 20px 24px 0;
  min-height: calc(100dvh - 210px);
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  align-items: center;
  gap: 10px;
  padding-top: 0;
}
.dish-img {
  width: 180px;
  height: 180px;
  object-fit: contain;
}
.info-cta-group {
  align-self: stretch;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  align-items: flex-start;
  gap: 12px;
}
.info-group {
  align-self: stretch;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  align-items: center;
}
.empty-title {
  align-self: stretch;
  text-align: center;
  color: #12130F;
  font-size: 24px;
  font-weight: 600;
  line-height: 33.6px;
  letter-spacing: -0.02em;
}
.empty-copy {
  align-self: stretch;
  text-align: center;
  color: #12130F;
  font-size: 14px;
  font-weight: 400;
  line-height: 21px;
}
.browse-menu-button {
  width: 342px;
  height: 55px;
  padding: 14px 20px;
  border-radius: 10px;
  border: 1px solid #08A045;
  display: inline-flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
}
.browse-menu-button span {
  color: #08A045;
  font-size: 18px;
  font-weight: 600;
  line-height: 26px;
}

/* =========================
   CART WITH ORDERS
========================= */
.cart-content {
  width: 342px;
  margin: 20px 24px 0;
  display: flex;
  flex-direction: column;
  gap: 14px;
  padding-bottom: 96px;
}
.cart-section-label {
  color: rgba(18, 19, 15, 0.50);
  font-size: 14px;
  font-weight: 500;
  line-height: 14px;
}
.cart-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.cart-item {
  width: 342px;
  min-height: 96px;
  padding: 10px;
  background: #FFFFFF;
  border-radius: 16px;
  box-shadow: 0px 4px 24px rgba(0, 0, 0, 0.07);
  display: flex;
  align-items: center;
  gap: 12px;
}
.cart-item-img {
  width: 76px;
  height: 76px;
  border-radius: 14px;
  object-fit: cover;
  flex-shrink: 0;
  background: rgba(18, 19, 15, 0.04);
}
.cart-item-copy {
  min-width: 0;
  flex: 1 1 0;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.cart-item-top {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  align-items: flex-start;
}
.cart-item-name {
  min-width: 0;
  color: #12130F;
  font-size: 15px;
  font-weight: 600;
  line-height: 18px;
}
.cart-item-total {
  flex-shrink: 0;
  color: #12130F;
  font-size: 15px;
  font-weight: 700;
  line-height: 18px;
}
.cart-item-meta {
  color: rgba(18, 19, 15, 0.50);
  font-size: 12px;
  font-weight: 500;
  line-height: 14px;
}
.cart-item-bottom {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
}
.qty-control-wrap {
  width: 78px;
  height: 30px;
  background: #FDFDFF;
  border: 1px solid #08A045;
  border-radius: 16px;
  display: inline-flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 10px;
}
.qty-btn {
  color: #08A045;
  font-size: 16px;
  font-weight: 600;
  line-height: 16px;
  width: 14px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.qty-count {
  color: #08A045;
  font-size: 14px;
  font-weight: 700;
  line-height: 14px;
  min-width: 12px;
  text-align: center;
}
.remove-btn {
  color: rgba(18, 19, 15, 0.44);
  font-size: 12px;
  font-weight: 600;
  line-height: 14px;
}
.summary-card,
.address-card {
  width: 342px;
  padding: 16px;
  background: #FFFFFF;
  border-radius: 16px;
  box-shadow: 0px 4px 24px rgba(0, 0, 0, 0.06);
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.summary-title,
.address-title {
  color: #12130F;
  font-size: 16px;
  font-weight: 600;
  line-height: 20.8px;
}
.summary-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: rgba(18, 19, 15, 0.72);
  font-size: 14px;
  font-weight: 500;
  line-height: 18px;
}
.summary-row.total {
  margin-top: 2px;
  padding-top: 10px;
  border-top: 1px solid rgba(18, 19, 15, 0.08);
  color: #12130F;
  font-size: 17px;
  font-weight: 700;
  line-height: 22px;
}
.address-card-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
}
.address-change-link {
  border: 0;
  background: transparent;
  padding: 0;
  font-family: inherit;
  cursor: pointer;
  color: #08A045;
  font-size: 13px;
  font-weight: 600;
  line-height: 16px;
  white-space: nowrap;
}
.address-copy {
  color: rgba(18, 19, 15, 0.72);
  font-size: 13px;
  font-weight: 500;
  line-height: 17px;
}
.checkout-bar {
  position: fixed;
  left: 50%;
  bottom: calc(74px + env(safe-area-inset-bottom));
  transform: translateX(-50%);
  width: 390px;
  padding: 10px 24px 12px;
  background: linear-gradient(180deg, rgba(253, 253, 255, 0) 0%, #FDFDFF 28%, #FDFDFF 100%);
  z-index: 40;
  display: none;
}
.checkout-button {
  width: 342px;
  height: 55px;
  padding: 14px 20px;
  background: #08A045;
  box-shadow: 0px 6px 34px rgba(8, 160, 69, 0.24);
  border-radius: 10px;
  display: inline-flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  color: #FDFDFF;
  font-size: 18px;
  font-weight: 600;
  line-height: 26px;
}
.checkout-button:active,
.browse-menu-button:active,
.qty-btn:active,
.remove-btn:active,
.nav-item:active {
  transform: scale(0.98);
}

/* =========================
   BOTTOM NAV
========================= */
.bottom-nav-bar {
  width: 390px;
  height: calc(64px + env(safe-area-inset-bottom));
  padding-top: 10px;
  padding-left: 24px;
  padding-right: 24px;
  padding-bottom: env(safe-area-inset-bottom);
  left: 50%;
  bottom: 0;
  transform: translateX(-50%);
  position: fixed;
  background: white;
  box-shadow: 0px -2px 16px rgba(0, 0, 0, 0.10);
  justify-content: center;
  align-items: flex-start;
  gap: 40px;
  display: inline-flex;
  z-index: 50;
}
.nav-item {
  width: 80px;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 3px;
  display: inline-flex;
  position: relative;
}
.nav-icon {
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
.nav-text {
  align-self: stretch;
  text-align: center;
  color: #12130F;
  font-size: 10px;
  font-weight: 500;
  line-height: 10px;
}
.cart-badge {
  position: absolute;
  top: -6px;
  right: 18px;
  min-width: 18px;
  height: 18px;
  padding: 0 5px;
  border-radius: 999px;
  background: #E23009;
  color: #FFFFFF;
  font-size: 10px;
  font-weight: 700;
  display: none;
  align-items: center;
  justify-content: center;
}

.is-hidden { display: none !important; }

@media (max-width: 389px) {
  .app,
  .top-bar,
  .bottom-nav-bar,
  .checkout-bar { width: 100vw; }
  .empty-cart-content,
  .cart-content,
  .browse-menu-button,
  .cart-item,
  .summary-card,
  .address-card,
  .checkout-button { width: calc(100vw - 48px); }
}

@supports (corner-shape: squircle) {
  .browse-menu-button,
  .cart-item,
  .cart-item-img,
  .qty-control-wrap,
  .summary-card,
  .address-card,
  .checkout-button {
    corner-shape: squircle;
  }
}
</style>
<script>
(function () {
  document.documentElement.style.display = 'none';
  const auth = localStorage.getItem('cust_auth');
  if (!auth || auth !== '1') {
    window.location.replace('login.html');
    return;
  }
  window.addEventListener('DOMContentLoaded', () => {
    document.documentElement.style.display = 'block';
  });
})();
</script>
</head>
<body>
<div class="app">
  <header class="top-bar">
    <div class="left-group">
      <div class="title-group">
        <div class="title-icon" aria-hidden="true">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <g opacity="0.5">
              <path d="M18.19 17.75H7.54C6.55 17.75 5.6 17.33 4.93 16.6C4.26 15.87 3.92 14.89 4 13.9L4.83 3.94C4.86 3.63 4.75 3.33 4.54 3.1C4.33 2.87 4.04 2.75 3.73 2.75H2C1.59 2.75 1.25 2.41 1.25 2C1.25 1.59 1.59 1.25 2 1.25H3.74C4.47 1.25 5.16 1.56 5.65 2.09C5.92 2.39 6.12 2.74 6.23 3.13H18.72C19.73 3.13 20.66 3.53 21.34 4.25C22.01 4.98 22.35 5.93 22.27 6.94L21.73 14.44C21.62 16.27 20.02 17.75 18.19 17.75ZM6.28 4.62L5.5 14.02C5.45 14.6 5.64 15.15 6.03 15.58C6.42 16.01 6.96 16.24 7.54 16.24H18.19C19.23 16.24 20.17 15.36 20.25 14.32L20.79 6.82C20.83 6.23 20.64 5.67 20.25 5.26C19.86 4.84 19.32 4.61 18.73 4.61H6.28V4.62Z" fill="#12130F"/>
              <path d="M16.25 22.75C15.15 22.75 14.25 21.85 14.25 20.75C14.25 19.65 15.15 18.75 16.25 18.75C17.35 18.75 18.25 19.65 18.25 20.75C18.25 21.85 17.35 22.75 16.25 22.75ZM16.25 20.25C15.97 20.25 15.75 20.47 15.75 20.75C15.75 21.03 15.97 21.25 16.25 21.25C16.53 21.25 16.75 21.03 16.75 20.75C16.75 20.47 16.53 20.25 16.25 20.25Z" fill="#12130F"/>
              <path d="M8.25 22.75C7.15 22.75 6.25 21.85 6.25 20.75C6.25 19.65 7.15 18.75 8.25 18.75C9.35 18.75 10.25 19.65 10.25 20.75C10.25 21.85 9.35 22.75 8.25 22.75ZM8.25 20.25C7.97 20.25 7.75 20.47 7.75 20.75C7.75 21.03 7.97 21.25 8.25 21.25C8.53 21.25 8.75 21.03 8.75 20.75C8.75 20.47 8.53 20.25 8.25 20.25Z" fill="#12130F"/>
              <path d="M21 8.75H9C8.59 8.75 8.25 8.41 8.25 8C8.25 7.59 8.59 7.25 9 7.25H21C21.41 7.25 21.75 7.59 21.75 8C21.75 8.41 21.41 8.75 21 8.75Z" fill="#12130F"/>
            </g>
          </svg>
        </div>
        <div class="page-title">Cart</div>
      </div>
      <div class="items-count" id="topbarItemsCount">0 items</div>
    </div>

    <div class="topbar-right-group">
      <div class="deliverto-info">
        <div class="deliverto-label">Deliver to:</div>
        <div class="deliverto-value" id="topbarDeliveryAddress">Set location</div>
      </div>
      <button class="topbar-change-button" type="button" id="topbarChangeButton" aria-label="Change delivery address">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M4.41604 16.2706C3.95854 16.2706 3.53104 16.1131 3.22354 15.8206C2.83354 15.4531 2.64604 14.8981 2.71354 14.2981L2.99104 11.8681C3.04354 11.4106 3.32104 10.8031 3.64354 10.4731L9.80105 3.95553C11.3385 2.32803 12.9435 2.28303 14.571 3.82053C16.1985 5.35803 16.2435 6.96303 14.706 8.59053L8.54855 15.1081C8.23355 15.4456 7.64854 15.7606 7.19104 15.8356L4.77604 16.2481C4.64854 16.2556 4.53604 16.2706 4.41604 16.2706ZM12.2085 3.81303C11.631 3.81303 11.1285 4.17303 10.6185 4.71303L4.46104 11.2381C4.31104 11.3956 4.13854 11.7706 4.10854 11.9881L3.83104 14.4181C3.80104 14.6656 3.86104 14.8681 3.99604 14.9956C4.13104 15.1231 4.33354 15.1681 4.58104 15.1306L6.99604 14.7181C7.21354 14.6806 7.57354 14.4856 7.72354 14.3281L13.881 7.81053C14.811 6.82053 15.1485 5.90553 13.791 4.63053C13.191 4.05303 12.6735 3.81303 12.2085 3.81303Z" fill="#08A045"/>

        </svg>
        <span>Change</span>
      </button>
    </div>
  </header>

  <main>
    <section class="empty-cart-content" id="emptyCartScreen">
      <img class="dish-img" src="assets/cart/dish-img.png" alt="Empty cart dish">
      <div class="info-cta-group">
        <div class="info-group">
          <div class="empty-title">Your cart is empty</div>
          <div class="empty-copy">Add items from the menu and come back here to place order.</div>
        </div>
        <a class="browse-menu-button" href="menu.html"><span>Browse menu</span></a>
      </div>
    </section>

    <section class="cart-content is-hidden" id="cartWithOrdersScreen">
      <div class="cart-section-label" id="cartItemsLabel">Items added</div>
      <div class="cart-list" id="cartItemsList"></div>

      <section class="address-card">
        <div class="address-card-top">
          <div class="address-title">Deliver to</div>
          <button class="address-change-link" type="button" id="addressChangeButton">Change</button>
        </div>
        <div class="address-copy" id="deliveryAddressText">Set delivery location from menu.</div>
      </section>

      <section class="summary-card">
        <div class="summary-title">Bill summary</div>
        <div class="summary-row"><span>Item total</span><span id="subtotalValue">₹0</span></div>
        <div class="summary-row"><span>Delivery fee</span><span id="deliveryValue">₹0</span></div>
        <div class="summary-row total"><span>Total</span><span id="totalValue">₹0</span></div>
      </section>
    </section>
  </main>

  <div class="checkout-bar" id="checkoutBar">
    <button class="checkout-button" type="button" id="checkoutButton">Continue <span id="checkoutTotal">₹0</span></button>
  </div>

  <nav class="bottom-nav-bar" aria-label="Bottom navigation">
    <a class="nav-item" href="menu.html" aria-label="Open menu">
      <div class="nav-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">

<script>
const mf = {
  name: "Tiffin CBE",
  short_name: "Tiffin",
  start_url: "./",
  display: "standalone",
  background_color: "#0d0600",
  theme_color: "#0d0600"
};
const blob = new Blob([JSON.stringify(mf)], { type: "application/json" });
document.getElementById("pwa-manifest").href = URL.createObjectURL(blob);
</script>

<script>
const DELIVERY_FEE = 0;

const productImageMap = {
  1: "assets/menu/img/Protein egg lunch-img.png",
  2: "assets/menu/img/Regular meal-img.png",
  3: "assets/menu/img/Protein chicken lunch-img.png",
  4: "assets/menu/img/Chappati & gravy-img.png"
};

const emptyCartScreen = document.getElementById("emptyCartScreen");
const cartWithOrdersScreen = document.getElementById("cartWithOrdersScreen");
const cartItemsList = document.getElementById("cartItemsList");
const cartItemsLabel = document.getElementById("cartItemsLabel");
const subtotalValue = document.getElementById("subtotalValue");
const deliveryValue = document.getElementById("deliveryValue");
const totalValue = document.getElementById("totalValue");
const checkoutTotal = document.getElementById("checkoutTotal");
const checkoutBar = document.getElementById("checkoutBar");
const checkoutButton = document.getElementById("checkoutButton");
const cartBadge = document.getElementById("cartBadge");
const deliveryAddressText = document.getElementById("deliveryAddressText");
const topbarItemsCount = document.getElementById("topbarItemsCount");
const topbarDeliveryAddress = document.getElementById("topbarDeliveryAddress");
const topbarChangeButton = document.getElementById("topbarChangeButton");
const addressChangeButton = document.getElementById("addressChangeButton");

let cart = loadCart();

function parseSavedValue(value) {
  if (!value) return null;
  if (typeof value !== "string") return value;
  const trimmed = value.trim();
  if (!trimmed) return null;
  if (trimmed.startsWith("{") || trimmed.startsWith("[")) {
    try { return JSON.parse(trimmed); } catch (_) { return trimmed; }
  }
  return trimmed;
}

function cleanText(value) {
  if (value === null || value === undefined) return "";
  return String(value).trim();
}

function loadCart() {
  const savedCart = localStorage.getItem("cart");
  if (!savedCart) return [];

  try {
    const parsed = JSON.parse(savedCart);
    if (Array.isArray(parsed)) return normalizeCart(parsed);
    if (parsed && typeof parsed === "object") return normalizeCart(Object.values(parsed));
    return [];
  } catch (_) {
    return [];
  }
}

function normalizeCart(items) {
  return items
    .map(item => ({
      id: Number(item.id),
      name: cleanText(item.name) || "Food item",
      price: Number(item.price) || 0,
      qty: Math.max(0, Number(item.qty) || 0),
      image: cleanText(item.image) || productImageMap[Number(item.id)] || "assets/food-plate-img.png",
      protein: cleanText(item.protein),
      category: cleanText(item.category)
    }))
    .filter(item => item.id && item.qty > 0);
}

function saveCart() {
  cart = normalizeCart(cart);
  localStorage.setItem("cart", JSON.stringify(cart));
}

function formatRupee(value) {
  return `₹${Number(value || 0).toLocaleString("en-IN")}`;
}

function getCartTotals() {
  const totalQty = cart.reduce((sum, item) => sum + (Number(item.qty) || 0), 0);
  const subtotal = cart.reduce((sum, item) => sum + ((Number(item.price) || 0) * (Number(item.qty) || 0)), 0);
  const delivery = totalQty > 0 ? DELIVERY_FEE : 0;
  const total = subtotal + delivery;
  return { totalQty, subtotal, delivery, total };
}

function updateItemQty(productId, change) {
  const item = cart.find(cartItem => Number(cartItem.id) === Number(productId));
  if (!item) return;
  item.qty = (Number(item.qty) || 0) + change;
  if (item.qty <= 0) {
    cart = cart.filter(cartItem => Number(cartItem.id) !== Number(productId));
  }
  saveCart();
  renderCart();
}

function removeItem(productId) {
  cart = cart.filter(cartItem => Number(cartItem.id) !== Number(productId));
  saveCart();
  renderCart();
}

function getDeliveryAddress() {
  const locationDetails =
    parseSavedValue(localStorage.getItem("cust_location_details")) ||
    parseSavedValue(localStorage.getItem("delivery_location_details"));

  if (locationDetails && typeof locationDetails === "object") {
    const doorNo = cleanText(locationDetails.doorNo);
    const fullAddress = cleanText(locationDetails.fullAddress || locationDetails.address || locationDetails.displayAddress);
    const landmark = cleanText(locationDetails.landmark);
    const parts = [];
    if (doorNo) parts.push(doorNo);
    if (fullAddress) parts.push(fullAddress);
    if (landmark) parts.push(`Landmark: ${landmark}`);
    if (parts.length) return parts.join(", ");
  }

  return (
    cleanText(localStorage.getItem("delivery_full_address")) ||
    cleanText(localStorage.getItem("cust_full_address")) ||
    cleanText(localStorage.getItem("delivery_address")) ||
    cleanText(localStorage.getItem("cust_address")) ||
    "Set delivery location from menu."
  );
}


function getShortDeliveryAddress() {
  const directShort =
    cleanText(localStorage.getItem("delivery_address")) ||
    cleanText(localStorage.getItem("cust_address"));

  const full = directShort || getDeliveryAddress();

  if (!full || full === "Set delivery location from menu.") {
    return "Set location";
  }

  return full.replace(/\s+/g, " ");
}

function renderCartItems() {
  cartItemsList.innerHTML = cart.map(item => {
    const lineTotal = (Number(item.price) || 0) * (Number(item.qty) || 0);
    const meta = item.protein ? `${item.protein} protein` : item.category ? item.category : "Home cooked meal";

    return `
      <article class="cart-item" data-product-id="${item.id}">
        <img class="cart-item-img" src="${item.image}" alt="${item.name}">
        <div class="cart-item-copy">
          <div class="cart-item-top">
            <div class="cart-item-name">${item.name}</div>
            <div class="cart-item-total">${formatRupee(lineTotal)}</div>
          </div>
          <div class="cart-item-meta">${formatRupee(item.price)} each · ${meta}</div>
          <div class="cart-item-bottom">
            <div class="qty-control-wrap" aria-label="Quantity control for ${item.name}">
              <button class="qty-btn qty-minus" type="button" data-product-id="${item.id}" aria-label="Decrease quantity">−</button>
              <div class="qty-count">${item.qty}</div>
              <button class="qty-btn qty-plus" type="button" data-product-id="${item.id}" aria-label="Increase quantity">+</button>
            </div>
            <button class="remove-btn" type="button" data-product-id="${item.id}">Remove</button>
          </div>
        </div>
      </article>
    `;
  }).join("");
}

function updateCartBadge(totalQty) {
  if (!cartBadge) return;
  if (totalQty <= 0) {
    cartBadge.style.display = "none";
    return;
  }
  cartBadge.style.display = "flex";
  cartBadge.textContent = totalQty;
}

function renderCart() {
  cart = loadCart();
  const totals = getCartTotals();
  const itemLabel = totals.totalQty === 1 ? "item" : "items";

  if (topbarItemsCount) topbarItemsCount.textContent = `${totals.totalQty} ${itemLabel}`;
  if (topbarDeliveryAddress) topbarDeliveryAddress.textContent = getShortDeliveryAddress();

  updateCartBadge(totals.totalQty);

  if (totals.totalQty <= 0) {
    emptyCartScreen.classList.remove("is-hidden");
    cartWithOrdersScreen.classList.add("is-hidden");
    checkoutBar.style.display = "none";
    return;
  }

  emptyCartScreen.classList.add("is-hidden");
  cartWithOrdersScreen.classList.remove("is-hidden");
  checkoutBar.style.display = "block";

  cartItemsLabel.textContent = `${totals.totalQty} ${itemLabel} added`;
  renderCartItems();

  subtotalValue.textContent = formatRupee(totals.subtotal);
  deliveryValue.textContent = totals.delivery === 0 ? "Free" : formatRupee(totals.delivery);
  totalValue.textContent = formatRupee(totals.total);
  checkoutTotal.textContent = formatRupee(totals.total);
  deliveryAddressText.textContent = getDeliveryAddress();
}

cartItemsList.addEventListener("click", (event) => {
  const minus = event.target.closest(".qty-minus");
  const plus = event.target.closest(".qty-plus");
  const remove = event.target.closest(".remove-btn");

  if (minus) updateItemQty(minus.dataset.productId, -1);
  if (plus) updateItemQty(plus.dataset.productId, 1);
  if (remove) removeItem(remove.dataset.productId);
});


function openLocationMapFromCart() {
  sessionStorage.setItem("cbe_open_location_map", "1");
  sessionStorage.setItem("cbe_location_return_to", "cart.html");
  window.location.href = "menu.html?openLocation=1&returnTo=cart";
}

if (topbarChangeButton) {
  topbarChangeButton.addEventListener("click", openLocationMapFromCart);
}

if (addressChangeButton) {
  addressChangeButton.addEventListener("click", openLocationMapFromCart);
}

checkoutButton.addEventListener("click", () => {
  const totals = getCartTotals();
  if (totals.totalQty <= 0) return;

  localStorage.setItem("checkout_cart_snapshot", JSON.stringify({
    items: cart,
    totals,
    deliveryAddress: getDeliveryAddress(),
    createdAt: new Date().toISOString()
  }));

  alert("Payment flow is next. Cart is saved safely.");
});

window.addEventListener("storage", (event) => {
  if (event.key === "cart") renderCart();
});

renderCart();
</script>
</body>
