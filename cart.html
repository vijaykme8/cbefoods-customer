<script>
(() => {
  const CART_KEY = 'cart';
  const CART_CLEARED_AT_KEY = 'cbe_cart_cleared_at';
  const CART_CLEARED_CUSTOMER_KEY = 'cbe_cart_cleared_customer_id';
  const BASE_DELIVERY_FEE = 10;
  const FREE_DISTANCE_KM = 10;
  const EXTRA_KM_DELIVERY_FEE = 2;

  const cartShell = document.getElementById('cartShell');
  const itemsCountEl = document.getElementById('itemsCount');
  const deliveryAddressEl = document.getElementById('deliveryAddress');
  const itemCardsEl = document.getElementById('itemCards');
  const itemTotalEl = document.getElementById('itemTotal');
  const deliveryFeeEl = document.getElementById('deliveryFee');
  const taxChargesEl = document.getElementById('taxCharges');
  const toPayEl = document.getElementById('toPay');
  const bottomTotalEl = document.getElementById('bottomTotal');
  const toastEl = document.getElementById('toast');

  function escapeHTML(value) {
    return String(value ?? '').replace(/[&<>"']/g, (char) => ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#039;'
    }[char]));
  }

  function money(value) {
    const amount = Number(value || 0);
    return `₹${Math.round(amount)}`;
  }

  function numberFrom(value, fallback = 0) {
    if (typeof value === 'number' && Number.isFinite(value)) return value;
    const cleaned = String(value ?? '').replace(/[^\d.]/g, '');
    const parsed = Number.parseFloat(cleaned);
    return Number.isFinite(parsed) ? parsed : fallback;
  }

  function readJSON(key) {
    try {
      const raw = localStorage.getItem(key);
      if (!raw) return null;
      return JSON.parse(raw);
    } catch {
      return null;
    }
  }


  function parseMaybeJSON(value) {
    if (value === null || value === undefined || value === '') return null;
    if (typeof value !== 'string') return value;

    const trimmed = value.trim();
    if (!trimmed) return null;

    if (trimmed.startsWith('{') || trimmed.startsWith('[')) {
      try {
        return JSON.parse(trimmed);
      } catch {
        return value;
      }
    }

    return value;
  }

  function cleanText(value) {
    return String(value ?? '').trim();
  }

  const CUSTOMER_MEMORY_KEYS = {
    lastCustomer: 'CBE_LAST_CUSTOMER_MEMORY_KEY',
    activeLocation: [
      'activeDeliveryLocation',
      'customer_active_delivery_location',
      'active_delivery_location',
      'TIFFIN_ACTIVE_DELIVERY_LOCATION',
      'selectedDeliveryLocation',
      'selected_delivery_location',
      'deliveryLocation',
      'delivery_location',
      'cust_location_details',
      'delivery_location_details',
      'cust_location',
      'customer_location',
      'user_location',
      'current_location',
      'currentLocation',
      'location'
    ],
    savedAddresses: [
      'cust_saved_addresses',
      'delivery_saved_addresses',
      'savedAddresses',
      'saved_addresses',
      'TIFFIN_SAVED_ADDRESSES',
      'tiffin_saved_addresses',
      'CBE_SAVED_ADDRESSES',
      'cbe_saved_addresses',
      'savedDeliveryAddresses',
      'delivery_addresses',
      'TIFFIN_CUSTOMER_ADDRESSES'
    ],
    profile: [
      'TIFFIN_CUSTOMER_PROFILE',
      'CBE_CUSTOMER_PROFILE',
      'customerProfile',
      'cust_profile',
      'userProfile',
      'profile'
    ]
  };

  const customerMemory = {
    docRef: null,
    identity: null,
    ready: false,
    restoring: false,
    syncTimer: null
  };

  function getCartCustomerMarkerId() {
    return cleanText(customerMemory.identity?.docId || localStorage.getItem(CUSTOMER_MEMORY_KEYS.lastCustomer) || localStorage.getItem('cust_uid') || localStorage.getItem('customer_uid'));
  }

  function markCartClearedLocally() {
    localStorage.setItem(CART_CLEARED_AT_KEY, new Date().toISOString());

    const markerId = getCartCustomerMarkerId();
    if (markerId) {
      localStorage.setItem(CART_CLEARED_CUSTOMER_KEY, markerId);

  function clearCartClearedMarker() {
    localStorage.removeItem(CART_CLEARED_AT_KEY);
    localStorage.removeItem(CART_CLEARED_CUSTOMER_KEY);
  }

  function toMillis(value) {
    if (!value) return 0;
    if (typeof value.toDate === 'function') return value.toDate().getTime() || 0;
    if (value.seconds) return Number(value.seconds) * 1000;
    const time = new Date(value).getTime();
    return Number.isFinite(time) ? time : 0;
  }

  function getLocalCartClearedMsForCustomer() {
    const clearedAt = localStorage.getItem(CART_CLEARED_AT_KEY);
    const clearedFor = cleanText(localStorage.getItem(CART_CLEARED_CUSTOMER_KEY));
    const currentId = getCartCustomerMarkerId();

    if (clearedFor && currentId && clearedFor !== currentId) return 0;
    return toMillis(clearedAt);
  }

  function shouldBlockCloudCartRestore(data = {}) {
    const localClearedMs = getLocalCartClearedMsForCustomer();
    const remoteClearedMs = toMillis(data.lastCartClearedAt || data.currentCart?.clearedAt || data.cartClearedAt);
    const clearedMs = Math.max(localClearedMs, remoteClearedMs);

    if (!clearedMs) return false;

    const remoteCartUpdatedMs = toMillis(
      data.currentCart?.updatedAt ||
      data.cartUpdatedAt ||
      data.lastCartSyncAt ||
      data.updatedAt
    );

    // If the remote cart is older than the latest clear marker, do not revive stale items.
    return !remoteCartUpdatedMs || remoteCartUpdatedMs <= clearedMs + 1000;
  }

  function phone10(value) {
    const digits = cleanText(value).replace(/\D/g, '');
    return digits.length > 10 ? digits.slice(-10) : digits;

  function getLocalAuthObject() {

  function handleCustomerSwitch(identity) {
    if (!identity || !identity.docId) return;

    const nextKey = identity.docId;
    const previousKey = localStorage.getItem(CUSTOMER_MEMORY_KEYS.lastCustomer);

    if (previousKey && previousKey !== nextKey) {
      const keysToClear = [
        CART_KEY,
        CART_CLEARED_AT_KEY,
        CART_CLEARED_CUSTOMER_KEY,
        'checkout_snapshot',
        'pending_order',
        'cust_address',
        'delivery_address',
        'cust_full_address',
        'delivery_full_address',
        'cust_lat',
        'cust_lng',
        ...CUSTOMER_MEMORY_KEYS.activeLocation,
        ...CUSTOMER_MEMORY_KEYS.savedAddresses
      ];

      [...new Set(keysToClear)].forEach(key => {
        try {
          localStorage.removeItem(key);
        } catch {}
      });
    }

    localStorage.setItem(CUSTOMER_MEMORY_KEYS.lastCustomer, nextKey);
    localStorage.setItem('cust_uid', identity.uid || nextKey);
    localStorage.setItem('customer_uid', identity.uid || nextKey);

    if (identity.phone) {
      localStorage.setItem('cust_phone', identity.phone);
      localStorage.setItem('customer_phone', identity.phone);
      localStorage.setItem('TIFFIN_CUSTOMER_PHONE', identity.phone);
    }
  }

  function normalizeAddressListFromValue(value) {
    const parsed = parseMaybeJSON(value);
    if (!parsed) return [];

    if (Array.isArray(parsed)) return parsed.filter(Boolean);

    if (typeof parsed === 'object') {
      if (Array.isArray(parsed.savedAddresses)) return parsed.savedAddresses.filter(Boolean);
      if (Array.isArray(parsed.addresses)) return parsed.addresses.filter(Boolean);
      if (Array.isArray(parsed.items)) return parsed.items.filter(Boolean);
      return [parsed];
    }

    return [];
  }

  function addressMemoryKey(address) {
    if (!address) return '';

    const fullAddress = cleanText(
      address.fullAddress ||
      address.full ||
      address.address ||
      address.displayAddress ||
      address.line ||
      ''
    ).toLowerCase();

    const lat = address.lat || address.latitude || address?.coords?.lat || '';
    const lng = address.lng || address.lon || address.long || address.longitude || address?.coords?.lng || '';

    if (lat && lng) return `geo:${Number(lat).toFixed(5)},${Number(lng).toFixed(5)}`;

    return [
      cleanText(address.id),
      cleanText(address.label || address.title || address.type),
      fullAddress,
      cleanText(address.doorNo || address.door || address.houseNo)
    ].join('|').toLowerCase();
  }

  function mergeAddressLists(...lists) {
    const merged = [];
    const seen = new Set();

    lists.flat().filter(Boolean).forEach(address => {
      const key = addressMemoryKey(address);
      if (!key || seen.has(key)) return;
      seen.add(key);
      merged.push(address);
    });

    return merged;
  }

  function getLocalSavedAddresses() {
    const all = [];

    CUSTOMER_MEMORY_KEYS.savedAddresses.forEach(key => {
      all.push(...normalizeAddressListFromValue(localStorage.getItem(key)));

    return mergeAddressLists(all);
  }

  function saveSharedSavedAddresses(addresses) {
    const safeList = mergeAddressLists(Array.isArray(addresses) ? addresses : []);

  function getActiveDeliveryLocationObject() {

  function saveSharedActiveLocation(locationValue) {
    const location = getLocationFromAnyObject(locationValue) || locationValue;
    if (!location || typeof location !== 'object') return null;

    const fullAddress = cleanText(location.fullAddress || location.full || location.address || location.displayAddress);
    const displayAddress = cleanText(location.displayAddress || location.display || fullAddress);

    const normalized = {
      ...location,
      fullAddress,
      displayAddress,
      updatedAt: location.updatedAt || new Date().toISOString()
    };

    CUSTOMER_MEMORY_KEYS.activeLocation.forEach(key => {

    });

      localStorage.setItem('delivery_address', displayAddress || fullAddress);
      localStorage.setItem('cust_full_address', fullAddress || displayAddress);

    }

    if (normalized.lat && normalized.lng) {
      localStorage.setItem('cust_lat', String(normalized.lat));

  function normalizeCloudCart(value) {
    return normalizeCartStorage(value)
      .filter(Boolean)
      .map(item => {
        const qty = Math.max(1, parseInt(item.qty ?? item.quantity ?? item.count ?? 1, 10) || 1);
        return { ...item, qty };

  function getCustomerMemoryPayload(reason = 'cart_sync') {
    const profileObject = getLocalProfileObject();
    const activeDeliveryLocation = getActiveDeliveryLocationObject();
    const savedAddresses = getLocalSavedAddresses();
    const cartItems = loadCartRaw().map(({ _cartIndex, ...item }) => item);
    const identity = customerMemory.identity || getCustomerIdentity();

    const cartClearedAt = localStorage.getItem(CART_CLEARED_AT_KEY) || '';
    const cartClearedCustomerId = localStorage.getItem(CART_CLEARED_CUSTOMER_KEY) || '';

    const payload = {
      updatedAt: new Date().toISOString(),
      lastCartSyncAt: new Date().toISOString(),
      lastCartSyncReason: reason,
      cartItems,
      cart: cartItems,
      currentCart: {
        items: cartItems,
        updatedAt: new Date().toISOString(),
        clearedAt: cartClearedAt || ''
      },
      cartUpdatedAt: new Date().toISOString(),
      lastCartClearedAt: cartClearedAt || '',
      lastCartClearedCustomerId: cartClearedCustomerId || ''
    };

    if (identity) {
      payload.uid = identity.uid;
      payload.phoneNumber = identity.phone || '';
      payload.name = profileObject.name || identity.name || '';
      payload.email = profileObject.email || identity.email || '';
    }

    if (savedAddresses.length) {
      payload.savedAddresses = savedAddresses;
    }

    if (activeDeliveryLocation) {
      payload.activeDeliveryLocation = activeDeliveryLocation;
    }

    if (profileObject && Object.keys(profileObject).length) {
      payload.profile = profileObject;
    }

    return payload;
  }

  function syncCustomerMemoryNow(reason = 'cart_updated') {
    if (!customerMemory.docRef || customerMemory.restoring) return Promise.resolve();

    const payload = getCustomerMemoryPayload(reason);
    return customerMemory.docRef.set(payload, { merge: true }).catch(error => {
      console.warn('Customer cart memory sync failed', error);
    });
  }

  function scheduleCustomerMemorySync(reason = 'cart_updated') {
    if (!customerMemory.docRef || customerMemory.restoring) return;

    window.clearTimeout(customerMemory.syncTimer);
    customerMemory.syncTimer = window.setTimeout(() => {
      syncCustomerMemoryNow(reason);
    }, 450);
  }

  async function restoreCustomerMemoryFromCloud() {
    if (!customerMemory.docRef) return;

    customerMemory.restoring = true;

    try {
      const snapshot = await customerMemory.docRef.get();
      if (!snapshot.exists) {
        scheduleCustomerMemorySync('new_customer_cart_memory');
        return;
      }

      const data = snapshot.data() || {};

      const localSaved = getLocalSavedAddresses();
      const cloudSaved = normalizeAddressListFromValue(data.savedAddresses || data.addresses || []);
      const mergedSaved = mergeAddressLists(cloudSaved, localSaved);

      if (mergedSaved.length) {
        saveSharedSavedAddresses(mergedSaved);
      }

      const cloudActiveLocation =
        data.activeDeliveryLocation ||
        data.active_delivery_location ||
        data.currentDeliveryLocation ||
        data.deliveryLocation ||
        null;

      if (cloudActiveLocation) {
        saveSharedActiveLocation(cloudActiveLocation);
      }

      const localCart = loadCartRaw();
      const cloudCart = normalizeCloudCart(data.cartItems || data.cart || data.currentCart?.items || data.currentCart || []);
      const blockStaleCloudCart = shouldBlockCloudCartRestore(data);

      if (!localCart.length && cloudCart.length && !blockStaleCloudCart) {
        localStorage.setItem(CART_KEY, JSON.stringify(cloudCart));
      }

      if (!localCart.length && blockStaleCloudCart) {
        localStorage.setItem(CART_KEY, JSON.stringify([]));
      }

      renderCart();
      scheduleCustomerMemorySync('cart_memory_restored');
    } catch (error) {
      console.warn('Customer cart memory restore failed', error);
    } finally {
      customerMemory.restoring = false;
    }
  }

  function bootCustomerMemorySync() {
    if (!window.firebase || !window.TIFFIN_FIREBASE_CONFIG || !window.TIFFIN_FIREBASE_CONFIG.apiKey) {
      return;
    }

    try {
      if (!firebase.apps.length) firebase.initializeApp(window.TIFFIN_FIREBASE_CONFIG);

      firebase.auth().onAuthStateChanged(user => {
        const identity = getCustomerIdentity(user);
        if (!identity || !identity.docId) return;

        handleCustomerSwitch(identity);

        customerMemory.identity = identity;
        customerMemory.docRef = firebase.firestore().collection('customers').doc(identity.docId);
        customerMemory.ready = true;

        restoreCustomerMemoryFromCloud();
      });
    } catch (error) {
      console.warn('Customer cart memory boot failed', error);
    }
  }

  function getNumberValue(value) {
    if (value === null || value === undefined || value === '') return null;
    const parsed = Number(value);
    return Number.isFinite(parsed) ? parsed : null;
  }

  function getCoordsFromObject(source) {
    if (!source || typeof source !== 'object') return null;

    const lat = getNumberValue(
      source.lat ??
      source.latitude ??
      source.customerLat ??
      source.customer_lat ??
      source.deliveryLat ??
      source.delivery_lat ??
      source.restaurantLat ??
      source.restaurant_lat ??
      source.adminLat ??
      source.admin_lat
    );

    const lng = getNumberValue(
      source.lng ??
      source.lon ??
      source.long ??
      source.longitude ??
      source.customerLng ??
      source.customer_lng ??
      source.deliveryLng ??
      source.delivery_lng ??
      source.restaurantLng ??
      source.restaurant_lng ??
      source.adminLng ??
      source.admin_lng
    );

    if (lat === null || lng === null) return null;
    return { lat, lng };
  }

  function getCoordsFromLocalStorageObject(keys) {
    for (const key of keys) {
      const value = readJSON(key);

  function distanceKmBetween(a, b) {
    if (!a || !b) return null;

    const earthRadiusKm = 6371;
    const toRad = (degree) => degree * Math.PI / 180;
    const dLat = toRad(b.lat - a.lat);
    const dLng = toRad(b.lng - a.lng);
    const lat1 = toRad(a.lat);
    const lat2 = toRad(b.lat);

    const haversine =
      Math.sin(dLat / 2) ** 2 +
      Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLng / 2) ** 2;

    return 2 * earthRadiusKm * Math.atan2(Math.sqrt(haversine), Math.sqrt(1 - haversine));
  }

  function calculateDeliveryFeeInfo() {
    const restaurant = getRestaurantCoordsForDeliveryFee();
    const customer = getCustomerCoordsForDeliveryFee();
    const distanceKm = distanceKmBetween(restaurant, customer);

    if (distanceKm === null) {
      return {
        deliveryFee: BASE_DELIVERY_FEE,
        distanceKm: null,
        baseKm: FREE_DISTANCE_KM,
        baseFee: BASE_DELIVERY_FEE,
        extraKm: 0,
        extraPerKm: EXTRA_KM_DELIVERY_FEE,
        restaurantLocation: restaurant,
        customerLocation: customer,
        reason: 'missing_coordinates_base_fee'
      };
    }

    const extraKm = Math.max(0, Math.ceil(distanceKm - FREE_DISTANCE_KM));
    const deliveryFee = BASE_DELIVERY_FEE + (extraKm * EXTRA_KM_DELIVERY_FEE);

    return {
      deliveryFee,
      distanceKm: Number(distanceKm.toFixed(2)),
      baseKm: FREE_DISTANCE_KM,
      baseFee: BASE_DELIVERY_FEE,
      extraKm,
      extraPerKm: EXTRA_KM_DELIVERY_FEE,
      restaurantLocation: restaurant,
      customerLocation: customer,
      reason: extraKm > 0 ? 'base_fee_plus_extra_km' : 'base_fee_within_10km'
    };
  }

  function normalizeCartStorage(parsed) {
    if (Array.isArray(parsed)) return parsed;
    if (parsed && typeof parsed === 'object') return Object.values(parsed);
    return [];
  }

  function loadCartRaw() {
    return normalizeCartStorage(readJSON(CART_KEY))
      .filter(Boolean)
      .map((item, index) => {
        const qty = Math.max(1, parseInt(item.qty ?? item.quantity ?? item.count ?? 1, 10) || 1);
        return { ...item, qty, _cartIndex: index };
      });

  function saveCart(cart) {
    const cleanCart = cart
      .filter(item => Number(item.qty) > 0)
      .map(({ _cartIndex, ...item }) => item);

    localStorage.setItem(CART_KEY, JSON.stringify(cleanCart));

    if (cleanCart.length) {
      clearCartClearedMarker();
      scheduleCustomerMemorySync('cart_updated');

      markCartClearedLocally();
      syncCustomerMemoryNow('cart_cleared_by_customer');

  function getItemId(item, index = 0) {

  function getItemPrice(item) {

  function getItemImage(item) {
    const directImage = item.image ?? item.img ?? item.imageUrl ?? item.photo ?? item.thumbnail ?? item.asset;

    if (directImage) {
      return directImage;
    }

    /*
    Existing cart items saved before this fix may not have an image key.
    So cart uses id/name fallback mapping to render the same menu image.
    */
    const fallbackById = {
      "1": "assets/menu/img/Protein egg lunch-img.png",
      "2": "assets/menu/img/Regular meal-img.png",
      "3": "assets/menu/img/Protein chicken lunch-img.png",
      "4": "assets/menu/img/Chappati & gravy-img.png"
    };

    const id = String(item.id ?? item.productId ?? item.menuId ?? item.itemId ?? '').trim();

    if (fallbackById[id]) {
      return fallbackById[id];
    }

    const normalizedName = String(item.name ?? item.title ?? item.itemName ?? item.productName ?? '')
      .trim()
      .toLowerCase()
      .replace(/\s+/g, ' ');

    const fallbackByName = {
      "protein egg lunch": "assets/menu/img/Protein egg lunch-img.png",
      "regular meal": "assets/menu/img/Regular meal-img.png",
      "protein chicken lunch": "assets/menu/img/Protein chicken lunch-img.png",
      "protein chicken dinner": "assets/menu/img/Protein chicken lunch-img.png",
      "chappati & gravy": "assets/menu/img/Chappati & gravy-img.png",
      "chappati and gravy": "assets/menu/img/Chappati & gravy-img.png"
    };

    return fallbackByName[normalizedName] || '';
  }

  function getProteinText(item) {
    const direct = item.protein ?? item.proteinText ?? item.proteinValue ?? item.protein_g ?? item.proteinG;
    if (direct === undefined || direct === null || direct === '') return '';
    const text = String(direct).trim();
    if (!text) return '';
    return /g$/i.test(text) ? text : `${text}g`;
  }

  function getTotals(cart) {
    const itemTotal = cart.reduce((sum, item) => sum + (getItemPrice(item) * Number(item.qty || 0)), 0);
    const deliveryFeeInfo = cart.length ? calculateDeliveryFeeInfo() : {
      deliveryFee: 0,
      distanceKm: null,
      baseKm: FREE_DISTANCE_KM,
      baseFee: BASE_DELIVERY_FEE,
      extraKm: 0,
      extraPerKm: EXTRA_KM_DELIVERY_FEE,
      restaurantLocation: getRestaurantCoordsForDeliveryFee(),
      customerLocation: getCustomerCoordsForDeliveryFee(),
      reason: 'empty_cart'
    };
    const deliveryFee = deliveryFeeInfo.deliveryFee;
    const tax = 0;
    const total = itemTotal + deliveryFee + tax;
    const qtyTotal = cart.reduce((sum, item) => sum + Number(item.qty || 0), 0);

    return { itemTotal, deliveryFee, tax, total, qtyTotal, deliveryFeeInfo };
  }

  function truncateAddress(value, max = 24) {
    const text = String(value || '').trim();
    if (!text) return 'Set location';
    return text.length > max ? `${text.slice(0, max - 2)}..` : text;
  }

  function isUsableDeliveryAddress(value) {
    const text = String(value || '').trim();
    if (!text) return false;

    const normalized = text.toLowerCase();

    const blockedValues = new Set([
      'set location',
      'set delivery location',
      'loading location...',
      'loading location',
      'getting location...',
      'getting location',
      'current location captured',
      'location captured',
      'location saved',
      'pinned location',
      'pinned location preview'
    ]);

    if (blockedValues.has(normalized)) return false;

    /*
      Do not allow coordinate-only values as a delivery address.
      Place order must force the user to save/select a readable address first.
    */
    if (/^-?\d+(\.\d+)?\s*,\s*-?\d+(\.\d+)?$/.test(normalized)) return false;

    return text.length >= 5;
  }

  function extractAddressFromValue(value) {
    if (!value) return '';

    if (typeof value === 'string') {
      const trimmed = value.trim();
      if (!trimmed) return '';

      try {
        const parsed = JSON.parse(trimmed);
        const extracted = extractAddressFromValue(parsed);
        if (isUsableDeliveryAddress(extracted)) return extracted;
      } catch {
        return trimmed;
      }

      return trimmed;
    }

    if (typeof value === 'object') {
      const fields = [
        value.fullAddress,
        value.full_address,
        value.address,
        value.addressLine,
        value.address_line,
        value.addressDetails,
        value.address_details,
        value.deliveryAddress,
        value.delivery_address,
        value.formatted_address,
        value.formattedAddress,
        value.display_name,
        value.name,
        value.label,
        value.title
      ];

      const direct = fields.find(field => typeof field === 'string' && field.trim());
      if (direct) return direct.trim();

      const parts = [
        value.house,
        value.doorNo,
        value.door_no,
        value.flat,
        value.line1,
        value.street,
        value.landmark,
        value.area,
        value.city
      ].filter(part => typeof part === 'string' && part.trim());

      if (parts.length) return parts.join(', ');
    }

    return '';
  }

  function getDeliveryAddress() {
    const addressKeys = [
      'cust_address',
      'customer_address',
      'delivery_address',
      'deliveryAddress',
      'selected_address',
      'selectedAddress',
      'user_address',
      'address',
      'cust_location_name',
      'cust_location_address',
      'current_address',
      'currentAddress'
    ];

    const objectKeys = [
      'activeDeliveryLocation',
      'customer_active_delivery_location',
      'active_delivery_location',
      'TIFFIN_ACTIVE_DELIVERY_LOCATION',
      'deliveryLocation',
      'delivery_location',
      'cust_location_details',
      'delivery_location_details',
      'selectedDeliveryLocation',
      'selected_delivery_location',
      'selected_location',
      'cust_location',
      'customer_location',
      'user_location',
      'current_location',
      'currentLocation',
      'location'
    ];

    for (const key of objectKeys) {
      const raw = localStorage.getItem(key);
      const extracted = extractAddressFromValue(raw);
      if (isUsableDeliveryAddress(extracted)) return extracted;
    }

    for (const key of addressKeys) {
      const raw = localStorage.getItem(key);
      const extracted = extractAddressFromValue(raw);
      if (isUsableDeliveryAddress(extracted)) return extracted;
    }

    return '';
  }

  function renderItem(item, index) {
    const id = getItemId(item, index);
    const name = getItemName(item);
    const price = getItemPrice(item);
    const image = getItemImage(item);
    const protein = getProteinText(item);
    const qty = Number(item.qty || 1);

    return `
      <div class="item-card" data-item-id="${escapeHTML(id)}">
        <div class="left-content">
          <div class="item-img-wrap">
            ${image ? `<img class="item-img" src="${escapeHTML(image)}" alt="${escapeHTML(name)}" onerror="this.style.display='none'" />` : ''}
          </div>
          <div class="item-details">
            <div class="item-title">${escapeHTML(name)}</div>
            ${protein ? `
              <div class="protein-details">
                <span class="protein-label">Protein:</span>
                <span class="protein-value">${escapeHTML(protein)}</span>
              </div>
            ` : ''}
          </div>
        </div>

        <div class="price-add-item">
          <div class="qty-control" aria-label="Quantity controls for ${escapeHTML(name)}">
            <button class="qty-btn" type="button" data-action="decrease" data-item-id="${escapeHTML(id)}" aria-label="Decrease ${escapeHTML(name)}">-</button>
            <span class="qty-number">${qty}</span>
            <button class="qty-btn" type="button" data-action="increase" data-item-id="${escapeHTML(id)}" aria-label="Increase ${escapeHTML(name)}">+</button>
          </div>
          <div class="item-price">${money(price)}</div>
        </div>
      </div>
    `;
  }

  function renderCart() {
    const cart = loadCartRaw();
    const totals = getTotals(cart);
    const address = getDeliveryAddress();

    cartShell.classList.toggle('is-empty', cart.length === 0);
    itemsCountEl.textContent = totals.qtyTotal === 1 ? '1 item' : `${totals.qtyTotal} items`;
    deliveryAddressEl.textContent = isUsableDeliveryAddress(address) ? truncateAddress(address, 24) : 'Set location';

    itemCardsEl.innerHTML = cart.map(renderItem).join('');

    itemTotalEl.textContent = money(totals.itemTotal);
    deliveryFeeEl.textContent = cart.length ? money(totals.deliveryFee) : '₹0';
    taxChargesEl.textContent = '-';
    toPayEl.textContent = money(totals.total);
    bottomTotalEl.textContent = money(totals.total);
  }

  function changeQty(itemId, direction) {
    const cart = loadCartRaw();
    const index = cart.findIndex((item, itemIndex) => getItemId(item, itemIndex) === itemId);
    if (index === -1) return;

    cart[index].qty = Number(cart[index].qty || 1) + direction;

    if (cart[index].qty <= 0) {
      cart.splice(index, 1);
    }

    saveCart(cart);
    renderCart();
  }

  function showToast(message) {
    toastEl.textContent = message;
    toastEl.classList.add('show');

    window.clearTimeout(showToast.timer);
    showToast.timer = window.setTimeout(() => {
      toastEl.classList.remove('show');
    }, 2200);
  }

  function getRazorpayKeyId() {
    return (
      window.TIFFIN_RAZORPAY_KEY_ID ||
      localStorage.getItem('TIFFIN_RAZORPAY_KEY_ID') ||
      localStorage.getItem('razorpay_key_id') ||
      ''
    ).trim();
  }

  function setPlaceOrderLoading(isLoading, label = 'Place order') {
    const button = document.getElementById('placeOrderBtn');
    if (!button) return;

    button.classList.toggle('is-loading', Boolean(isLoading));
    button.textContent = isLoading ? label : 'Place order';
  }

  function openLocationFlow(returnMode = 'cart') {
    if (returnMode === 'payment') {
      sessionStorage.setItem('cbe_checkout_after_address', '1');
      sessionStorage.setItem('cbe_location_return_to', 'cart-payment');
      sessionStorage.setItem('cbe_open_location_map', '1');
      window.location.href = 'menu.html?openLocation=1&returnTo=cart-payment';
      return;
    }

    sessionStorage.removeItem('cbe_checkout_after_address');
    sessionStorage.setItem('cbe_location_return_to', 'cart');
    sessionStorage.setItem('cbe_open_location_map', '1');
    window.location.href = 'menu.html?openLocation=1&returnTo=cart';
  }

  function buildCheckoutSnapshot(cart, address) {
    const totals = getTotals(cart);
    const items = cart.map(({ _cartIndex, ...item }) => item);
    const totalQty = items.reduce((sum, item) => sum + Number(item.qty || 0), 0);
    const customerProfile = getCustomerProfileForCheckout();
    const customerName = customerProfile.name || '';
    const customerPhone = customerProfile.phone || '';
    const customerEmail = customerProfile.email || '';
    const customerId = customerProfile.id || '';
    const activeDeliveryLocation = getActiveDeliveryLocationObject() || {
      fullAddress: address,
      displayAddress: address
    };

    return {
      id: `CBE-${Date.now()}`,
      receipt: `receipt_${Date.now()}`,
      status: 'checkout_ready',
      items,
      itemTotal: Math.round(totals.itemTotal),
      deliveryFee: Math.round(totals.deliveryFee),
      deliveryDistanceKm: totals.deliveryFeeInfo.distanceKm,
      deliveryFeeRule: totals.deliveryFeeInfo,
      restaurantLocation: totals.deliveryFeeInfo.restaurantLocation,
      customerLocation: totals.deliveryFeeInfo.customerLocation,
      tax: 0,
      total: Math.round(totals.total),
      totalQty,
      customerId,
      customerPhone,
      customerName,
      deliveryAddress: address,
      deliveryLocation: {
        ...activeDeliveryLocation,
        fullAddress: activeDeliveryLocation.fullAddress || address,
        displayAddress: activeDeliveryLocation.displayAddress || address
      },
      address,
      customer: {
        id: customerId,
        name: customerName,
        phone: customerPhone,
        contact: customerPhone,
        email: customerEmail
      },
      totals: {
        subtotal: Math.round(totals.itemTotal),
        delivery: Math.round(totals.deliveryFee),
        deliveryDistanceKm: totals.deliveryFeeInfo.distanceKm,
        deliveryFeeRule: totals.deliveryFeeInfo,
        tax: 0,
        total: Math.round(totals.total),
        totalQty
      },
      eta: '15 - 25 mins',
      createdAt: new Date().toISOString()
    };
  }

  function saveConfirmedOrder(snapshot, paymentResponse = {}) {
    const order = {
      ...snapshot,
      status: 'confirmed',
      paymentStatus: 'paid',
      paymentProvider: 'Razorpay',
      paymentId: paymentResponse.razorpay_payment_id || `dev_payment_${Date.now()}`,
      razorpayPaymentId: paymentResponse.razorpay_payment_id || '',
      razorpayOrderId: paymentResponse.razorpay_order_id || '',
      razorpaySignature: paymentResponse.razorpay_signature || '',
      paidAt: new Date().toISOString(),
      updatedAt: new Date().toISOString()
    };

    localStorage.setItem('current_order', JSON.stringify(order));

    try {
      const history = JSON.parse(localStorage.getItem('order_history') || '[]');
      const safeHistory = Array.isArray(history) ? history : Object.values(history || {});
      const orderKey = String(order.id || order.paymentId || order.createdAt);
      const withoutDuplicate = safeHistory.filter(savedOrder => {
        const savedKey = String(savedOrder?.id || savedOrder?.paymentId || savedOrder?.createdAt || '');
        return savedKey !== orderKey;
      });
      withoutDuplicate.unshift(order);
      localStorage.setItem('order_history', JSON.stringify(withoutDuplicate.slice(0, 20)));
    } catch {
      localStorage.setItem('order_history', JSON.stringify([order]));
    }

    if (window.TiffinMVP && typeof window.TiffinMVP.saveOrderToCloud === 'function') {
      window.TiffinMVP.saveOrderToCloud(order).catch(error => console.warn('Order cloud sync failed', error));
    }

    saveOrderToCustomerMemory(order);
    clearCartAfterPaidOrder(order);
    renderCart();

    window.location.href = 'order_placed.html';
  }

  function openRazorpayPayment(snapshot) {
    const key = getRazorpayKeyId();

    // Do not store unpaid payment attempts as orders. Only save after Razorpay success.

    if (!key) {
      localStorage.removeItem('pending_order');
      localStorage.removeItem('checkout_snapshot');
      setPlaceOrderLoading(false);
      showToast('Razorpay key is missing. Add your Razorpay key before testing payment.');
      return;
    }

    if (!window.Razorpay) {
      localStorage.removeItem('pending_order');
      localStorage.removeItem('checkout_snapshot');
      setPlaceOrderLoading(false);
      showToast('Razorpay checkout did not load. Check internet and try again.');
      return;
    }

    const options = {
      key,
      amount: Math.max(1, Math.round(snapshot.total * 100)),
      currency: 'INR',
      name: 'Tiffin CBE',
      description: 'Food order payment',
      image: 'assets/icons/icon-192.png',
      prefill: {
        name: snapshot.customer.name || '',
        contact: snapshot.customer.phone || '',
        email: snapshot.customer.email || ''
      },
      notes: {
        order_id: snapshot.id,
        address: snapshot.deliveryAddress
      },
      theme: {
        color: '#8806CE'
      },
      handler(response) {
        saveConfirmedOrder(snapshot, response);
      },
      modal: {
        ondismiss() {
          localStorage.removeItem('pending_order');
          localStorage.removeItem('checkout_snapshot');
          setPlaceOrderLoading(false);
          showToast('Payment was closed. Your order is not placed yet.');
        }
      }
    };

    setPlaceOrderLoading(true, 'Opening payment');
    const razorpay = new window.Razorpay(options);
    razorpay.open();
  }

  function handlePlaceOrder() {
    const cart = loadCartRaw();
    if (!cart.length) {
      renderCart();
      return;
    }

    const address = getDeliveryAddress();
    if (!isUsableDeliveryAddress(address)) {
      showToast('Select delivery address to continue payment.');
      openLocationFlow('payment');
      return;
    }

    saveSharedActiveLocation(getActiveDeliveryLocationObject() || {
      fullAddress: address,
      displayAddress: address,
      source: 'cart_place_order'
    });
    scheduleCustomerMemorySync('cart_payment_started');

    const snapshot = buildCheckoutSnapshot(cart, address);
    openRazorpayPayment(snapshot);
  }

  function continuePaymentFromAddressIfNeeded() {
    const params = new URLSearchParams(window.location.search);
    const shouldStartPayment =
      params.get('startPayment') === '1' ||
      sessionStorage.getItem('cbe_checkout_after_address') === '1';

    if (!shouldStartPayment) return;

    sessionStorage.removeItem('cbe_checkout_after_address');

    if (params.get('startPayment') === '1') {
      const cleanUrl = `${window.location.pathname}${window.location.hash || ''}`;
      window.history.replaceState({}, document.title, cleanUrl);
    }

    window.setTimeout(() => {
      const cart = loadCartRaw();
      if (!cart.length) return;

      const address = getDeliveryAddress();
      if (!isUsableDeliveryAddress(address)) return;

      const snapshot = buildCheckoutSnapshot(cart, address);
      openRazorpayPayment(snapshot);
    }, 350);
  }

  document.getElementById('changeLocationBtn').addEventListener('click', openLocationFlow);
  document.getElementById('placeOrderBtn').addEventListener('click', handlePlaceOrder);

  itemCardsEl.addEventListener('click', (event) => {
    const button = event.target.closest('[data-action][data-item-id]');
    if (!button) return;

    const action = button.dataset.action;
    const itemId = button.dataset.itemId;

    if (action === 'increase') changeQty(itemId, 1);
    if (action === 'decrease') changeQty(itemId, -1);
  });

  window.addEventListener('storage', (event) => {
    if (event.key === CART_KEY || event.key?.toLowerCase().includes('address') || event.key?.toLowerCase().includes('location')) {
      renderCart();
      scheduleCustomerMemorySync('cart_storage_changed');
    }
  });

  renderCart();
  bootCustomerMemorySync();
  window.setTimeout(() => scheduleCustomerMemorySync('cart_page_opened'), 1200);
  continuePaymentFromAddressIfNeeded();
})();
</script>
